const IS_GAS = typeof google !== 'undefined' && google.script;
function gasCall(fn, params){
  return new Promise((ok,fail)=>{
    if(IS_GAS){ google.script.run.withSuccessHandler(ok).withFailureHandler(fail)[fn](params); }
    else { const r=MOCK[fn]?MOCK[fn](params):{status:'ok',data:null}; setTimeout(()=>ok(r),40+Math.random()*60); }
  });
}
async function api(fn, params={}){
  showL();
  try{
    const r = await gasCall(fn,params);
    if(r&&r.status==='error') throw new Error(r.message||'Ошибка');
    return r&&r.data!==undefined?r.data:r;
  } catch(e){ toast('Ошибка: '+e.message,'e'); throw e; }
  finally{ hideL(); }
}

const PAGE_TITLE={dashboard:'Дашборд',purchases:'Закупки',sales:'Продажи',payments:'Оплаты',wallets:'Кошельки / Кассы',cashops:'Движение средств',debts:'Долги',warehouses:'Склады',stock:'Остатки',refs:'Справочники',cats:'Категории / Статьи',analytics:'Аналитика',mdm:'Номенклатура MDM',settings:'Настройки'};

function nav(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.sb-item,.bn').forEach(x=>x.classList.remove('on'));
  const pg=document.getElementById('page-'+p);
  if(pg) pg.classList.add('on');
  document.querySelectorAll(`[data-p="${p}"]`).forEach(x=>x.classList.add('on'));
  document.getElementById('tbTitle').textContent=PAGE_TITLE[p]||p;
  ST.page=p; location.hash=p;
  closeSb();
  onNav(p);
}

function onNav(p){
  const map={dashboard:loadDash,purchases:loadPurchases,sales:loadSales,payments:loadPayments,wallets:loadWallets,cashops:loadCash,debts:loadDebts,warehouses:loadWarehouses,stock:loadStock,refs:loadRefs,cats:loadCats,analytics:loadAnalytics,mdm:loadMDM,settings:loadSettings};
  if(map[p]) map[p]();
}

// Событие переключения отчётных вкладок дашборда (HTML уже разобран в PageDashboard.html)
document.querySelector('.rtabs').addEventListener('click',e=>{
  const b=e.target.closest('.rtab'); if(!b||!b.dataset.rt) return;
  document.querySelectorAll('.rtab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  document.querySelectorAll('[id^="rt-"]').forEach(x=>x.classList.remove('on'));
  const tp=document.getElementById('rt-'+b.dataset.rt);
  if(tp) tp.classList.add('on');
  ST.rtab=b.dataset.rt; loadRtab(b.dataset.rt);
});

document.getElementById('sbNav').addEventListener('click',e=>{const b=e.target.closest('.sb-item');if(b&&b.dataset.p) nav(b.dataset.p)});
document.querySelectorAll('.bn').forEach(b=>{if(b.dataset.p) b.addEventListener('click',()=>nav(b.dataset.p))});

function openSb(){document.getElementById('sidebar').classList.add('open');document.getElementById('sbOv').classList.add('open');document.body.classList.add('locked')}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbOv').classList.remove('open');document.body.classList.remove('locked')}
function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  var collapsed=sb.classList.toggle('collapsed');
  document.documentElement.style.setProperty('--sbw',collapsed?'56px':'240px');
  localStorage.setItem('sb_collapsed',collapsed?'1':'0');
}
function applySidebarState(){
  if(localStorage.getItem('sb_collapsed')==='1'){
    document.getElementById('sidebar').classList.add('collapsed');
    document.documentElement.style.setProperty('--sbw','56px');
  }
}

//  LOADER & TOAST (неблокирующий — крутит кнопку синхронизации)
// ════════════════════════════════════════════════════════════════
let _ldrN=0;
function showL(){if(++_ldrN===1)document.getElementById('syncBtn').classList.add('loading')}
function hideL(){if(--_ldrN<=0){_ldrN=0;document.getElementById('syncBtn').classList.remove('loading')}}
function toast(msg,type='i',ms=3100){
  const w=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className=`toast t${type}`;
  const ico={s:'✅',e:'❌',i:'ℹ️',w:'⚠️'}[type]||'ℹ️';
  t.innerHTML=`<span>${ico}</span><span>${esc(msg)}</span>`;
  w.appendChild(t);setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),320)},ms);
}

function clearF(prefix,fn){
  document.querySelectorAll(`[id^="${prefix}-"]`).forEach(el=>{el.value=''});

function fillSel(id,arr,vk,lk,ph){
  const el=document.getElementById(id); if(!el) return;
  const cur=el.value;
  el.innerHTML=`<option value="">${esc(ph||'—')}</option>`+(arr||[]).map(r=>`<option value="${r[vk]}">${esc(r[lk])}</option>`).join('');
  if(cur) el.value=cur;
}

//  CHARTS
// ════════════════════════════════════════════════════════════════
const CL=['#B83200','#1048A0','#1A6040','#A05000','#5828A0','#0A6E68'];
const CA=['rgba(184,50,0,.72)','rgba(16,72,160,.72)','rgba(26,96,64,.72)','rgba(160,80,0,.72)','rgba(88,40,160,.72)'];
function chartOpts(){const dark=isDark();return{responsive:true,maintainAspectRatio:false,scales:{x:{grid:{display:false},ticks:{color:dark?'#8C857A':'#524B41',font:{size:10,family:"'Geologica'"}}},y:{grid:{color:dark?'rgba(255,255,255,.04)':'rgba(0,0,0,.05)'},ticks:{color:dark?'#8C857A':'#524B41',font:{size:10,family:"'Geologica'"},callback:v=>v>=1e6?fmtN(v/1e6)+'M':v>=1000?fmtN(v/1000)+'K':v}}}}}
function mkBar(ctx,labels,datasets){return new Chart(ctx,{type:'bar',data:{labels,datasets:datasets.map((d,i)=>({...d,backgroundColor:CA[i%5],borderRadius:5,borderSkipped:false}))},options:{...chartOpts(),plugins:{legend:{display:datasets.length>1,labels:{color:isDark()?'#EDE8DF':'#1A1815',font:{size:10}}}}}});}
function mkDoughnut(ctx,labels,data){return new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:CL,borderWidth:2,borderColor:isDark()?'#171512':'#F7F4EF'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:isDark()?'#EDE8DF':'#1A1815',font:{size:10},padding:7}}}}});}
function killChart(k){if(ST.charts[k]){ST.charts[k].destroy();delete ST.charts[k]}}
function redrawCharts(){if(ST.page==='dashboard') loadDashGeneral()}
