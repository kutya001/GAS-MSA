<script>
'use strict';
// ════════════════════════════════════════════════════════════════
//  DATA TABLE ENGINE  — class DT
//  Управляет таблицей: поиск, сортировка, пагинация / flat-вид,
//  порядок и видимость колонок (drag-reorder), экспорт XLSX,
//  умная фильтрация (rule-builder).
//  Все экземпляры регистрируются в глобальном DT_INST[id].
// ════════════════════════════════════════════════════════════════

// ── Операторы фильтрации ───────────────────────────────────────
var SF_OPS = {
  eq:        { label: '= равно',              fn: function(v, f) { return String(v).toLowerCase() === String(f).toLowerCase(); } },
  neq:       { label: '\u2260 не равно',       fn: function(v, f) { return String(v).toLowerCase() !== String(f).toLowerCase(); } },
  contains:  { label: '\u220b содержит',       fn: function(v, f) { return String(v).toLowerCase().indexOf(String(f).toLowerCase()) !== -1; } },
  ncontains: { label: '\u220c не содержит',    fn: function(v, f) { return String(v).toLowerCase().indexOf(String(f).toLowerCase()) === -1; } },
  starts:    { label: 'A\u2026 начинается с',  fn: function(v, f) { return String(v).toLowerCase().indexOf(String(f).toLowerCase()) === 0; } },
  ends:      { label: '\u2026Z заканчивается', fn: function(v, f) { var s = String(v).toLowerCase(), e = String(f).toLowerCase(); return s.length >= e.length && s.slice(-e.length) === e; } },
  gt:        { label: '> больше',              fn: function(v, f) { return +v > +f; } },
  gte:       { label: '\u2265 больше/равно',   fn: function(v, f) { return +v >= +f; } },
  lt:        { label: '< меньше',              fn: function(v, f) { return +v < +f; } },
  lte:       { label: '\u2264 меньше/равно',   fn: function(v, f) { return +v <= +f; } },
  empty:     { label: '\u2205 пусто',          fn: function(v)    { return v == null || String(v).trim() === ''; }, noVal: true },
  nempty:    { label: '\u2731 не пусто',       fn: function(v)    { return v != null && String(v).trim() !== ''; }, noVal: true },
  inlist:    { label: '\u2208 в списке',       fn: function(v, f) { var items = String(f).split(',').map(function(x){ return x.trim().toLowerCase(); }); return items.indexOf(String(v).toLowerCase()) !== -1; } }
};
var SF_OPS_TEXT = ['contains','ncontains','eq','neq','starts','ends','inlist','empty','nempty'];
var SF_OPS_NUM  = ['eq','neq','gt','gte','lt','lte','empty','nempty'];
var SF_OPS_DATE = ['eq','neq','gt','lt','empty','nempty'];

class DT {
  constructor(cfg) {
    // cfg.id          — уникальный строковый ключ таблицы
    // cfg.containerId — id DOM-элемента, куда рендерить
    // cfg.cols        — [{key,label,sortable?,vis?,render?,align?,mono?,w?}]
    // cfg.addLabel    — подпись «+ добавить» (опционально)
    // cfg.onAdd       — callback для кнопки добавления
    // cfg.onRowClick  — function(record) — клик по строке
    // cfg.filters     — [{key,label,type:'select'|'date'|'text',
    //                     getOptions?,options?,vk?,lk?,emptyLabel?,placeholder?}]
    // cfg.onFilter    — function(filterValues) — применение фильтров
    this.cfg = cfg;
    this.cols = (cfg.cols || []).map((c, i) => ({
      key:      c.key,
      label:    c.label,
      w:        c.w        || '',
      sortable: c.sortable !== false,
      vis:      c.vis      !== false,
      render:   c.render   || null,
      align:    c.align    || '',
      mono:     !!c.mono,
      _i: i,   // неизменяемый индекс
      ord: i,  // порядок отображения (меняется drag-and-drop'ом)
    }));
    this.data     = [];
    this.filtered = [];
    this.q        = '';
    this.sortKey  = '';
    this.sortDir  = 1;
    this.pg       = 1;
    this.PS       = 100;
    this.flat     = false;
    this._ready   = false;
    this._drag    = null;
    this._fpValues = {};
    this._sf      = []; // правила умного фильтра
    DT_INST[cfg.id] = this;
  }

  // видимые колонки в текущем порядке
  get vc() {
    return [...this.cols].filter(c => c.vis).sort((a, b) => a.ord - b.ord);
  }

  // ── загрузка данных ──────────────────────────────────────────
  setData(rows) {
    this.data = rows || [];
    this._filter();
    this.pg = 1;
    if (this._ready) {
      this._rBody(); this._rPgn(); this._rInfo(); this._rFilterBtn();
    } else {
      this._render(); this._ready = true;
    }
  }

  _filter() {
    var q = this.q.toLowerCase().trim();
    var arr = q
      ? this.data.filter(function(r) {
          return Object.values(r).some(function(v) {
            return String(v == null ? '' : v).toLowerCase().indexOf(q) !== -1;
          });
        })
      : this.data.slice();
    // Умный фильтр — применяем правила
    var sf = this._sf;
    if (sf.length) {
      arr = arr.filter(function(r) {
        var result = null;
        for (var i = 0; i < sf.length; i++) {
          var rule = sf[i];
          if (!rule.field || !rule.op) continue;
          var opDef = SF_OPS[rule.op];
          if (!opDef) continue;
          var rv = r[rule.field];
          var match = opDef.noVal ? opDef.fn(rv) : opDef.fn(rv, rule.value || '');
          if (result === null) { result = match; }
          else if (rule.logic === 'or') { result = result || match; }
          else { result = result && match; }
        }
        return result === null ? true : result;
      });
    }
    this.filtered = arr;
    if (this.sortKey) this._sort();
  }

  _sort() {
    var k = this.sortKey, d = this.sortDir;
    this.filtered.sort(function(a, b) {
      var av = a[k] == null ? '' : a[k];
      var bv = b[k] == null ? '' : b[k];
      if (!isNaN(+av) && !isNaN(+bv)) return (+av - +bv) * d;
      return String(av).localeCompare(String(bv), 'ru') * d;
    });
  }

  // ── полный рендер в контейнер ────────────────────────────────
  _render() {
    var c = document.getElementById(this.cfg.containerId);
    if (!c) return;
    var tpl = document.createElement('template');
    tpl.innerHTML = this._html();
    c.textContent = '';
    c.appendChild(tpl.content);
    this._bind();
  }

  _html() {
    var id = this.cfg.id;
    return '<div class="dt-wrap">'
      + '<div class="dt-tb">' + this._toolbarHtml() + '</div>'
      + '<div class="dt-scr"><table class="dt-tbl" id="' + id + '-tbl">'
      + '<thead>' + this._headHtml() + '</thead>'
      + '<tbody id="' + id + '-body">' + this._bodyHtml() + '</tbody>'
      + '</table></div>'
      + '<div class="dt-foot" id="' + id + '-pgn">' + this._pgnHtml() + '</div>'
      + '</div>';
  }

  _toolbarHtml() {
    var id = this.cfg.id;
    var addBtn = this.cfg.onAdd
      ? '<button class="btn btn-p btn-sm" onclick="DT_INST[\'' + id + '\'].cfg.onAdd()">'
          + esc(this.cfg.addLabel || '+ Добавить') + '</button>'
      : '';
    var colItems = this.cols.map(function(c) {
      return '<label class="dt-ci">'
        + '<input type="checkbox" ' + (c.vis ? 'checked' : '') + ' onchange="DT_INST[\'' + id + '\'].toggleCol(' + c._i + ')">'
        + '<span>' + esc(c.label || '—') + '</span></label>';
    }).join('');
    var sfCnt = this._sf.filter(function(r) { return r.field && r.op; }).length;
    var filterBtn = '<button class="btn btn-g btn-sm dt-fpb' + (sfCnt ? ' dt-fpb-on' : '') + '" id="' + id + '-fpb"'
      + ' onclick="sfOpen(\'' + id + '\')">'
      + '\u26a1 Фильтры' + (sfCnt ? '<span class="fp-cnt">' + sfCnt + '</span>' : '')
      + '</button>';
    return '<div class="dt-tb-l">'
      + addBtn
      + '<div class="dt-srchw"><span class="dt-srchi">⌕</span>'
      + '<input class="dt-srch" id="' + id + '-srch" placeholder="Поиск по таблице…" value="' + esc(this.q) + '" oninput="DT_INST[\'' + id + '\'].onSearch(this.value)"></div>'
      + '<span class="dt-inf" id="' + id + '-inf">' + this._infoTxt() + '</span>'
      + '</div>'
      + '<div class="dt-tb-r">'
      + filterBtn
      + '<button class="btn btn-g btn-sm dt-flat' + (this.flat ? ' on' : '') + '" id="' + id + '-flat" onclick="DT_INST[\'' + id + '\'].toggleFlat()">'
      + (this.flat ? '&#9776; Страницы' : '&#9776; Все строки') + '</button>'
      + '<div class="dt-cvw" id="' + id + '-cvw">'
      + '<button class="btn btn-g btn-sm" onclick="DT_INST[\'' + id + '\']._toggleCV(event)">&#9881; Столбцы</button>'
      + '<div class="dt-cv" id="' + id + '-cv" hidden>' + colItems + '</div>'
      + '</div>'
      + '<button class="btn btn-g btn-sm" onclick="DT_INST[\'' + id + '\'].exportXLSX()" title="Скачать XLSX">&darr; XLSX</button>'
      + '</div>';
  }

  _headHtml() {
    var self = this;
    return '<tr>' + this.vc.map(function(c) {
      var on  = self.sortKey === c.key;
      var ico = on ? (self.sortDir > 0 ? '↑' : '↓') : '';
      var cls = (c.sortable ? 'srt' : 'ns') + (on ? ' s-on' : '');
      var st  = c.w ? ' style="width:' + c.w + '"' : '';
      return '<th draggable="true" data-key="' + c.key + '" data-ci="' + c._i + '" class="' + cls + '"' + st + '>'
        + '<span class="th-in"><span class="th-lb">' + esc(c.label) + '</span>'
        + (c.sortable ? '<span class="th-ico">' + (ico || '⇅') + '</span>' : '')
        + '</span></th>';
    }).join('') + '</tr>';
  }

  _bodyHtml() {
    var vc = this.vc;
    var id = this.cfg.id;
    var self = this;
    if (!this.filtered.length) {
      return '<tr><td colspan="' + vc.length + '" class="dt-mt">Нет данных</td></tr>';
    }
    var offset = this.flat ? 0 : (this.pg - 1) * this.PS;
    var sl = this.flat
      ? this.filtered
      : this.filtered.slice(offset, offset + this.PS);
    return sl.map(function(r, i) {
      var trOpen = self.cfg.onRowClick
        ? '<tr class="dt-rc" onclick="DT_INST[\'' + id + '\']._rowClick(' + (offset + i) + ')">'
        : '<tr>';
      return trOpen + vc.map(function(c) {
        var v    = r[c.key] == null ? '' : r[c.key];
        var html = c.render ? c.render(v, r) : esc(String(v));
        var cls  = (c.mono ? 'mono' : '') + (c.align === 'right' ? (c.mono ? ' tar' : 'tar') : '');
        return '<td' + (cls.trim() ? ' class="' + cls.trim() + '"' : '') + '>' + html + '</td>';
      }).join('') + '</tr>';
    }).join('');
  }

  _pgnHtml() {
    var total = this.filtered.length;
    var id    = this.cfg.id;
    if (this.flat) return '<span class="dt-pi">Все ' + total + ' записей</span>';
    var pages = Math.ceil(total / this.PS) || 1;
    var from  = total ? (this.pg - 1) * this.PS + 1 : 0;
    var to    = Math.min(this.pg * this.PS, total);
    var pgBtn = '';
    if (pages > 1) {
      pgBtn = '<div class="dt-pgp">';
      for (var i = 1; i <= pages; i++) {
        if (i === 1 || i === pages || Math.abs(i - this.pg) <= 2)
          pgBtn += '<button class="pgb' + (i === this.pg ? ' cur' : '') + '" onclick="DT_INST[\'' + id + '\'].goPage(' + i + ')">' + i + '</button>';
        else if (Math.abs(i - this.pg) === 3)
          pgBtn += '<span class="dt-ell">…</span>';
      }
      pgBtn += '</div>';
    }
    var ps = [25, 50, 100, 200].map(function(n) {
      return '<option value="' + n + '"' + (n === this.PS ? ' selected' : '') + '>' + n + '</option>';
    }, this).join('');
    return '<span class="dt-pi">' + from + '–' + to + ' из ' + total + '</span>'
      + pgBtn
      + '<label class="dt-psl">Строк:&thinsp;<select onchange="DT_INST[\'' + id + '\'].setPS(+this.value)">' + ps + '</select></label>';
  }

  _infoTxt() { return this.filtered.length + ' / ' + this.data.length; }

  // ── публичный API ────────────────────────────────────────────
  onSearch(q) {
    this.q = q; this._filter(); this.pg = 1;
    this._rBody(); this._rPgn(); this._rInfo();
  }

  onSort(key) {
    if (this.sortKey === key) this.sortDir *= -1;
    else { this.sortKey = key; this.sortDir = 1; }
    this.pg = 1;
    this._sort();
    this._rBody(); this._rHead(); this._rPgn();
  }

  toggleFlat() {
    this.flat = !this.flat; this.pg = 1;
    this._rBody(); this._rPgn();
    var btn = document.getElementById(this.cfg.id + '-flat');
    if (btn) {
      btn.classList.toggle('on', this.flat);
      btn.innerHTML = this.flat ? '&#9776; Страницы' : '&#9776; Все строки';
    }
  }

  toggleCol(i) {
    var c = this.cols.find(function(x) { return x._i === i; });
    if (!c) return;
    if (c.vis && this.cols.filter(function(x) { return x.vis; }).length <= 1) return;
    c.vis = !c.vis;
    this._rHead(); this._rBody(); this._rCV();
  }

  goPage(p) { this.pg = p; this._rBody(); this._rPgn(); }
  setPS(n)  { this.PS = n; this.pg = 1; this._rBody(); this._rPgn(); }

  exportXLSX() {
    if (!this.filtered.length) { toast('Нет данных для экспорта', 'w'); return; }
    if (typeof XLSX === 'undefined') { toast('XLSX-библиотека не загружена', 'e'); return; }
    var vc = this.vc;
    var rows = [vc.map(function(c) { return c.label; })].concat(
      this.filtered.map(function(r) {
        return vc.map(function(c) { return r[c.key] == null ? '' : r[c.key]; });
      })
    );
    var ws = XLSX.utils.aoa_to_sheet(rows);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Данные');
    XLSX.writeFile(wb, this.cfg.id + '_' + today() + '.xlsx');
  }

  // ── частичный ре-рендер ──────────────────────────────────────
  _rBody() {
    var el = document.getElementById(this.cfg.id + '-body'); if (!el) return;
    var tpl = document.createElement('template');
    tpl.innerHTML = this._bodyHtml();
    el.textContent = ''; el.appendChild(tpl.content);
  }

  _rHead() {
    var tbl = document.getElementById(this.cfg.id + '-tbl'); if (!tbl) return;
    var old = tbl.querySelector('thead'); if (!old) return;
    var tpl = document.createElement('template');
    tpl.innerHTML = '<thead>' + this._headHtml() + '</thead>';
    old.replaceWith(tpl.content.firstChild);
    this._bindDrag();
  }

  _rPgn() {
    var el = document.getElementById(this.cfg.id + '-pgn'); if (!el) return;
    var tpl = document.createElement('template');
    tpl.innerHTML = this._pgnHtml();
    el.textContent = ''; el.appendChild(tpl.content);
  }

  _rInfo() {
    var el = document.getElementById(this.cfg.id + '-inf');
    if (el) el.textContent = this._infoTxt();
  }

  _rCV() {
    var menu = document.getElementById(this.cfg.id + '-cv'); if (!menu) return;
    var id = this.cfg.id;
    menu.innerHTML = this.cols.map(function(c) {
      return '<label class="dt-ci">'
        + '<input type="checkbox" ' + (c.vis ? 'checked' : '') + ' onchange="DT_INST[\'' + id + '\'].toggleCol(' + c._i + ')">'
        + '<span>' + esc(c.label || '—') + '</span></label>';
    }).join('');
  }

  _toggleCV(e) {
    e.stopPropagation();
    var m = document.getElementById(this.cfg.id + '-cv');
    if (m) m.hidden = !m.hidden;
  }

  // ── drag-and-drop для перестановки колонок ───────────────────
  _bindDrag() {
    var self = this, id = this.cfg.id;
    document.querySelectorAll('#' + id + '-tbl thead th').forEach(function(th) {
      th.addEventListener('dragstart', function(e) {
        self._drag = +th.dataset.ci;
        th.classList.add('dt-drag');
        e.dataTransfer.effectAllowed = 'move';
      });
      th.addEventListener('dragend', function() {
        th.classList.remove('dt-drag');
        document.querySelectorAll('#' + id + '-tbl thead th').forEach(function(x) { x.classList.remove('dt-over'); });
      });
      th.addEventListener('dragover', function(e) { e.preventDefault(); th.classList.add('dt-over'); });
      th.addEventListener('dragleave', function() { th.classList.remove('dt-over'); });
      th.addEventListener('drop', function(e) {
        e.preventDefault();
        th.classList.remove('dt-over');
        var dst = +th.dataset.ci;
        if (self._drag !== null && self._drag !== dst) {
          var src = self.cols.find(function(c) { return c._i === self._drag; });
          var dstC = self.cols.find(function(c) { return c._i === dst; });
          if (src && dstC) { var t = src.ord; src.ord = dstC.ord; dstC.ord = t; }
          self._rHead(); self._rBody();
        }
        self._drag = null;
      });
      // клик по label-спанy — сортировка
      var lb = th.querySelector('.th-lb');
      if (lb && th.dataset.key) {
        lb.addEventListener('click', function() {
          var c = self.cols.find(function(x) { return x.key === th.dataset.key; });
          if (c && c.sortable) self.onSort(c.key);
        });
      }
    });
  }

  _bind() {
    this._bindDrag();
    // закрываем меню колонок по клику вне
    var id = this.cfg.id;
    document.addEventListener('click', function(e) {
      var w = document.getElementById(id + '-cvw');
      var m = document.getElementById(id + '-cv');
      if (w && m && !w.contains(e.target)) m.hidden = true;
    });
  }

  // ── дополнительный API ───────────────────────────────────────

  // Программное управление видимостью колонки (для рефов и др.)
  setColVis(key, vis) {
    var c = this.cols.find(function(x) { return x.key === key; });
    if (!c) return;
    if (!vis && this.cols.filter(function(x) { return x.vis; }).length <= 1) return;
    c.vis = vis;
    this._rHead(); this._rBody(); this._rCV();
  }

  // Обclick строки
  _rowClick(idx) {
    var record = this.filtered[idx];
    if (record && this.cfg.onRowClick) this.cfg.onRowClick(record);
  }

  // Обновить кнопку фильтров (значок с числом активных)
  _rFilterBtn() {
    var btn = document.getElementById(this.cfg.id + '-fpb');
    if (!btn) return;
    var cnt = this._sf.filter(function(r) { return r.field && r.op; }).length;
    btn.className = 'btn btn-g btn-sm dt-fpb' + (cnt ? ' dt-fpb-on' : '');
    btn.innerHTML = '\u26a1 Фильтры' + (cnt ? '<span class="fp-cnt">' + cnt + '</span>' : '');
  }

  // Определить тип колонки анализируя данные
  _guessType(key) {
    var nums = 0, dates = 0, total = 0;
    var dateRe = /^\d{4}-\d{2}-\d{2}/;
    for (var i = 0; i < Math.min(this.data.length, 100); i++) {
      var v = this.data[i][key];
      if (v == null || String(v).trim() === '') continue;
      total++;
      if (!isNaN(+v)) nums++;
      else if (dateRe.test(String(v))) dates++;
    }
    if (!total) return 'text';
    if (dates / total > 0.6) return 'date';
    if (nums / total > 0.6) return 'num';
    return 'text';
  }

  // Уникальные значения колонки (для datalist)
  _uniqVals(key) {
    var seen = {}, arr = [];
    for (var i = 0; i < this.data.length; i++) {
      var v = this.data[i][key];
      if (v == null || String(v).trim() === '') continue;
      var s = String(v);
      if (!seen[s]) { seen[s] = true; arr.push(s); }
      if (arr.length >= 200) break;
    }
    return arr.sort();
  }
}

// ── глобальный реестр экземпляров ────────────────────────────────
var DT_INST = {};

// ════════════════════════════════════════════════════════════════
//  УМНАЯ ПАНЕЛЬ ФИЛЬТРОВ (rule-builder)
//  Единая панель для всех таблиц — открывается справа.
//  Каждое правило: [Поле] [Оператор] [Значение] с AND/OR логикой.
// ════════════════════════════════════════════════════════════════

var _sfDtId = null; // текущая таблица

function _sfBuild() {
  if (document.getElementById('sfPanel')) return;
  var el = document.createElement('div');
  el.id = 'sfPanel';
  el.className = 'fp-ov';
  el.innerHTML =
    '<div class="fp-bg" onclick="sfClose()"></div>' +
    '<div class="fp sf-panel">' +
    '<div class="fp-hd"><h3>\u26a1 \u0423\u043c\u043d\u044b\u0435 \u0444\u0438\u043b\u044c\u0442\u0440\u044b</h3>' +
    '<button class="mclose" onclick="sfClose()">\u2715</button></div>' +
    '<div class="fp-body" id="sfBody"></div>' +
    '<div class="fp-foot">' +
    '<span class="sf-status" id="sfStatus"></span>' +
    '<button class="btn btn-g" onclick="sfClear()">\u2715 \u0421\u0431\u0440\u043e\u0441\u0438\u0442\u044c</button>' +
    '<button class="btn btn-p" onclick="sfClose()">\u0413\u043e\u0442\u043e\u0432\u043e</button>' +
    '</div></div>';
  document.body.appendChild(el);
}

function sfOpen(dtId) {
  _sfBuild();
  _sfDtId = dtId;
  var dt = DT_INST[dtId];
  if (!dt) return;
  if (!dt._sf.length) dt._sf.push({ field: '', op: '', value: '', logic: 'and' });
  _sfRender();
  document.getElementById('sfPanel').classList.add('open');
  document.body.classList.add('locked');
}

function sfClose() {
  var p = document.getElementById('sfPanel');
  if (p) p.classList.remove('open');
  document.body.classList.remove('locked');
}

function sfAddRule() {
  var dt = DT_INST[_sfDtId];
  if (!dt) return;
  dt._sf.push({ field: '', op: '', value: '', logic: 'and' });
  _sfRender();
}

function sfRemoveRule(idx) {
  var dt = DT_INST[_sfDtId];
  if (!dt) return;
  dt._sf.splice(idx, 1);
  if (!dt._sf.length) dt._sf.push({ field: '', op: '', value: '', logic: 'and' });
  _sfRender();
  _sfApplyLive();
}

function sfClear() {
  var dt = DT_INST[_sfDtId];
  if (!dt) return;
  dt._sf = [{ field: '', op: '', value: '', logic: 'and' }];
  _sfRender();
  _sfApplyLive();
}

function sfSetField(idx, val) {
  var dt = DT_INST[_sfDtId];
  if (!dt) return;
  dt._sf[idx].field = val;
  dt._sf[idx].op = '';
  dt._sf[idx].value = '';
  _sfRender();
  _sfApplyLive();
}

function sfSetOp(idx, val) {
  var dt = DT_INST[_sfDtId];
  if (!dt) return;
  dt._sf[idx].op = val;
  if (SF_OPS[val] && SF_OPS[val].noVal) dt._sf[idx].value = '';
  _sfRender();
  _sfApplyLive();
}

function sfSetVal(idx, val) {
  var dt = DT_INST[_sfDtId];
  if (!dt) return;
  dt._sf[idx].value = val;
  _sfApplyLive();
}

function sfSetLogic(idx, val) {
  var dt = DT_INST[_sfDtId];
  if (!dt) return;
  dt._sf[idx].logic = val;
  _sfApplyLive();
}

function _sfRender() {
  var dt = DT_INST[_sfDtId];
  if (!dt) return;
  var body = document.getElementById('sfBody');
  if (!body) return;
  var html = '<div class="sf-rules">';
  dt._sf.forEach(function(rule, idx) {
    // логика И/ИЛИ между правилами
    if (idx > 0) {
      html += '<div class="sf-logic">'
        + '<button class="sf-logbtn' + (rule.logic === 'and' ? ' on' : '') + '" onclick="sfSetLogic(' + idx + ',\'and\')">И</button>'
        + '<button class="sf-logbtn' + (rule.logic === 'or' ? ' on' : '') + '" onclick="sfSetLogic(' + idx + ',\'or\')">ИЛИ</button>'
        + '</div>';
    }
    html += '<div class="sf-rule">';
    // Поле
    html += '<select class="sf-field" onchange="sfSetField(' + idx + ',this.value)">';
    html += '<option value="">-- \u041f\u043e\u043b\u0435 --</option>';
    dt.cols.forEach(function(c) {
      html += '<option value="' + esc(c.key) + '"' + (rule.field === c.key ? ' selected' : '') + '>'
        + esc(c.label) + '</option>';
    });
    html += '</select>';
    // Оператор
    if (rule.field) {
      var tp = dt._guessType(rule.field);
      var ops = tp === 'num' ? SF_OPS_NUM : (tp === 'date' ? SF_OPS_DATE : SF_OPS_TEXT);
      html += '<select class="sf-op" onchange="sfSetOp(' + idx + ',this.value)">';
      html += '<option value="">-- \u0423\u0441\u043b\u043e\u0432\u0438\u0435 --</option>';
      ops.forEach(function(opKey) {
        html += '<option value="' + opKey + '"' + (rule.op === opKey ? ' selected' : '') + '>'
          + esc(SF_OPS[opKey].label) + '</option>';
      });
      html += '</select>';
    }
    // Значение
    if (rule.field && rule.op && !(SF_OPS[rule.op] && SF_OPS[rule.op].noVal)) {
      var dlId = 'sf-dl-' + idx;
      var uniqs = dt._uniqVals(rule.field);
      html += '<input class="sf-val" list="' + dlId + '" value="' + esc(rule.value || '') + '"'
        + ' placeholder="\u0417\u043d\u0430\u0447\u0435\u043d\u0438\u0435\u2026" oninput="sfSetVal(' + idx + ',this.value)">';
      html += '<datalist id="' + dlId + '">';
      uniqs.forEach(function(u) { html += '<option value="' + esc(u) + '">'; });
      html += '</datalist>';
    }
    // Кнопка удаления
    html += '<button class="sf-del" onclick="sfRemoveRule(' + idx + ')" title="\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u043f\u0440\u0430\u0432\u0438\u043b\u043e">\u2715</button>';
    html += '</div>';
  });
  html += '</div>';
  html += '<button class="btn btn-g btn-sm sf-add" onclick="sfAddRule()">+ \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u043f\u0440\u0430\u0432\u0438\u043b\u043e</button>';
  body.innerHTML = html;
  // Обновить статус
  var st = document.getElementById('sfStatus');
  if (st) {
    var cnt = dt._sf.filter(function(r) { return r.field && r.op; }).length;
    st.textContent = cnt ? ('\u0410\u043a\u0442\u0438\u0432\u043d\u043e: ' + cnt + ' \u043f\u0440\u0430\u0432\u0438\u043b(\u043e)') : '';
  }
}

function _sfApplyLive() {
  var dt = DT_INST[_sfDtId];
  if (!dt) return;
  dt._filter();
  dt.pg = 1;
  dt._rBody();
  dt._rPgn();
  dt._rInfo();
  dt._rFilterBtn();
  // обновить статус
  var st = document.getElementById('sfStatus');
  if (st) {
    var cnt = dt._sf.filter(function(r) { return r.field && r.op; }).length;
    st.textContent = cnt ? ('\u0410\u043a\u0442\u0438\u0432\u043d\u043e: ' + cnt + ' \u043f\u0440\u0430\u0432\u0438\u043b(\u043e)') : '';
  }
}
</script>
