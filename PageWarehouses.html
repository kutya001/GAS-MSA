<!-- ══ WAREHOUSES ═══════════════════════════════════════════════════════ -->
<div class="page" id="page-warehouses">
  <div class="sh"><h2>Склады</h2>
    <div class="sh-acts"><button class="btn btn-p btn-sm" onclick="warehouseForm.openCreate()">+ Склад</button></div>
  </div>
  <div class="wgrid" id="whGrid"></div>
</div>

<!-- ══ STOCK ════════════════════════════════════════════════════════════ -->
<div class="page" id="page-stock">
  <div class="sh"><h2>Остатки на складе</h2><p id="stockSub"></p></div>
  <div class="fbar">
    <label>Склад</label><select class="fi fi-sm" id="stf-wh" onchange="loadStock()"><option value="">Все</option></select>
    <label>Бренд</label><select class="fi fi-sm" id="stf-brand" onchange="loadStock()"><option value="">Все</option></select>
    <button class="btn btn-g btn-sm" onclick="document.getElementById('stf-wh').value='';document.getElementById('stf-brand').value='';loadStock()">✕</button>
  </div>
  <div id="stockAlerts"></div>
  <div id="stockGroups"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  WAREHOUSE FORM
// ════════════════════════════════════════════════════════════════
var warehouseForm = new MainForm({
  id: 'mfWarehouse', title: 'Склад',
  fields: [
    { key: 'name',        label: 'Название',      type: 'text', required: true, span: 2 },
    { key: 'address',     label: 'Адрес',         type: 'text', span: 2 },
    { key: 'responsible', label: 'Ответственный', type: 'text' },
    { key: 'note',        label: 'Примечание',    type: 'text', span: 2 }
  ],
  onSave: async function(values, editId) {
    var data = { name: values.name, address: values.address,
                 responsible: values.responsible, note: values.note };
    if (editId) await api('updateWarehouse', Object.assign({ id: editId }, data));
    else        await api('addWarehouse', data);
    toast('Склад сохранён', 's');
    await loadMasterData(); loadWarehouses();
  },
  onDelete: async function(id) {
    await api('deleteWarehouse', { id: id });
    toast('Склад удалён', 's');
    await loadMasterData(); loadWarehouses();
  }
});

// ════════════════════════════════════════════════════════════════
//  WAREHOUSES PAGE
// ════════════════════════════════════════════════════════════════
function _whById(id) { return (ST.warehouses || []).find(function(x) { return x.id === id; }); }

async function loadWarehouses() {
  var d = await api('getWarehouses'); if (!d) return; ST.warehouses = d;
  _setHTML(document.getElementById('whGrid'), d.map(function(w) {
    return '<div class="wcard">' +
      '<span class="wico">🏭</span>' +
      '<div class="wname">' + esc(w.name) + '</div>' +
      '<div class="wcurr">' + esc(w.address || 'Адрес не указан') + '</div>' +
      '<div style="font-size:.67rem;color:var(--tx3);margin-bottom:6px">Отв: ' + esc(w.responsible || '—') + '</div>' +
      '<div class="wbal">' + (w.items || 0) + '<span style="font-size:.7rem;font-weight:500"> тов.</span></div>' +
      '<div class="wio"><span class="win">' + fmtN(w.cost_kgs || 0) + ' ' + CUR + '</span></div>' +
      '<div style="margin-top:8px">' +
        '<button class="btn btn-g btn-xs" onclick="event.stopPropagation();warehouseForm.openEdit(_whById(' + w.id + '))">✏️ Изм.</button>' +
      '</div></div>';
  }).join(''));
}

// ════════════════════════════════════════════════════════════════
//  STOCK PAGE
// ════════════════════════════════════════════════════════════════
async function loadStock() {
  fillSel('stf-wh',    ST.warehouses,                         'id', 'name', '— Все склады —');
  fillSel('stf-brand', (ST.refs && ST.refs.classes) ? ST.refs.classes : [], 'id', 'name', '— Все классы —');
  var d = await api('getStock', { wh_id: g('stf-wh') });
  if (!d) return;
  document.getElementById('stockSub').textContent =
    d.totalItems + ' товаров • Себестоимость: ' + fmtN(d.totalCostKgs) + ' ' + CUR;
  _setHTML(document.getElementById('stockAlerts'), d.staleCount > 0
    ? '<div class="alert al-w"><b>⚠️ ' + d.staleCount + ' товар(ов) на складе более 30 дней</b></div>' : '');
  _setHTML(document.getElementById('stockGroups'), (d.groups || []).map(function(gr) {
    return '<div class="sg">' +
      '<div class="sg-hd" onclick="this.parentElement.classList.toggle(\'col\')">' +
        '<h3>' + esc(gr.wh_name) + ' — ' + esc(gr.brand) + '</h3>' +
        '<span class="badge bb">' + gr.count + ' шт.</span>' +
        '<span class="badge bgr">' + fmtN(gr.cost_kgs) + ' ' + CUR + '</span>' +
        '<span class="chev">▾</span>' +
      '</div>' +
      '<div class="sg-bd"><div class="tscr"><table>' +
        '<thead><tr><th>Товар</th><th>IMEI/Кол-во</th>' +
        '<th>Себес</th><th>Закупка</th><th>Статус</th></tr></thead>' +
        '<tbody>' + (gr.items || []).map(function(it) {
          return '<tr>' +
            '<td>' + esc(it.product_name || '') + '</td>' +
            '<td>' + (it.has_imei
              ? '<span class="imeic">' + esc(it.imei) + '</span>'
              : '<span class="badge bp">\xd7' + it.qty + '</span>') + '</td>' +
            '<td class="mono">' + fmtN(it.cost_kgs) + ' ' + CUR + '</td>' +
            '<td>' + fmtD(it.purchase_date) + '</td>' +
            '<td>' + (it.stale
              ? '<span class="stale">30д+</span>'
              : '<span class="badge bg">OK</span>') + '</td>' +
          '</tr>';
        }).join('') +
      '</tbody></table></div></div></div>';
  }).join(''));
}
</script>
