<!-- ══ SALES ════════════════════════════════════════════════════════ -->
<div class="page" id="page-sales">
  <div class="sh"><h2>Продажи</h2></div>
  <div id="sTable"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  SALES — форма и таблица (4 блока, зеркало Закупок)
// ════════════════════════════════════════════════════════════════

// ── доступные закупки «В наличии» ────────────────────────────────
function _sGetAvail() {
  return (DT_INST['purchases'] && DT_INST['purchases'].data || [])
    .filter(function(r) { return r.status === 'В наличии'; });
}

// ── расчёт прибыли ───────────────────────────────────────────────
function _sCalcProfit(form) {
  var price = parseFloat(form.getVal('total_kgs')) || 0;
  var cost  = form._selectedCost || 0;
  var profit = price - cost;
  form.setCalc('_profit', fmtN(profit) + ' ' + CUR);
}

// ── расчёт долга ─────────────────────────────────────────────────
function _sCalcDebt(form) {
  var price = parseFloat(form.getVal('total_kgs')) || 0;
  var isInstallment = !!form.getVal('is_installment');
  var paid  = isInstallment ? 0 : (parseFloat(form.getVal('paid_kgs')) || 0);
  form.setCalc('_debt', fmtN(Math.max(0, price - paid)) + ' ' + CUR);
}

// ── IMEI поиск: рендер дропдауна ─────────────────────────────────
function _sImeiRender(term) {
  var dd = document.getElementById('mfSale-imei-dd');
  if (!dd) return;
  var avail = _sGetAvail();
  var lower = (term || '').toLowerCase();
  var matches = avail;
  if (lower) {
    matches = avail.filter(function(r) {
      return (r.imei || '').toLowerCase().indexOf(lower) >= 0 ||
             (r.product_name || '').toLowerCase().indexOf(lower) >= 0;
    });
  }
  if (!matches.length) {
    dd.innerHTML = '<div class="imei-opt" style="cursor:default;color:var(--tx3)">Нет совпадений</div>';
    dd.style.display = 'block';
    return;
  }
  dd.innerHTML = matches.map(function(r) {
    var label = r.has_imei
      ? '<span class="mono">' + esc(r.imei) + '</span> — ' + esc(r.product_name || 'Товар #' + r.id)
      : esc(r.product_name || 'Товар #' + r.id) + ' <span class="badge bp">×' + r.qty + '</span>';
    return '<div class="imei-opt" data-id="' + r.id + '">' + label +
      '<br><span class="muted" style="font-size:.68rem">' + esc(r.wh_name) + ' · ' + fmtN(r.cost_kgs) + ' ' + CUR + '</span></div>';
  }).join('');
  dd.style.display = 'block';
  dd.querySelectorAll('.imei-opt[data-id]').forEach(function(opt) {
    opt.onclick = function() { _sSelectPurchase(parseInt(opt.dataset.id)); dd.style.display = 'none'; };
  });
}

// ── выбор закупки → авто-заполнение ──────────────────────────────
function _sSelectPurchase(purchaseId) {
  var avail = _sGetAvail();
  var pur = null;
  for (var i = 0; i < avail.length; i++) { if (avail[i].id === purchaseId) { pur = avail[i]; break; } }
  if (!pur) return;

  // Сохраняем выбор
  saleForm._selectedPurchase = pur;
  saleForm._selectedCost = pur.cost_kgs || 0;

  // Заполняем hidden purchase_id
  var pidEl = document.getElementById('mfSale-purchase_id');
  if (pidEl) pidEl.value = pur.id;

  // Заполняем поле ввода IMEI
  var inp = document.getElementById('mfSale-imei-input');
  if (inp) {
    inp.value = pur.has_imei
      ? pur.imei + ' — ' + (pur.product_name || 'Товар #' + pur.id)
      : pur.product_name || 'Товар #' + pur.id;
  }

  // Авто-заполнение информации
  var cat = [pur.class_name, pur.type_name].filter(Boolean).join(' → ');
  var infoEl = document.getElementById('mfSale-_pinfo');
  if (infoEl) infoEl.textContent = (pur.product_name || 'Товар #' + pur.id) + (cat ? ' (' + cat + ')' : '');

  var costEl = document.getElementById('mfSale-_cost');
  if (costEl) costEl.textContent = fmtN(pur.cost_kgs) + ' ' + CUR;

  // Авто-заполнение Класс/Тип/Назначение (disabled)
  _sAutoFillSelects(pur);

  // Пересчёт прибыли
  _sCalcProfit(saleForm);

  // Block 2 — атрибуты товара из закупки
  _sUpdateBlock2(pur);
}

// ── авто-заполнение и блокировка Class/Type/Template ────────────
function _sAutoFillSelects(pur) {
  var form = saleForm;
  // Класс
  form.fillField('class_id', ST.refs.classes, 'id', 'name', '—');
  var cEl = document.getElementById(form.id + '-class_id');
  if (cEl) { cEl.value = pur.class_id || ''; cEl.disabled = true; }

  // Тип
  var cid = +(pur.class_id) || 0;
  form.fillField('type_id', ST.refs.prod_types.filter(function(t) { return t.class_id === cid; }), 'id', 'name', '—');
  var tEl = document.getElementById(form.id + '-type_id');
  if (tEl) { tEl.value = pur.type_id || ''; tEl.disabled = true; }

  // Назначение (шаблон)
  var tpls = (ST.mdm && ST.mdm.templates) ? ST.mdm.templates : [];
  var tid = +(pur.type_id) || 0;
  var filtered = tpls.filter(function(t) { return t.class_id === cid && t.type_id === tid; });
  form.fillField('template_id', filtered, 'id', 'name', '—');
  var tmEl = document.getElementById(form.id + '-template_id');
  if (tmEl) { tmEl.value = pur.template_id || ''; tmEl.disabled = true; }
}

// ── Block 2 — шаблонные атрибуты от выбранной закупки ────────────
function _sUpdateBlock2(pur) {
  var cnt = document.getElementById('mfSale-tpl_attrs');
  if (!cnt) return;
  if (!pur || !pur.template_id) {
    cnt.innerHTML = '<div class="muted ta-c">Нет характеристик</div>';
    return;
  }
  var tpl = _findTemplateById(pur.template_id);
  if (!tpl || !tpl.attributes || !tpl.attributes.length) {
    cnt.innerHTML = '<div class="muted ta-c">Нет характеристик</div>';
    return;
  }
  var vals = pur.attribute_values || {};
  var html = '<div class="fg2">';
  tpl.attributes.forEach(function(a) {
    var val = vals[String(a.id)] || '';
    html += '<div class="mf-vf"><span class="mf-vl">' + esc(a.name) + '</span>';
    html += '<div class="mf-vv"><span>' + esc(val || '—') + '</span></div></div>';
  });
  html += '</div>';
  cnt.innerHTML = html;
}

// ── Block 2 — характеристики при ручном выборе шаблона ──────────
function _sUpdateBlock2Manual(tpl) {
  var cnt = document.getElementById('mfSale-tpl_attrs');
  if (!cnt) return;
  if (!tpl || !tpl.attributes || !tpl.attributes.length) {
    cnt.innerHTML = '<div class="muted ta-c">Нет характеристик для этого шаблона</div>';
    return;
  }
  _renderTplAttrs('mfSale-tpl_attrs', tpl, {}, true);
}

// ── обновление списка Назначение (для ручного режима) ───────────
function _sUpdateTemplates(form) {
  var cId = parseInt(form.getVal('class_id')) || 0;
  var tId = parseInt(form.getVal('type_id'))  || 0;
  var tpls = (ST.mdm && ST.mdm.templates) ? ST.mdm.templates : [];
  var filtered = tpls.filter(function(t) { return t.class_id === cId && t.type_id === tId; });
  form.fillField('template_id', filtered, 'id', 'name', '— Выберите назначение —');
  var cnt = document.getElementById('mfSale-tpl_attrs');
  if (cnt) cnt.innerHTML = '<div class="muted ta-c">Выберите назначение</div>';
}

// ── форма продажи (4 блока) ──────────────────────────────────────
var saleForm = new MainForm({
  id:    'mfSale',
  title: 'Продажа',
  size:  'lg',
  canEdit: function() { return false; },
  viewActions: [
    {
      label: '+ Внести оплату',
      show:  function(rec) { return rec && rec.debt_kgs > 0; },
      onClick: function(rec) {
        paymentForm.openCreate({
          sale_id: rec.id,
          _buyer:  rec.buyer,
          _debt:   rec.debt_kgs
        });
      }
    }
  ],
  fields: [
    // ═══ BLOCK 0 — Документ ═══
    { key: '_b0', label: '📋 Документ', type: 'group' },
    { key: 'sale_date', label: 'Дата продажи', type: 'date', required: true,
      renderView: function(v) { return fmtD(v); }
    },
    { key: 'manager_id', label: 'Менеджер', type: 'select', required: true,
      getOptions: function() { return ST.refs.managers; },
      renderView: function(v, r) { return esc(r.manager_name || '—'); }
    },
    { key: 'buyer', label: 'Покупатель', type: 'text', required: true, placeholder: 'ФИО покупателя' },
    { key: 'wa',    label: 'WhatsApp',   type: 'text', placeholder: '+996 700 000 000' },

    // ═══ BLOCK 1 — Товар ═══
    { key: '_b1', label: '📱 Товар', type: 'group' },
    { key: 'has_imei', label: '📱 Товар с IMEI (выбор из закупок)', type: 'checkbox', span: 2,
      default: true,
      onChange: function(v, f) {
        f.refreshVis();
        // Сброс при переключении
        if (!v) {
          f._selectedPurchase = null;
          f._selectedCost = 0;
          var pidEl = document.getElementById(f.id + '-purchase_id');
          if (pidEl) pidEl.value = '';
          // Разблокируем селекты
          ['class_id','type_id','template_id'].forEach(function(k) {
            var el = document.getElementById(f.id + '-' + k);
            if (el) el.disabled = false;
          });
        }
      },
      renderView: function(v) {
        return v ? '<span class="badge bb">IMEI (поштучно)</span>' : '<span class="badge bp">Без IMEI</span>';
      }
    },
    // IMEI поиск (контейнер с кастомным UI)
    { key: 'imei_search', type: 'container', span: 2,
      showIf: function(f) { return !!f.getVal('has_imei'); },
      renderView: function(v, rec) {
        if (!rec) return '';
        var label = rec.has_imei
          ? '<span class="imeic">' + esc(rec.imei) + '</span> — <span class="fw7">' + esc(rec.product_name) + '</span>'
          : '<span class="fw7">' + esc(rec.product_name || '—') + '</span>';
        var cat = [rec.class_name, rec.type_name].filter(Boolean).join(' → ');
        return '<span class="mf-vl">Товар</span><div class="mf-vv">' + label +
          (cat ? '<br><span class="muted" style="font-size:.72rem">' + esc(cat) + '</span>' : '') + '</div>';
      },
      renderEdit: function() {
        return '<div class="fgrp full"><label><span class="req">IMEI / Товар</span></label>' +
          '<div class="imei-srch">' +
          '<input class="fin" style="width:100%;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r1);padding:9px 11px;font-size:.86rem" ' +
            'type="text" id="mfSale-imei-input" placeholder="Введите IMEI или название товара..." autocomplete="off" ' +
            'oninput="_sImeiRender(this.value)" onfocus="_sImeiRender(this.value)">' +
          '<div class="imei-dd" id="mfSale-imei-dd"></div>' +
          '</div>' +
          '<input type="hidden" id="mfSale-purchase_id" value="">' +
          '</div>';
      }
    },
    // Класс/Тип/Назначение — всегда видны, при IMEI disabled
    { key: 'class_id', label: 'Класс товара', type: 'select', required: true,
      getOptions: function() { return ST.refs.classes; },
      onChange: function(v, f) {
        if (f.getVal('has_imei')) return; // при IMEI — не каскадируем
        var t = ST.refs.prod_types.filter(function(x) { return !v || x.class_id === +v; });
        f.fillField('type_id', t, 'id', 'name', '—');
        _sUpdateTemplates(f);
      },
      renderView: function(v, r) { return esc(r.class_name || '—'); }
    },
    { key: 'type_id', label: 'Тип продукта', type: 'select', required: true,
      getOptions: function() { return ST.refs.prod_types; },
      onChange: function(v, f) {
        if (f.getVal('has_imei')) return;
        _sUpdateTemplates(f);
      },
      renderView: function(v, r) { return esc(r.type_name || '—'); }
    },
    { key: 'template_id', label: 'Назначение', type: 'select', required: true,
      getOptions: function() { return []; },
      onChange: function(v, f) {
        if (f.getVal('has_imei')) return;
        // Обновить Block 2 при ручном выборе
        var tpl = _findTemplateById(v);
        _sUpdateBlock2Manual(tpl);
      },
      renderView: function(v, r) {
        var tpl = _findTemplateById(v);
        return esc(tpl ? tpl.name : '—');
      }
    },
    // Инфо о товаре (display, авто)
    { key: '_pinfo', label: 'Выбранный товар', type: 'display', span: 2,
      renderView: function(v, r) {
        return r ? '<span class="fw7">' + esc(r.product_name || '—') + '</span>' : '—';
      }
    },
    // Себестоимость (display, авто из закупки)
    { key: '_cost', label: 'Себестоимость (из закупки)', type: 'display',
      renderView: function(v, r) {
        return '<span class="mono">' + fmtN(r.cost_kgs || 0) + ' ' + CUR + '</span>';
      }
    },
    // Цена продажи
    { key: 'total_kgs', label: 'Цена продажи KGS', type: 'number', min: 0, required: true,
      onChange: function(v, f) { _sCalcProfit(f); _sCalcDebt(f); },
      renderView: function(v) { return '<span class="mono fw7">' + fmtN(v) + ' ' + CUR + '</span>'; }
    },
    // Прибыль (авторасчёт)
    { key: '_profit', label: 'Прибыль (авторасчёт)', type: 'calc',
      calcInit: '0',
      renderView: function(v, r) {
        var p = (r.profit_kgs != null) ? r.profit_kgs : 0;
        var cls = p >= 0 ? 'tg' : 'tr';
        return '<span class="mono fw7 ' + cls + '">' + fmtN(p) + ' ' + CUR + '</span>';
      }
    },
    { key: 'note', label: 'Примечание', type: 'text', span: 2, placeholder: 'Необязательно' },

    // ═══ BLOCK 2 — Характеристики товара (из закупки, view-only) ═══
    { key: '_b2', label: '⚙️ Характеристики товара', type: 'group' },
    { key: 'tpl_attrs', type: 'container', span: 2,
      renderView: function(v, rec) {
        if (!rec || !rec.template_id) return '<div class="muted ta-c">Нет характеристик</div>';
        var tpl = _findTemplateById(rec.template_id);
        if (!tpl || !tpl.attributes || !tpl.attributes.length) return '<div class="muted ta-c">Нет характеристик</div>';
        var vals = rec.attribute_values || {};
        var html = '<div class="fg2">';
        tpl.attributes.forEach(function(a) {
          var val = vals[String(a.id)] || '';
          html += '<div class="mf-vf"><span class="mf-vl">' + esc(a.name) + '</span>';
          html += '<div class="mf-vv"><span>' + esc(val || '—') + '</span></div></div>';
        });
        html += '</div>';
        return html;
      },
      renderEdit: function() { return ''; }
    },

    // ═══ BLOCK 3 — Оплата ═══
    { key: '_b3', label: '💰 Оплата', type: 'group' },
    { key: 'is_installment', label: '📅 Рассрочка (оплата позже)', type: 'checkbox', span: 2,
      default: false,
      onChange: function(v, f) { f.refreshVis(); },
      renderView: function(v) {
        return v ? '<span class="badge ba">Рассрочка</span>' : '<span class="badge bg">Полная оплата</span>';
      }
    },
    { key: 'wallet_id', label: 'Кошелёк оплаты', type: 'select', required: true,
      showIf: function(f) { return !f.getVal('is_installment'); },
      getOptions: function() { return ST.wallets; },
      renderView: function(v, r) { return esc(r.wallet_name || '—'); }
    },
    { key: 'paid_kgs', label: 'Оплачено сейчас KGS', type: 'number', min: 0, default: 0,
      showIf: function(f) { return !f.getVal('is_installment'); },
      onChange: function(v, f) { _sCalcDebt(f); },
      renderView: function(v) { return '<span class="mono tg">' + fmtN(v) + ' ' + CUR + '</span>'; }
    },
    { key: '_debt', label: 'Остаток долга (авто)', type: 'calc', span: 2,
      calcInit: '0',
      renderView: function(v, r) {
        return +r.debt_kgs > 0
          ? '<span class="mono tr fw7">' + fmtN(r.debt_kgs) + ' ' + CUR + '</span>'
          : '<span class="tg">0 ' + CUR + '</span>';
      }
    },
  ],
  validate: function(values, form) {
    var hasImei = !!values.has_imei;
    var purchaseId = document.getElementById('mfSale-purchase_id');
    var pid = purchaseId ? parseInt(purchaseId.value) : 0;
    if (hasImei && !pid) return 'Выберите товар (IMEI)';
    var price = +values.total_kgs || 0;
    var isInstallment = !!values.is_installment;
    var paid = isInstallment ? 0 : (+values.paid_kgs || 0);
    if (paid > price) return 'Оплата не может превышать цену';
    return null;
  },
  onSave: async function(values, editId) {
    var hasImei = !!values.has_imei;
    var isInstallment = !!values.is_installment;
    var purchaseId = document.getElementById('mfSale-purchase_id');
    var pid = purchaseId ? parseInt(purchaseId.value) : 0;

    var price = +values.total_kgs || 0;
    var paid = isInstallment ? 0 : (+values.paid_kgs || 0);

    var data = {
      purchase_id: pid || null,
      buyer: values.buyer, wa: values.wa,
      sale_date: values.sale_date,
      manager_id: +values.manager_id,
      has_imei: hasImei,
      is_installment: isInstallment,
      class_id: +values.class_id || null,
      type_id: +values.type_id || null,
      template_id: +values.template_id || null,
      total_kgs: price, paid_kgs: paid, debt_kgs: price - paid,
      wallet_id: isInstallment ? null : +values.wallet_id,
      note: values.note
    };
    await api('addSale', data);
    toast('Продажа добавлена', 's');
    loadSales(); loadPurchases();
  },
  afterMount: function(mode, rec, form) {
    if (mode === 'view') {
      // Block 2 — атрибуты из закупки
      if (rec && rec.template_id) _sUpdateBlock2(rec);
      return;
    }
    // edit/create
    form._selectedPurchase = null;
    form._selectedCost = 0;
    form.fillField('manager_id', ST.refs.managers, 'id', 'name', '—');
    form.fillField('wallet_id', ST.wallets, 'id', 'name', '—');

    // Каскадные селекты Block 1
    form.fillField('class_id', ST.refs.classes, 'id', 'name', '—');
    form.fillField('type_id', [], 'id', 'name', '—');
    form.fillField('template_id', [], 'id', 'name', '— Выберите назначение —');

    if (mode === 'create') {
      var d = document.getElementById(form.id + '-sale_date');
      if (d) d.value = today();
    }
    _sCalcProfit(form);
    _sCalcDebt(form);
    form.refreshVis();

    // Закрываем дропдаун при клике вне
    document.addEventListener('click', function _closeDD(e) {
      var dd = document.getElementById('mfSale-imei-dd');
      if (dd && !e.target.closest('.imei-srch')) dd.style.display = 'none';
    }, { once: false });
  }
});

// ── DT таблица ───────────────────────────────────────────────────
var _sDT = null;
function _sDTinit() {
  if (_sDT) return _sDT;
  _sDT = new DT({
    id: 'sales', containerId: 'sTable',
    addLabel: '+ Продажа', onAdd: function() { saleForm.openCreate(); },
    onRowClick: function(r) { saleForm.openView(r); },
    filters: [
      { key: 'mgr_id',   label: 'Менеджер', type: 'select', getOptions: function() { return ST.refs.managers; } },
      { key: 'class_id', label: 'Класс',    type: 'select', getOptions: function() { return ST.refs.classes; } },
      { key: 'status',   label: 'Статус',   type: 'select',
        options: ['Оплачено', 'Долг'], emptyLabel: 'Все' },
      { key: 'dateFrom', label: 'Дата от', type: 'date' },
      { key: 'dateTo',   label: 'Дата до', type: 'date' }
    ],
    onFilter: function() { loadSales(); },
    cols: [
      { key: 'sale_date',    label: 'Дата',      w: '84px', render: function(v) { return fmtD(v); } },
      { key: 'product_name', label: 'Товар' },
      { key: 'class_name',   label: 'Класс',  sortable: false },
      { key: 'type_name',    label: 'Тип',    sortable: false },
      { key: 'buyer',        label: 'Покупатель' },
      { key: 'cost_kgs',     label: 'Себест.', align: 'right', mono: true,
        render: function(v) { return '<span class="muted">' + fmtN(v) + ' ' + CUR + '</span>'; }
      },
      { key: 'total_kgs',    label: 'Цена',    align: 'right', mono: true,
        render: function(v) { return '<span class="fw7">' + fmtN(v) + ' ' + CUR + '</span>'; }
      },
      { key: 'profit_kgs',   label: 'Прибыль',   align: 'right', mono: true,
        render: function(v) {
          var cls = +v >= 0 ? 'tg' : 'tr';
          return '<span class="' + cls + ' fw7">' + fmtN(v) + ' ' + CUR + '</span>';
        }
      },
      { key: 'debt_kgs',     label: 'Долг',    align: 'right', mono: true,
        render: function(v) { return +v > 0 ? '<span class="tr fw7">' + fmtN(v) + ' ' + CUR + '</span>' : '—'; }
      },
      { key: 'manager_name', label: 'Менеджер' }
    ]
  });
  return _sDT;
}

async function loadSales() {
  var fp = _sDT ? (_sDT._fpValues || {}) : {};
  var d  = await api('getSales', {
    mgr_id:   fp.mgr_id   || '',
    class_id: fp.class_id || '',
    status:   fp.status   || '',
    dateFrom: fp.dateFrom || '',
    dateTo:   fp.dateTo   || ''
  });
  if (!d) return;
  _sDTinit().setData(d.rows || []);
}
</script>
