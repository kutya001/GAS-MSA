<header class="mp-hdr">

    <div class="mp-logo" onclick="mpBackToCatalog()">
      <div class="mp-logo-mark">М</div>
      <div class="mp-logo-txt">
        <div class="mp-logo-name">МобилТрек</div>

    <div class="mp-hsrch">

<!-- ══════════════════════════════════════════════════════════════════

<div id="mpCatalog" class="mp-catalog">

  <!-- ── Hero-секция ─────────────────────────────────────────────── -->
  <section class="mp-hero">
    <h1>Каталог техники</h1>
    <p>Сравнивайте цены от проверенных продавцов Бишкека на телефоны и аксессуары</p>
    <div class="mp-hero-srch">
      <span class="mp-hero-srch-ico">🔍</span>
      <input type="text" id="mpHeroSearch" placeholder="Найти товар...">
    </div>
  </section>

  <!-- ── Контент каталога ────────────────────────────────────────── -->
  <div class="mp-wrap">

    <!-- Категории -->
    <div class="mp-cats">
      <button class="mp-cat on" data-cat="all">Все товары</button>
      <button class="mp-cat" data-cat="phones">📱 Смартфоны</button>
      <button class="mp-cat" data-cat="accessories">🎧 Аксессуары</button>
    </div>

    <!-- Фильтры -->
    <div class="mp-filters">
      <select class="mp-fsel" id="mpBrandFilter">
        <option value="all">Все бренды</option>
        <option value="Apple">Apple</option>
        <option value="Samsung">Samsung</option>
        <option value="Xiaomi">Xiaomi</option>
        <option value="POCO">POCO</option>
        <option value="Honor">Honor</option>
        <option value="Google">Google</option>
        <option value="Realme">Realme</option>
        <option value="Baseus">Baseus</option>
        <option value="Nillkin">Nillkin</option>
        <option value="Spigen">Spigen</option>
        <option value="Anker">Anker</option>
      </select>
      <select class="mp-fsel" id="mpSortFilter">
        <option value="popular">По популярности</option>
        <option value="price_asc">Цена: по возрастанию</option>
        <option value="price_desc">Цена: по убыванию</option>
        <option value="rating">По рейтингу</option>
        <option value="name">По названию</option>

    <!-- Сетка товаров -->
    <div class="mp-grid" id="mpGrid"></div>

  </div>

<!-- ══════════════════════════════════════════════════════════════════

      </div>

      <div id="mpSellUsedList" style="display:none"></div>
