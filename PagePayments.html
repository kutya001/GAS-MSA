<!-- ══ PAYMENTS ══════════════════════════════════════════════════════ -->
<div class="page" id="page-payments">
  <div class="sh"><h2>Оплаты</h2></div>
  <div id="payTable"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  PAYMENTS
// ════════════════════════════════════════════════════════════════
var _payDT = null;
function _payDTinit() {
  if (_payDT) return _payDT;
  _payDT = new DT({
    id: 'payments', containerId: 'payTable',
    cols: [
      {key:'pay_date',   label:'Дата',        w:'84px',  render:function(v){return fmtD(v);}},
      {key:'buyer',      label:'Покупатель'},
      {key:'amount',     label:'Сумма',       align:'right', mono:true,
        render:function(v){return '<span class="tg fw7">'+fmtN(v)+'₸</span>';}},
      {key:'wallet_name',label:'Кошелёк'},
      {key:'debt_after', label:'Ост. долга',  align:'right', mono:true,
        render:function(v){return +v>0?'<span class="tr">'+fmtN(v)+'₸</span>':'<span class="tg">0₸</span>';}},
      {key:'note',       label:'Примечание',  sortable:false}
    ]
  });
  return _payDT;
}

async function loadPayments(){
  var d=await api('getPayments',{}); if(!d) return;
  _payDTinit().setData(d.rows||[]);
}

function openPayModal(saleId){
  var s=(DT_INST['sales']&&DT_INST['sales'].data||[]).find(function(x){return x.id===saleId;}); if(!s) return;
  ST.payModalSaleId=saleId;
  document.getElementById('payBuyer').textContent=s.buyer;
  document.getElementById('payDebt').textContent=fmtN(s.debt_kgs)+' ₸';
  document.getElementById('pay-date').value=today();
  document.getElementById('pay-amt').value='';
  fillSel('pay-wallet',ST.wallets,'id','name','—');
  openM('mPayment');
}
async function savePayment(){
  var amt=parseFloat(g('pay-amt'))||0,wid=+g('pay-wallet'),date=g('pay-date');
  if(!ST.payModalSaleId||!amt||!wid||!date){toast('Заполните все поля','e');return}
  var s=(DT_INST['sales']&&DT_INST['sales'].data||[]).find(function(x){return x.id===ST.payModalSaleId;});
  if(s&&amt>s.debt_kgs+0.01){toast('Сумма превышает долг','e');return}
  await api('addPayment',{sale_id:ST.payModalSaleId,amount:amt,wallet_id:wid,pay_date:date,note:g('pay-note')});
  toast('Оплата внесена','s'); closeM('mPayment'); loadSales(); loadPayments();
}
</script>
