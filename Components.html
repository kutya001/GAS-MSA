<!-- ════ MODALS ══════════════════════════════════════════════════ -->
<!-- Purchase -->
<div class="ov" id="mPurchase"><div class="modal modal-lg">
  <div class="mh"><h2 id="mPTitle">Новая закупка</h2><button class="mclose" onclick="closeM('mPurchase')">✕</button></div>
  <div class="mbody">
    <label class="chkrow" style="margin-bottom:10px;background:var(--acbg);padding:8px 10px;border-radius:6px;border:1px solid rgba(184,50,0,.15)">
      <input type="checkbox" id="p-hasImei" checked onchange="toggleImei()">
      <span>📱 Товар с IMEI кодом (поштучный учёт — телефоны, планшеты)</span>
    </label>
    <div class="fg2">
      <div class="fgrp"><label><span class="req">Бренд</span></label><select id="p-brand" onchange="filterModels()"><option value="">—</option></select></div>
      <div class="fgrp"><label><span class="req">Модель</span></label><select id="p-model"><option value="">—</option></select></div>
      <div class="fgrp"><label>Характеристика</label><input id="p-spec" placeholder="8/256, 128GB..."></div>
      <div class="fgrp"><label>Цвет</label><input id="p-color" placeholder="Чёрный, Белый..."></div>
      <div class="fgrp"><label><span class="req">Склад</span></label><select id="p-wh"><option value="">—</option></select></div>
      <div class="fgrp"><label>Поставщик</label><select id="p-supplier"><option value="">—</option></select></div>
      <div class="fgrp imei-mode" id="imeiRow"><label>IMEI (15 цифр)</label><input id="p-imei" placeholder="352365010000001" maxlength="15" class="mono"></div>
      <div class="fgrp qty-mode" id="qtyRow"><label><span class="req">Количество</span></label><input id="p-qty" type="number" min="1" value="1"></div>
      <div class="fgrp"><label>Состояние</label><select id="p-cond"><option>Новый</option><option>Б/У</option></select></div>
      <div class="fgrp"><label><span class="req">Дата закупки</span></label><input type="date" id="p-date"></div>
      <div class="fgrp"><label><span class="req">Себестоимость USD</span></label><input type="number" id="p-cusd" min="0" step="0.01" placeholder="0" oninput="calcPC()"></div>
      <div class="fgrp"><label><span class="req">Курс KGS/USD</span></label><input type="number" id="p-rate" min="1" value="88" oninput="calcPC()"></div>
      <div class="fgrp full"><label>Себестоим. KGS (авторасчёт)</label><div class="calc-f" id="pCostKgs">0 ₸</div></div>
      <div class="fgrp full"><label>Оплата поставщику (кошелёк)</label><select id="p-payWallet"><option value="">Не оплачено — запись в долг поставщику</option></select></div>
      <div class="fgrp full"><label>Примечание</label><input id="p-note" placeholder="Необязательно"></div>
    </div>
  </div>
  <div class="mfoot">
    <button class="btn btn-g" onclick="closeM('mPurchase')">Отмена</button>
    <button class="btn btn-p" onclick="savePurchase()">💾 Сохранить</button>
  </div>
</div></div>

<!-- Sale -->
<div class="ov" id="mSale"><div class="modal modal-lg">
  <div class="mh"><h2>Новая продажа</h2><button class="mclose" onclick="closeM('mSale')">✕</button></div>
  <div class="mbody">
    <div class="fg2">
      <div class="fgrp full"><label><span class="req">Товар из наличия</span></label><select id="s-item" onchange="onItemSelect()"><option value="">Выбрать товар...</option></select></div>
      <div class="fgrp"><label><span class="req">Покупатель</span></label><input id="s-buyer" placeholder="ФИО покупателя"></div>
      <div class="fgrp"><label>WhatsApp</label><input id="s-wa" placeholder="+996 700 000 000"></div>
      <div class="fgrp"><label><span class="req">Дата</span></label><input type="date" id="s-date"></div>
      <div class="fgrp"><label><span class="req">Менеджер</span></label><select id="s-mgr"><option value="">—</option></select></div>
      <div class="fgrp"><label><span class="req">Цена продажи KGS</span></label><input type="number" id="s-price" min="0" placeholder="0" oninput="calcSB()"></div>
      <div class="fgrp"><label><span class="req">Оплачено сейчас KGS</span></label><input type="number" id="s-paid" min="0" value="0" oninput="calcSB()"></div>
      <div class="fgrp"><label><span class="req">Кошелёк оплаты</span></label><select id="s-wallet"><option value="">—</option></select></div>
      <div class="fgrp full"><label>Остаток долга (авто)</label><div class="calc-f" id="sDebt">0 ₸</div></div>
      <div class="fgrp full"><label>Примечание</label><input id="s-note" placeholder="Необязательно"></div>
    </div>
  </div>
  <div class="mfoot">
    <button class="btn btn-g" onclick="closeM('mSale')">Отмена</button>
    <button class="btn btn-p" onclick="saveSale()">💾 Сохранить</button>
  </div>
</div></div>
