<!-- ══ POS TERMINAL ════════════════════════════════════════════════════════ -->
<div class="page" id="page-pos">
  <div class="pos-layout">
    <!-- Левая панель: Каталог -->
    <div class="pos-catalog">
      <div class="sh" style="padding: 10px 0">
        <div class="pos-search-wrap">
           <input type="text" id="posSearch" class="fi fi-lg" placeholder="🔍 Поиск / Сканер (SKU, IMEI...)" oninput="handlePosSearch()">
           <button class="btn btn-g" onclick="focusSearch()" title="Фокус на поиск (📱)">📱</button>
        </div>
      </div>
      
      <div class="pos-chips-container">
        <div class="pos-chips" id="posClasses"></div>
        <div class="pos-chips" id="posTypes" style="margin-top:8px"></div>
      </div>
      
      <div class="pos-grid" id="posGrid"></div>
    </div>

    <!-- Правая панель: Корзина -->
    <div class="pos-cart" id="posCartPanel">
      <div class="cart-header">
        <h3>🛒 Чек <span id="cartCount" class="badge bc">0</span></h3>
        <button class="btn btn-g btn-xs" onclick="clearCart()">Очистить</button>
      </div>
      
      <div class="cart-items" id="cartItems"></div>
      
      <div class="cart-footer">
        <!-- Режим рассрочки -->
        <div class="pos-installment-toggle">
          <label class="check-label">
            <input type="checkbox" id="checkInstallment" onchange="toggleInstallment()"> 📅 В рассрочку
          </label>
        </div>

        <div id="posInstallmentFields" style="display:none; margin-bottom:15px; border:1px solid var(--p-main); padding:10px; border-radius:8px">
          <input type="text" id="posBuyer" class="fi fi-sm" style="margin-bottom:5px" placeholder="ФИО Покупателя *">
          <input type="text" id="posPhone" class="fi fi-sm" style="margin-bottom:5px" placeholder="WhatsApp (телефон) *">
          <input type="number" id="posInitial" class="fi fi-sm" placeholder="Первоначальный взнос (KGS)" oninput="calcChange()">
        </div>

        <div class="cart-total">
          <span>ИТОГО</span>
          <span id="posTotal" class="total-val">0</span>
        </div>
        
        <div class="pos-payment">
          <label style="font-size:0.8rem; margin-bottom:5px; display:block">Способ оплаты:</label>
          <div class="pos-wallet-buttons" id="posWalletBtns"></div>
          
          <div class="change-calc" id="changeCalcBlock">
            <div class="fi-row">
              <label>Получено</label>
              <input type="number" id="posReceived" class="fi" placeholder="0" oninput="calcChange()">
            </div>
            <div class="fi-row">
              <label>Сдача</label>
              <div id="posChange" class="change-val">0</div>
            </div>
          </div>
          
          <button id="btnPay" class="btn btn-p btn-lg btn-block pay-btn" onclick="payOrder()">
            ОПЛАТИТЬ
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Мобильная кнопка корзины -->
  <button class="fab-cart" onclick="toggleCartMobile()">
    🛒 <span id="cartCountFab">0</span>
  </button>
</div>

<style>
/* Стили дизайн-системы (без теплых оттенков) */
:root {
  --pos-chip-bg: var(--bg-card);
  --pos-chip-active: var(--p-main);
  --pos-card-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.pos-layout { display: flex; gap: 15px; height: calc(100vh - 110px); overflow: hidden; padding: 5px; }
.pos-catalog { flex: 7; display: flex; flex-direction: column; overflow: hidden; }
.pos-cart { flex: 3; background: var(--bg-card); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border: 1px solid var(--border); transition: transform 0.3s ease; }

.pos-search-wrap { display: flex; gap: 8px; align-items: center; }
.pos-search-wrap .fi { flex-grow: 1; height: 48px; font-size: 1.1rem; }

.pos-chips-container { padding: 5px 0; }
.pos-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
.pos-chips::-webkit-scrollbar { display: none; }
.chip { 
  white-space: nowrap; padding: 8px 16px; border-radius: 20px; background: var(--pos-chip-bg); 
  border: 1px solid var(--border); cursor: pointer; font-size: 0.85rem; font-weight: 500;
  transition: all 0.2s; min-height: 40px; display: flex; align-items: center;
}
.chip.active { background: var(--pos-chip-active); color: white; border-color: var(--pos-chip-active); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

.pos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; overflow-y: auto; padding-top: 10px; flex-grow: 1; }

.pcard { 
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; 
  cursor: pointer; transition: all 0.2s; position: relative; display: flex; flex-direction: column;
  box-shadow: var(--pos-card-shadow);
}
.pcard:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.12); border-color: var(--p-main); }
.pcard .pname { font-weight: 700; font-size: 0.95rem; line-height: 1.25; margin-bottom: 6px; color: var(--text-main); height: 2.5em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.pcard .pinfo { font-size: 0.75rem; color: var(--text-mut); margin-bottom: 10px; }
.pcard .pprice { font-weight: 800; color: var(--p-main); font-size: 1.15rem; margin-top: auto; }
.pbadge { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; padding: 2px 6px; border-radius: 6px; font-weight: 700; }
.pbadge.bg { background: rgba(76, 175, 80, 0.1); color: #2e7d32; }
.pbadge.by { background: rgba(255, 152, 0, 0.1); color: #ef6c00; }

.pos-wallet-buttons { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-bottom: 15px; }
.wbtn { 
  padding: 10px 5px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-page); 
  cursor: pointer; text-align: center; font-size: 0.75rem; font-weight: 600; min-height: 48px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s;
}
.wbtn.active { border-color: var(--p-main); background: rgba(var(--p-main-rgb), 0.1); box-shadow: inset 0 0 0 1px var(--p-main); }

.pay-btn { height: 64px; font-size: 1.3rem; margin-top: 15px; box-shadow: 0 4px 15px rgba(var(--p-main-rgb), 0.3); }

.fab-cart { display: none; position: fixed; bottom: 20px; right: 20px; width: 64px; height: 64px; border-radius: 32px; background: var(--p-main); color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 1.5rem; z-index: 100; align-items: center; justify-content: center; }
.fab-cart span { position: absolute; top: 0; right: 0; background: var(--tr); min-width: 22px; padding: 2px; border-radius: 11px; font-size: 0.75rem; font-weight: bold; border: 2px solid white; }

@media (max-width: 768px) {
  .pos-cart { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; z-index: 1000; transform: translateY(100%); }
  .pos-cart.open { transform: translateY(0); }
  .pos-catalog { flex: 1; }
  .fab-cart { display: flex; }
}
</style>

<script>
var POS_RAW_DATA = [];
var CART = [];
var SEL_CLASS_ID = 0;
var SEL_TYPE_ID = 0;
var SEL_WALLET_ID = 0;

async function loadPOS() {
  if (!CURRENT_SHIFT) {
    toast('Откройте смену для работы с POS', 'w');
    nav('shifts'); return;
  }
  
  // Кнопки Классов (Чипы)
  const classBox = document.getElementById('posClasses');
  classBox.innerHTML = `<div class="chip active" onclick="filterClass(0, this)">Все классы</div>` + 
    ST.refs.classes.map(c => `<div class="chip" onclick="filterClass(${c.id}, this)">${esc(c.name)}</div>`).join('');
  
  document.getElementById('posTypes').innerHTML = ''; // Очищаем типы пока не выбран класс
  
  // Кошельки кнопками
  const wBox = document.getElementById('posWalletBtns');
  const posWallets = ST.wallets.filter(w => w.is_pos);
  wBox.innerHTML = posWallets.map(w => `
    <div class="wbtn" id="wbtn-${w.id}" onclick="selectWallet(${w.id})">
      <span>${esc(w.icon)}</span>
      <b>${esc(w.name)}</b>
    </div>
  `).join('');
  
  // Дефолтный кошелек (первый попавшийся KGS)
  const defW = posWallets.find(w => w.currency === 'KGS');
  if (defW) selectWallet(defW.id);

  const res = await api('getPOSCatalog');
  POS_RAW_DATA = res;
  renderPOSGrid(res);
}

function renderPOSGrid(items) {
  const grid = document.getElementById('posGrid');
  if (!items.length) { grid.innerHTML = '<div style="grid-column:1/-1; padding:40px; text-align:center; opacity:0.5">Товаров не найдено</div>'; return; }
  
  grid.innerHTML = items.map(item => {
    const isLow = item.total_qty < 5;
    return `
      <div class="pcard" onclick="addToCartByData(${JSON.stringify(item).replace(/"/g, '&quot;')})">
        <div class="pbadge ${isLow ? 'by' : 'bg'}">${item.total_qty} шт</div>
        <div class="pname">${esc(item.product_name)}</div>
        <div class="pinfo">${esc(item.wh_name)}</div>
        <div class="pprice">${fmtN(item.price)}</div>
      </div>
    `;
  }).join('');
}

function handlePosSearch() {
  const val = document.getElementById('posSearch').value;
  // Если введено 15 знаков (IMEI)
  if (val.length === 15 && /^\d+$/.test(val)) {
    const item = POS_RAW_DATA.find(x => x.variants && x.variants.some(v => v.imei === val));
    if (item) {
      const variant = item.variants.find(v => v.imei === val);
      addToCartFinal({
        purchase_id: variant.purchase_id,
        name: item.product_name + ' (IMEI: ' + variant.imei + ')',
        price: item.price,
        qty: 1,
        has_imei: true
      });
      document.getElementById('posSearch').value = ''; // Очистка
      toast('Товар добавлен по IMEI', 's');
      return;
    }
  }
  filterBySearch();
}

function filterBySearch() {
  const q = document.getElementById('posSearch').value.toLowerCase();
  let items = POS_RAW_DATA;
  
  if (SEL_CLASS_ID) {
    const cls = ST.refs.classes.find(c => c.id == SEL_CLASS_ID);
    items = items.filter(x => x.class_name === cls.name);
  }
  
  if (SEL_TYPE_ID) {
    const type = ST.refs.prod_types.find(t => t.id == SEL_TYPE_ID);
    items = items.filter(x => x.product_name.includes(type.name)); // Грубая фильтрация если нет ID типа в каталоге
  }
  
  if (q) {
    items = items.filter(x => x.product_name.toLowerCase().includes(q) || (x.variants && x.variants.some(v => v.imei.includes(q))));
  }
  
  renderPOSGrid(items);
}

function filterClass(id, btn) {
  document.querySelectorAll('#posClasses .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  SEL_CLASS_ID = id;
  SEL_TYPE_ID = 0;
  
  // Обновляем типы
  const typeBox = document.getElementById('posTypes');
  if (id === 0) {
    typeBox.innerHTML = '';
  } else {
    const types = ST.refs.prod_types.filter(t => t.class_id == id);
    typeBox.innerHTML = `<div class="chip active" onclick="filterType(0, this)">Все типы</div>` + 
      types.map(t => `<div class="chip" onclick="filterType(${t.id}, this)">${esc(t.name)}</div>`).join('');
  }
  
  filterBySearch();
}

function filterType(id, btn) {
  document.querySelectorAll('#posTypes .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  SEL_TYPE_ID = id;
  filterBySearch();
}

function selectWallet(id) {
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('wbtn-'+id).classList.add('active');
  SEL_WALLET_ID = id;
  calcChange();
}

function toggleInstallment() {
  const on = document.getElementById('checkInstallment').checked;
  document.getElementById('posInstallmentFields').style.display = on ? 'block' : 'none';
  document.getElementById('changeCalcBlock').style.display = on ? 'none' : 'block';
  if (on) {
    document.getElementById('posInitial').value = 0;
  }
  calcChange();
}

function addToCartByData(item) {
   if (item.has_imei) {
    if (item.variants.length > 1) { 
       promptImeiChoice(item); 
    } else {
       const v = item.variants[0];
       addToCartFinal({ purchase_id: v.purchase_id, name: item.product_name + ' (IMEI: ' + v.imei + ')', price: item.price, qty: 1, has_imei: true });
    }
  } else {
    addToCartFinal({ purchase_id: item.purchase_id, name: item.product_name, price: item.price, qty: 1, has_imei: false });
  }
}

function addToCartFinal(obj) {
  const ex = CART.find(x => x.purchase_id === obj.purchase_id);
  if (ex && !obj.has_imei) ex.qty++;
  else if (!ex) CART.push(obj);
  else { toast('Экземпляр уже в чеке', 'w'); return; }
  renderCart();
}

function renderCart() {
  const box = document.getElementById('cartItems');
  box.innerHTML = CART.map((c, i) => `
    <div class="cart-item">
      <div class="ci-info">
        <div class="ci-name">${esc(c.name)}</div>
        <div class="ci-price">${fmtN(c.price)} x ${c.qty}</div>
      </div>
      <div class="ci-acts">
        <button class="btn btn-g btn-xs" onclick="changeQty(${i},-1)">–</button>
        <div class="ci-qty">${c.qty}</div>
        <button class="btn btn-g btn-xs" onclick="changeQty(${i},1)">+</button>
      </div>
    </div>
  `).join('');
  
  const total = CART.reduce((s, x) => s + x.price * x.qty, 0);
  document.getElementById('posTotal').textContent = fmtN(total);
  document.getElementById('cartCount').textContent = CART.length;
  document.getElementById('cartCountFab').textContent = CART.length;
  calcChange();
}

function changeQty(i, d) {
  if (CART[i].has_imei && d > 0) return;
  CART[i].qty += d;
  if (CART[i].qty <= 0) CART.splice(i, 1);
  renderCart();
}

function removeFromCart(i) { CART.splice(i, 1); renderCart(); }
function clearCart() { if(confirm('Очистить корзину?')) { CART = []; renderCart(); } }

function calcChange() {
  const total = CART.reduce((s, x) => s + x.price * x.qty, 0);
  const isInst = document.getElementById('checkInstallment').checked;
  const received = parseFloat(document.getElementById('posReceived').value) || 0;
  if (isInst) {
     const init = parseFloat(document.getElementById('posInitial').value) || 0;
     document.getElementById('posChange').textContent = 'В рассрочку: ' + fmtN(total - init);
  } else {
     document.getElementById('posChange').textContent = received > total ? fmtN(received - total) : '0';
  }
}

async function payOrder() {
  if (!CART.length) return toast('Корзина пуста', 'w');
  const isInst = document.getElementById('checkInstallment').checked;
  const buyer = document.getElementById('posBuyer').value;
  const phone = document.getElementById('posPhone').value;
  
  if (isInst && (!buyer || !phone)) return toast('Заполните данные покупателя', 'w');
  if (!SEL_WALLET_ID && !isInst) return toast('Выберите кошелек', 'w');
  
  const total = CART.reduce((s, x) => s + x.price * x.qty, 0);
  const initial = isInst ? parseFloat(document.getElementById('posInitial').value) : total;
  
  // 1. Быстрая подготовка данных для чека
  const localId = 'POS-PROV-' + Date.now();
  const printData = {
    receipt_id: localId,
    buyer: buyer || 'Розничный покупатель',
    items: CART.map(c => ({ product_name: c.name, qty: c.qty, price: c.price })),
    totalAmount: total,
    saleDate: today(),
    managerName: ST.refs.managers.find(m => m.id == CURRENT_SHIFT.manager_id)?.name || 'Менеджер'
  };
  
  // 2. Мгновенная печать (не ждем API)
  const pUrl = WEBAPP_URL + '?p=receipt&local=' + encodeURIComponent(JSON.stringify(printData));
  window.open(pUrl, 'POSReceipt', 'width=400,height=600');
  
  // 3. Сброс UI сразу
  const memoCart = [...CART];
  CART = []; 
  renderCart();
  document.getElementById('posReceived').value = '';
  if (isInst) {
    document.getElementById('checkInstallment').checked = false;
    toggleInstallment();
  }
  
  // 4. Фоновая отправка на сервер
  try {
    const res = await api('processPosSale', {
      cart: memoCart,
      wallet_id: SEL_WALLET_ID,
      shift_id: CURRENT_SHIFT.id,
      manager_id: CURRENT_SHIFT.manager_id,
      buyer: buyer,
      phone: phone,
      is_installment: isInst,
      initial_payment: initial
    });
    toast('Оплата успешно подтверждена: ' + res.receipt_id, 's');
    loadPOS(); // Рефреш каталога в фоне
  } catch (e) {
    // В случае критической ошибки сервера
    const alertId = 'err' + Date.now();
    toast('ОЙ! Ошибка сохранения продажи. Сообщите админу. Чек: ' + localId, 'e', 10000);
  }
}

function focusSearch() { document.getElementById('posSearch').focus(); }
function toggleCartMobile() { document.getElementById('posCartPanel').classList.toggle('open'); }

</script>
