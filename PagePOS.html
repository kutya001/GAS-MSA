<!-- ══ POS TERMINAL v2.0 ════════════════════════════════════════════════════ -->
<div class="page" id="page-pos">
  <div class="pos-layout">
    <!-- Левая панель: Каталог -->
    <div class="pos-catalog">
      <div class="pos-header-actions">
        <div class="pos-search-container">
           <input type="text" id="posSearch" class="fi fi-lg" placeholder="🔍 Поиск товара или сканирование IMEI..." oninput="handlePosSearch()">
           <button class="btn btn-g btn-icon" onclick="focusSearch()" title="Фокус (📱)">📱</button>
        </div>
        <button class="btn btn-sec" onclick="showReturnModalPos()">
          <span class="icon">🔄</span> Возврат / Обмен
        </button>
      </div>
      
      <div class="pos-navigation">
        <div class="chip-group" id="posClasses"></div>
        <div class="chip-group sub-chips" id="posTypes" style="margin-top:10px"></div>
        <div class="chip-group sub-chips" id="posTemplates" style="margin-top:10px"></div>
      </div>
      
      <div class="pos-grid" id="posGrid"></div>
    </div>

    <!-- Правая панель: Сайдбар чека -->
    <div class="pos-sidebar" id="posCartPanel">
      <div class="sidebar-header">
        <div class="cart-title">
          <span class="cart-icon">🛒</span>
          <h3>Текущий чек</h3>
          <span id="cartCount" class="badge-count">0</span>
        </div>
        <button class="btn-text" onclick="clearCart()">Очистить</button>
      </div>
      
      <div class="cart-body" id="cartItems">
         <!-- Сюда рендерятся товары -->
      </div>
      
      <div class="sidebar-footer">
        <div class="installment-box">
          <label class="toggle-switch">
            <input type="checkbox" id="checkInstallment" onchange="toggleInstallment()">
            <span class="slider"></span>
            <span class="label-text">💳 Продажа в рассрочку</span>
          </label>
        </div>

        <div id="posInstallmentFields" class="installment-details" style="display:none">
          <div class="fi-group">
            <input type="text" id="posBuyer" class="fi" placeholder="ФИО покупателя *">
            <input type="text" id="posPhone" class="fi" placeholder="Телефон / WhatsApp *">
            <div class="input-with-label">
              <label>Первоначальный взнос (KGS)</label>
              <input type="number" id="posInitial" class="fi" value="0" oninput="calcChange()">
            </div>
          </div>
        </div>

        <div class="summary-card">
          <div class="total-row">
            <span>К ОПЛАТЕ</span>
            <span id="posTotal" class="total-price">0</span>
          </div>
          
          <div class="payment-selection">
            <p class="section-label">Способ оплаты</p>
            <div class="wallet-grid" id="posWalletBtns"></div>
          </div>

          <div class="change-section" id="changeCalcBlock">
            <div class="change-row">
              <label>Получено</label>
              <input type="number" id="posReceived" class="fi fi-md" placeholder="0" oninput="calcChange()">
            </div>
            <div class="change-row highlight">
              <label id="lblChange">Сдача</label>
              <span id="posChange" class="amount-val">0</span>
            </div>
          </div>
          
          <button id="btnPay" class="btn btn-p btn-xl btn-block pay-btn" onclick="payOrder()">
            ПОДТВЕРДИТЬ ОПЛАТУ
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Мобильная кнопка корзины -->
  <button class="fab-cart" onclick="toggleCartMobile()">
    🛒 <span id="cartCountFab">0</span>
  </button>
</div>

<script>
// Глобальное состояние
var POS_RAW_DATA = [];
var CART = [];
var SEL_CLASS_ID = 0;
var SEL_TYPE_ID = 0;
var SEL_TEMPLATE_ID = 0;
var SEL_WALLET_ID = 0;

/**
 * Инициализация страницы
 */
async function loadPOS() {
  if (!CURRENT_SHIFT) {
    toast('🔐 Откройте смену для работы', 'w');
    nav('shifts'); return;
  }
  
  // Защита: если глобальные данные еще не загружены (или сброшен кэш)
  if (!ST || !ST.wallets || !ST.refs) {
    showLoading(true);
    ST = await api('getAllData');
    showLoading(false);
  }
  
  // 1. Отрисовка фильтров классов
  const classBox = document.getElementById('posClasses');
  classBox.innerHTML = `<div class="chip active" onclick="filterClass(0, this)">Все товары</div>` + 
    ST.refs.classes.map(c => `<div class="chip" onclick="filterClass(${c.id}, this)">${esc(c.name)}</div>`).join('');
  
  // 2. Отрисовка кошельков (только is_pos)
  const wBox = document.getElementById('posWalletBtns');
  const posWallets = ST.wallets.filter(w => w.is_pos);
  wBox.innerHTML = posWallets.map(w => `
    <div class="wbtn" id="wbtn-${w.id}" onclick="selectWallet(${w.id})">
      <span style="font-size:1rem">${esc(w.icon)}</span>
      <span>${esc(w.name)}</span>
    </div>
  `).join('');
  
  // Выбор кошелька по умолчанию
  const defW = posWallets.find(w => w.currency === 'KGS') || posWallets[0];
  if (defW) selectWallet(defW.id);

  // 3. Загрузка каталога
  const res = await api('getPOSCatalog');
  POS_RAW_DATA = res;
  renderPOSGrid(res);
}

/**
 * Отрисовка плитки товаров
 */
function renderPOSGrid(items) {
  const grid = document.getElementById('posGrid');
  if (!items.length) { grid.innerHTML = '<div style="grid-column:1/-1; padding:100px; text-align:center; opacity:0.3">🔎 Ничего не найдено</div>'; return; }
  
  grid.innerHTML = items.map(item => {
    const isLow = item.total_qty < 5;
    return `
      <div class="pcard" onclick="addToCartByData(${JSON.stringify(item).replace(/"/g, '&quot;')})">
        <div class="pbadge ${isLow ? 'by' : 'bg'}">${item.total_qty} шт</div>
        <div class="pname">${esc(item.product_name)}</div>
        <div class="pinfo">${esc(item.wh_name)}</div>
        <div class="pprice">${fmtN(item.price)} KGS</div>
      </div>
    `;
  }).join('');
}

/**
 * Поиск и сканер
 */
function handlePosSearch() {
  const val = document.getElementById('posSearch').value;
  // Авто-добавление по IMEI (15 цифр)
  if (val.length === 15 && /^\d+$/.test(val)) {
    const item = POS_RAW_DATA.find(x => x.variants && x.variants.some(v => v.imei && String(v.imei) === val));
    if (item) {
      const variant = item.variants.find(v => v.imei && String(v.imei) === val);
      addToCartFinal({
        purchase_id: variant.purchase_id,
        name: item.product_name + ' (IMEI: ' + variant.imei + ')',
        price: item.price, qty: 1, has_imei: true
      });
      document.getElementById('posSearch').value = '';
      toast('✅ IMEI добавлен автоматически', 's');
      return;
    }
  }
  filterCatalog();
}

function filterCatalog() {
  const q = document.getElementById('posSearch').value.toLowerCase();
  let items = POS_RAW_DATA;
  if (SEL_CLASS_ID) items = items.filter(x => ST.refs.classes.find(c => c.id == SEL_CLASS_ID)?.name === x.class_name);
  if (SEL_TYPE_ID) items = items.filter(x => ST.refs.prod_types.find(t => t.id == SEL_TYPE_ID)?.name === x.type_name);
  if (SEL_TEMPLATE_ID) items = items.filter(x => x.template_id == SEL_TEMPLATE_ID);
  if (q) items = items.filter(x => x.product_name.toLowerCase().includes(q) || (x.variants && x.variants.some(v => v.imei && String(v.imei).includes(q))));
  renderPOSGrid(items);
}

function filterClass(id, btn) {
  document.querySelectorAll('#posClasses .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  SEL_CLASS_ID = id; SEL_TYPE_ID = 0; SEL_TEMPLATE_ID = 0;
  
  const typeBox = document.getElementById('posTypes');
  const tplBox = document.getElementById('posTemplates');
  tplBox.innerHTML = '';
  if (id === 0) typeBox.innerHTML = '';
  else {
    typeBox.innerHTML = `<div class="chip active" onclick="filterType(0, this)">Все типы</div>` + 
      ST.refs.prod_types.filter(t => t.class_id == id).map(t => `<div class="chip" onclick="filterType(${t.id}, this)">${esc(t.name)}</div>`).join('');
  }
  filterCatalog();
}

function filterType(id, btn) {
  document.querySelectorAll('#posTypes .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  SEL_TYPE_ID = id; SEL_TEMPLATE_ID = 0;
  
  const tplBox = document.getElementById('posTemplates');
  if (id === 0) tplBox.innerHTML = '';
  else {
    const tpls = (ST.mdm && ST.mdm.templates) ? ST.mdm.templates.filter(t => t.class_id == SEL_CLASS_ID && t.type_id == id) : [];
    if (tpls.length > 0) {
      tplBox.innerHTML = `<div class="chip active" onclick="filterTemplate(0, this)">Все назначения</div>` + 
        tpls.map(t => `<div class="chip" onclick="filterTemplate(${t.id}, this)">${esc(t.name)}</div>`).join('');
    } else {
      tplBox.innerHTML = '';
    }
  }
  filterCatalog();
}

function filterTemplate(id, btn) {
  document.querySelectorAll('#posTemplates .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  SEL_TEMPLATE_ID = id;
  filterCatalog();
}

/**
 * Работа с корзиной
 */
function addToCartByData(item) {
  if (item.has_imei) {
    if (item.variants.length > 1) promptImeiChoice(item); 
    else {
       const v = item.variants[0];
       addToCartFinal({ purchase_id: v.purchase_id, name: item.product_name + ' (IMEI: ' + v.imei + ')', price: item.price, qty: 1, has_imei: true });
    }
  } else {
    addToCartFinal({ purchase_id: item.purchase_id, name: item.product_name, price: item.price, qty: 1, has_imei: false });
  }
}

function addToCartFinal(obj) {
  const ex = CART.find(x => x.purchase_id === obj.purchase_id);
  if (ex && !obj.has_imei) ex.qty++;
  else if (!ex) CART.push(obj);
  renderCart();
}

function renderCart() {
  const box = document.getElementById('cartItems');
  box.innerHTML = CART.map((c, i) => `
    <div class="cart-item">
      <div style="flex:1">
        <div style="font-weight:700; font-size:0.85rem">${esc(c.name)}</div>
        <div style="color:var(--p-main); font-weight:800">${fmtN(c.price)}</div>
      </div>
      <div style="display:flex; align-items:center; gap:8px">
        <button class="btn btn-g btn-xs" onclick="updateQty(${i},-1)">-</button>
        <b style="min-width:20px; text-align:center">${c.qty}</b>
        <button class="btn btn-g btn-xs" onclick="updateQty(${i},1)" ${c.has_imei?'disabled':''}>+</button>
      </div>
    </div>
  `).join('');
  
  const total = CART.reduce((s, x) => s + x.price * x.qty, 0);
  document.getElementById('posTotal').textContent = fmtN(total);
  document.getElementById('cartCount').textContent = CART.length;
  document.getElementById('cartCountFab').textContent = CART.length;
  calcChange();
}

function updateQty(i, d) {
  CART[i].qty += d;
  if (CART[i].qty <= 0) CART.splice(i, 1);
  renderCart();
}

function clearCart() { if(confirm('Удалить все товары из чека?')) { CART = []; renderCart(); } }

/**
 * Оплата и подтверждение
 */
function selectWallet(id) {
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('wbtn-'+id);
  if (el) el.classList.add('active');
  SEL_WALLET_ID = id;
}

function toggleInstallment() {
  const on = document.getElementById('checkInstallment').checked;
  document.getElementById('posInstallmentFields').style.display = on ? 'block' : 'none';
  document.getElementById('lblChange').textContent = on ? 'Остаток долга' : 'Сдача';
  calcChange();
}

function calcChange() {
  const total = CART.reduce((s, x) => s + x.price * x.qty, 0);
  const isInst = document.getElementById('checkInstallment').checked;
  const received = parseFloat(document.getElementById('posReceived').value) || 0;
  const initial = parseFloat(document.getElementById('posInitial').value) || 0;
  
  if (isInst) {
    document.getElementById('posChange').textContent = fmtN(Math.max(0, total - initial));
  } else {
    document.getElementById('posChange').textContent = received > total ? fmtN(received - total) : '0';
  }
}

async function payOrder() {
  if (!CART.length) return toast('🛒 Корзина пуста', 'w');
  
  const isInst = document.getElementById('checkInstallment').checked;
  const total = CART.reduce((s, x) => s + x.price * x.qty, 0);
  const initialAmt = isInst ? (parseFloat(document.getElementById('posInitial').value) || 0) : total;
  
  // Валидация
  if (isInst) {
    if (!document.getElementById('posBuyer').value || !document.getElementById('posPhone').value) {
      return toast('👤 Заполните данные покупателя', 'w');
    }
  }
  if (!SEL_WALLET_ID && (!isInst || initialAmt > 0)) {
    return toast('💳 Выберите кошелек для приема оплаты', 'w');
  }

  // Сбор данных
  const saleParams = {
    cart: [...CART],
    wallet_id: SEL_WALLET_ID,
    shift_id: CURRENT_SHIFT.id,
    manager_id: CURRENT_SHIFT.manager_id,
    buyer: document.getElementById('posBuyer').value,
    phone: document.getElementById('posPhone').value,
    is_installment: isInst,
    initial_payment: initialAmt
  };

  // 1. Оптимистичная печать - показываем модалку
  const printData = {
    receipt_id: 'PRELOAD-' + Date.now(),
    buyer: saleParams.buyer || 'Розничный покупатель',
    items: saleParams.cart.map(c => ({ product_name: c.name, qty: c.qty, price: c.price })),
    totalAmount: total, 
    received: received > total ? received : total,
    change: received > total ? received - total : 0,
    saleDate: new Date().toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'}),
    managerName: ST.refs.managers.find(m => m.id == CURRENT_SHIFT.manager_id)?.name || 'Менеджер'
  };
  showInlineReceiptModal(printData);

  // 2. Сброс UI
  CART = []; renderCart();
  document.getElementById('posReceived').value = '';
  if (isInst) { document.getElementById('checkInstallment').checked = false; toggleInstallment(); }

  // 3. Отправка на сервер
  try {
    const res = await api('processPosSale', saleParams);
    toast('🚀 Чек #' + res.receipt_id + ' успешно сохранен', 's');
    loadPOS(); 
  } catch (e) {
    toast('❌ Ошибка сохранения! Обратитесь в поддержку.', 'e');
  }
}

function focusSearch() { document.getElementById('posSearch').focus(); }
function toggleCartMobile() { document.getElementById('posCartPanel').classList.toggle('open'); }

// Внешние вызовы (диалоги)
function openReturnDialog() { 
  if (typeof showReturnModalPos === 'function') showReturnModalPos();
  else toast('Функция поиска чеков загружается...', 'i');
}

function showInlineReceiptModal(data) {
  let modal = document.getElementById('inlineReceiptModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'inlineReceiptModal';
    modal.className = 'modal-overlay';
    modal.style.display = 'none';
    modal.style.position = 'fixed';
    modal.style.top = '0'; modal.style.left = '0'; modal.style.width = '100%'; modal.style.height = '100%';
    modal.style.background = 'rgba(0,0,0,0.5)';
    modal.style.zIndex = '9999';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    document.body.appendChild(modal);
  }
  
  const itemsHtml = data.items.map(i => `<tr><td class="item-name" style="padding:4px 0; border-bottom:1px dashed #eee;">${i.product_name}</td><td class="item-qty" style="text-align:center; padding:4px 0; border-bottom:1px dashed #eee;">${i.qty}</td><td class="item-total" style="text-align:right; padding:4px 0; border-bottom:1px dashed #eee;">${fmtN(i.price * i.qty)}</td></tr>`).join('');
  
  modal.innerHTML = `
    <div class="modal" style="max-width:400px; background:white; border-radius:12px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,0.3);">
      <div class="modal-header" style="background:#f5f5f5; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd;">
        <span class="modal-title" style="font-weight:bold; font-size:1.1rem;">Чек</span>
        <button class="modal-close" style="background:none; border:none; font-size:1.2rem; cursor:pointer;" onclick="document.getElementById('inlineReceiptModal').style.display='none'">✕</button>
      </div>
      <div class="modal-body" style="padding:20px;">
        <div class="receipt" id="receiptContent" style="font-family:'Courier New', Courier, monospace; font-size:14px; color:#000;">
          <div class="receipt-header" style="text-align:center; margin-bottom:15px;">
            <h3 style="margin:0 0 5px 0; font-size:1.2rem;">📱 МобайлШоп</h3>
            <div>Кассовый чек</div>
            <div style="font-size:11px;color:#666;margin-top:3px;">${data.saleDate} | Чек ${data.receipt_id}</div>
            <div style="font-size:11px;color:#666;">Кассир: ${data.managerName}</div>
          </div>
          <div class="receipt-divider" style="border-top:2px dashed #000; margin:10px 0;"></div>
          <div class="receipt-items">
            <table style="width:100%; border-collapse:collapse;">
              <tbody>${itemsHtml}</tbody>
            </table>
          </div>
          <div class="receipt-divider" style="border-top:2px dashed #000; margin:10px 0;"></div>
          <div class="receipt-totals">
            <div class="row grand" style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.1rem; margin-bottom:5px;"><span>ИТОГО:</span><span>${fmtN(data.totalAmount)}</span></div>
            ${data.received ? `<div class="row" style="display:flex; justify-content:space-between; font-size:0.9rem;"><span>Оплата (нал.):</span><span>${fmtN(data.received)}</span></div>` : ''}
            ${data.change ? `<div class="row" style="display:flex; justify-content:space-between; font-size:0.9rem;"><span>Сдача:</span><span>${fmtN(data.change)}</span></div>` : ''}
          </div>
          <div class="receipt-divider" style="border-top:2px dashed #000; margin:10px 0;"></div>
          <div class="receipt-footer" style="text-align:center; font-size:12px;">
            <div>Спасибо за покупку!</div>
          </div>
        </div>
        <div class="receipt-actions" style="margin-top:20px; display:flex; gap:10px;">
          <button class="btn btn-secondary" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; background:#f9f9f9; cursor:pointer;" onclick="document.getElementById('inlineReceiptModal').style.display='none'">Закрыть</button>
          <button class="btn btn-primary" style="flex:1; padding:10px; border-radius:8px; border:none; background:#1a1a1a; color:white; cursor:pointer; font-weight:bold;" onclick="printInlineReceipt()">🖨 Печать</button>
        </div>
      </div>
    </div>
  `;
  modal.style.display = 'flex';
}

function printInlineReceipt() {
  const content = document.getElementById('receiptContent').innerHTML;
  const printWindow = window.open('', '', 'width=400,height=600');
  printWindow.document.write('<html><head><title>Печать чека</title><style>body{font-family:"Courier New", Courier, monospace; margin:0; padding:10px; width:300px;}</style></head><body>');
  printWindow.document.write(content);
  printWindow.document.write('</body></html>');
  printWindow.document.close();
  printWindow.focus();
  setTimeout(() => {
    printWindow.print();
    printWindow.close();
  }, 500);
}
</script>
