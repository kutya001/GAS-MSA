<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMD - Master Data Management</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Настройка Tailwind (опционально) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>

  <!-- Babel для компиляции JSX "на лету" -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">
  <div id="root"></div>

  <!-- Основной код приложения -->
  <script type="text/babel" data-type="module">
    // Подтягиваем зависимости через ESM-провайдер
    import React, { useState, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Settings, Box, Plus, Trash2, Save, X, Edit2, List, 
      ChevronLeft, BookOpen, FileJson, Download, Upload, 
      HelpCircle, FileText, GripVertical, PlusCircle, FunctionSquare,
      LayoutGrid, Table, CheckCircle, AlertCircle, Palette
    } from 'https://esm.sh/lucide-react@0.292.0';

    const generateId = () => Math.random().toString(36).substr(2, 9);

    // --- КОНТЕКСТ ФУНКЦИЙ EXCEL ---
    const excelFunctions = {
      СЦЕПИТЬ: (...args) => args.join(''),
      ПСТР: (text, start, num) => String(text).substr(start - 1, num),
      ЛЕВСИМВ: (text, num = 1) => String(text).slice(0, num),
      ПРАВСИМВ: (text, num = 1) => String(text).slice(-num),
      СЖПРОБЕЛЫ: (text) => String(text).trim(),
      ДЛСТР: (text) => String(text).length,
      ПОИСК: (find, text) => { const idx = String(text).indexOf(find); return idx >= 0 ? idx + 1 : 0; },
      ТЕКСТ: (val) => String(val),
      РАЗНДАТ: (start, end, unit) => {
        const d1 = new Date(start); const d2 = new Date(end);
        if (isNaN(d1) || isNaN(d2)) return 0;
        const diffTime = Math.abs(d2 - d1);
        if (unit === 'd' || unit === 'д') return Math.floor(diffTime / (1000 * 60 * 60 * 24));
        if (unit === 'm' || unit === 'м') return Math.floor(diffTime / (1000 * 60 * 60 * 24 * 30.44));
        if (unit === 'y' || unit === 'г') return Math.floor(diffTime / (1000 * 60 * 60 * 24 * 365.25));
        return diffTime;
      },
      ТДАТА: () => new Date().toLocaleString(),
      СЕГОДНЯ: () => new Date().toLocaleDateString(),
      ДЕНЬ: (d) => new Date(d).getDate(),
      МЕСЯЦ: (d) => new Date(d).getMonth() + 1,
      ГОД: (d) => new Date(d).getFullYear(),
      ДЕНЬНЕДЕЛИ: (d) => { const day = new Date(d).getDay(); return day === 0 ? 7 : day; },
      ЕСЛИ: (cond, t, f) => cond ? t : f,
      И: (...args) => args.every(Boolean),
      ИЛИ: (...args) => args.some(Boolean),
      НЕ: (cond) => !cond
    };

    // --- УТИЛИТЫ ДЛЯ ЦВЕТА ---
    const hexToRgb = (hex) => {
      let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : { r: 0, g: 0, b: 0 };
    };

    const rgbToHex = (r, g, b) => {
      return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).padStart(6, '0');
    };

    // --- КОМПОНЕНТ РЕДАКТОРА ФОРМУЛ ---
    const FormulaInput = ({ attr, allAttributes, onChange }) => {
      const inputRef = useRef(null);
      const [showHints, setShowHints] = useState(false);

      const insertText = (text) => {
        const input = inputRef.current;
        if (!input) return;
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const val = input.value;
        const newVal = val.substring(0, start) + text + val.substring(end);
        onChange(newVal);
        setTimeout(() => { input.focus(); input.setSelectionRange(start + text.length, start + text.length); }, 0);
      };

      return (
        <div className="w-full relative flex flex-col gap-1.5">
          <input 
            ref={inputRef} type="text" className="w-full px-3 py-2 text-sm border border-green-300 rounded bg-white focus:ring-2 focus:ring-green-500 font-mono"
            value={attr.formula || ''} onChange={e => onChange(e.target.value)} placeholder='Напр: СЦЕПИТЬ({Бренд}, " ", {Модель})'
          />
          <div className="flex justify-between items-center bg-gray-50 p-1.5 rounded border">
            <div className="flex flex-wrap gap-1">
              {allAttributes.filter(a => a.id !== attr.id && a.name).map(a => (
                <button key={a.id} type="button" onClick={() => insertText(`{${a.name}}`)} className="px-1.5 py-0.5 bg-blue-100 text-blue-700 text-[10px] font-medium rounded hover:bg-blue-200 transition-colors">
                  {a.name}
                </button>
              ))}
              {allAttributes.length <= 1 && <span className="text-[10px] text-gray-400">Сначала создайте атрибуты</span>}
            </div>
            <button type="button" onClick={() => setShowHints(!showHints)} className="ml-2 px-2 py-1 text-[10px] bg-green-100 text-green-700 hover:bg-green-200 rounded font-bold flex items-center shrink-0">
              <FunctionSquare size={12} className="mr-1"/> Функции
            </button>
          </div>
          
          {showHints && (
            <div className="mt-1 p-2 bg-white border border-gray-200 rounded text-xs shadow-lg max-h-48 overflow-y-auto z-10 absolute top-full left-0 w-full">
              <div className="grid grid-cols-2 gap-x-4 gap-y-2">
                <div><strong className="text-gray-700">Текст:</strong><br/>
                  <span className="text-blue-600 cursor-pointer hover:underline" onClick={()=>insertText('СЦЕПИТЬ(')}>СЦЕПИТЬ(т1, т2)</span>, 
                  <span className="text-blue-600 cursor-pointer hover:underline" onClick={()=>insertText('ПСТР(')}>ПСТР(текст, нач, кол)</span>, 
                  <span className="text-blue-600 cursor-pointer hover:underline" onClick={()=>insertText('ЛЕВСИМВ(')}>ЛЕВСИМВ(т, кол)</span>, 
                  <span className="text-blue-600 cursor-pointer hover:underline" onClick={()=>insertText('СЖПРОБЕЛЫ(')}>СЖПРОБЕЛЫ(т)</span>
                </div>
                <div><strong className="text-gray-700">Даты:</strong><br/>
                  <span className="text-blue-600 cursor-pointer hover:underline" onClick={()=>insertText('СЕГОДНЯ()')}>СЕГОДНЯ()</span>, 
                  <span className="text-blue-600 cursor-pointer hover:underline" onClick={()=>insertText('РАЗНДАТ(')}>РАЗНДАТ(д1, д2, "д")</span>, 
                  <span className="text-blue-600 cursor-pointer hover:underline" onClick={()=>insertText('ГОД(')}>ГОД(д)</span>
                </div>
                <div className="col-span-2"><strong className="text-gray-700">Логические & Математика:</strong><br/>
                  <span className="text-blue-600 cursor-pointer hover:underline" onClick={()=>insertText('ЕСЛИ(')}>ЕСЛИ(условие, да, нет)</span>, 
                  <span className="text-gray-600">+ - * / &gt; &lt; ==</span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('templates'); // 'templates' | 'products' | 'dictionaries' | 'docs'
      const [docsTab, setDocsTab] = useState('architecture'); // 'architecture' | 'tables' | 'fsd'

      // --- Состояние БД ---
      const [dictionaries, setDictionaries] = useState([]);
      const [templates, setTemplates] = useState([]);
      const [products, setProducts] = useState([]);

      // --- Настройки UI ---
      const [productViewMode, setProductViewMode] = useState('cards'); // 'cards' | 'table'

      // --- Состояния форм ---
      const [editingDict, setEditingDict] = useState(null);
      const [editingTemplate, setEditingTemplate] = useState(null);
      const [editingProduct, setEditingProduct] = useState(null);

      // --- Уведомления (Toasts) ---
      const [toast, setToast] = useState({ show: false, message: '', type: 'error' });
      const notify = (message, type = 'error') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast(prev => ({ ...prev, show: false })), 4000);
      };

      // --- Состояние модального окна JSON ---
      const [jsonModal, setJsonModal] = useState({ isOpen: false, mode: 'export', content: '', title: '' });
      const [jsonInput, setJsonInput] = useState('');

      // --- Drag & Drop ---
      const [draggedAttrIndex, setDraggedAttrIndex] = useState(null);

      // === ЛОГИКА СПРАВОЧНИКОВ ===
      const handleCreateDict = () => setEditingDict({ id: generateId(), name: '', items: [], rawItems: '', isNew: true });
      const handleEditDict = (dict) => setEditingDict({ ...dict, rawItems: dict.items.join(', ') });

      const handleSaveDict = () => {
        if (!editingDict.name.trim()) return notify('Укажите название справочника', 'error');
        const parsedItems = editingDict.rawItems !== undefined 
          ? editingDict.rawItems.split(',').map(s => s.trim()).filter(s => s) 
          : editingDict.items;
        const dictToSave = { id: editingDict.id, name: editingDict.name, items: parsedItems };

        setDictionaries(prev => editingDict.isNew ? [...prev, dictToSave] : prev.map(d => d.id === editingDict.id ? dictToSave : d));
        setEditingDict(null);
        notify('Справочник сохранен', 'success');
      };

      const handleDeleteDict = (id) => {
        if (templates.some(t => t.attributes.some(a => a.type === 'reference' && a.dictionaryId === id))) {
          return notify('Справочник используется в одном из шаблонов. Удаление невозможно.', 'error');
        }
        setDictionaries(prev => prev.filter(d => d.id !== id));
        notify('Справочник удален', 'success');
      };

      // === ЛОГИКА ШАБЛОНОВ ===
      const handleCreateTemplate = () => setEditingTemplate({ id: generateId(), name: '', description: '', attributes: [], isNew: true });

      const handleAddAttribute = (index = -1) => {
        const newAttr = { 
          id: generateId(), name: '', type: 'string', options: '', 
          dictionaryId: '', isRequired: false, displayStyle: 'list', 
          formula: '', description: '' 
        };
        setEditingTemplate(prev => {
          const attrs = [...prev.attributes];
          if (index === -1 || index >= attrs.length) attrs.push(newAttr);
          else attrs.splice(index + 1, 0, newAttr);
          return { ...prev, attributes: attrs };
        });
      };

      const handleUpdateAttribute = (id, field, value) => {
        setEditingTemplate(prev => ({
          ...prev, attributes: prev.attributes.map(attr => attr.id === id ? { ...attr, [field]: value } : attr)
        }));
      };

      const handleRemoveAttribute = (id) => setEditingTemplate(prev => ({ ...prev, attributes: prev.attributes.filter(attr => attr.id !== id) }));

      const handleDragStart = (e, index) => { setDraggedAttrIndex(index); e.dataTransfer.effectAllowed = "move"; };
      const handleDragOver = (e, index) => {
        e.preventDefault();
        if (draggedAttrIndex === null || draggedAttrIndex === index) return;
        setEditingTemplate(prev => {
          const newAttrs = [...(prev.attributes || [])];
          const draggedItem = newAttrs[draggedAttrIndex];
          newAttrs.splice(draggedAttrIndex, 1);
          newAttrs.splice(index, 0, draggedItem);
          return { ...prev, attributes: newAttrs };
        });
        setDraggedAttrIndex(index);
      };
      const handleDragEnd = () => setDraggedAttrIndex(null);

      const handleSaveTemplate = () => {
        if (!(editingTemplate.name || '').trim()) return notify('Укажите название шаблона', 'error');
        for (const attr of (editingTemplate.attributes || [])) {
          if (!(attr.name || '').trim()) return notify('У всех атрибутов должно быть заполнено название', 'error');
          if ((attr.type === 'enum_radio' || attr.type === 'enum_checkbox') && !(attr.options || '').trim()) return notify(`Укажите опции для атрибута "${attr.name}"`, 'error');
          if (attr.type === 'reference' && !attr.dictionaryId) return notify(`Выберите справочник для атрибута "${attr.name}"`, 'error');
          if (attr.type === 'calculated' && !(attr.formula || '').trim()) return notify(`Укажите формулу для атрибута "${attr.name}"`, 'error');
        }
        setTemplates(prev => {
          if (editingTemplate.isNew) {
            const { isNew, ...newTemplate } = editingTemplate;
            return [...prev, newTemplate];
          }
          return prev.map(t => t.id === editingTemplate.id ? editingTemplate : t);
        });
        setEditingTemplate(null);
        notify('Шаблон успешно сохранен', 'success');
      };

      const handleDeleteTemplate = (id) => {
        if (products.some(p => p.templateId === id)) return notify('Невозможно удалить: существуют связанные товары.', 'error');
        setTemplates(prev => prev.filter(t => t.id !== id));
        notify('Шаблон удален', 'success');
      };

      // === ЛОГИКА ТОВАРОВ И ФОРМУЛ ===
      const handleCreateProduct = () => setEditingProduct({ id: generateId(), templateId: '', name: '', sku: '', attributeValues: {}, isNew: true });
      const handleProductAttributeChange = (attrId, value) => setEditingProduct(prev => ({ ...prev, attributeValues: { ...prev.attributeValues, [attrId]: value } }));

      const handleCheckboxChange = (attrId, option, isChecked) => {
        setEditingProduct(prev => {
          const currentArr = Array.isArray(prev.attributeValues[attrId]) ? prev.attributeValues[attrId] : [];
          return { ...prev, attributeValues: { ...prev.attributeValues, [attrId]: isChecked ? [...currentArr, option] : currentArr.filter(i => i !== option) } };
        });
      };

      const handleMultiSelectChange = (attrId, selectedOptions) => setEditingProduct(prev => ({ ...prev, attributeValues: { ...prev.attributeValues, [attrId]: Array.from(selectedOptions, o => o.value) } }));

      const handleSaveProduct = () => {
        if (!editingProduct.name.trim()) return notify('Укажите наименование номенклатуры', 'error');
        if (!editingProduct.templateId) return notify('Выберите шаблон (категорию) товара', 'error');
        
        const template = templates.find(t => t.id === editingProduct.templateId);
        if (template) {
          for (const attr of template.attributes) {
            if (attr.isRequired && attr.type !== 'calculated') {
              const val = editingProduct.attributeValues[attr.id];
              if (val == null || (typeof val === 'string' && !val.trim()) || (Array.isArray(val) && !val.length)) {
                return notify(`Обязательное поле "${attr.name}" не заполнено!`, 'error');
              }
            }
          }
        }
        setProducts(prev => editingProduct.isNew ? [...prev, { ...editingProduct, isNew: undefined }] : prev.map(p => p.id === editingProduct.id ? editingProduct : p));
        setEditingProduct(null);
        notify('Товар успешно сохранен', 'success');
      };

      const handleDeleteProduct = (id) => {
        setProducts(prev => prev.filter(p => p.id !== id));
        notify('Товар удален', 'success');
      };

      const evaluateFormula = (formula, templateAttrs, attributeValues) => {
        if (!formula) return '';
        let parsedFormula = formula;
        
        templateAttrs.forEach(a => {
          const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const regex = new RegExp(`\\{${escapeRegExp(a.name)}\\}`, 'g');
          const val = attributeValues[a.id];
          let replacer = '""';
          
          if (val !== undefined && val !== null && val !== '') {
            if (!isNaN(Number(val)) && (a.type === 'integer' || a.type === 'float')) {
              replacer = Number(val);
            } else {
              replacer = JSON.stringify(val); 
            }
          } else if (a.type === 'integer' || a.type === 'float') {
            replacer = 0;
          }
          parsedFormula = parsedFormula.replace(regex, replacer);
        });

        try {
          const fnNames = Object.keys(excelFunctions);
          const fnValues = Object.values(excelFunctions);
          const fn = new Function(...fnNames, `return ${parsedFormula};`);
          return fn(...fnValues);
        } catch (e) {
          return '#ОШИБКА';
        }
      };

      // === ЛОГИКА JSON ===
      const openJsonModal = (mode, data = null, title = '') => {
        setJsonModal({ isOpen: true, mode, title });
        if (mode === 'export' || mode === 'schema') {
          setJsonInput(JSON.stringify(data, null, 2));
        } else {
          setJsonInput('');
        }
      };

      const handleImportJson = () => {
        try {
          if (!jsonInput.trim()) throw new Error("JSON пуст");
          const parsed = JSON.parse(jsonInput);
          const templatesToAdd = Array.isArray(parsed) ? parsed : [parsed];
          
          if (!templatesToAdd.every(t => t.id && t.name && Array.isArray(t.attributes))) {
            throw new Error('Неверная структура JSON (отсутствует id, name или attributes)');
          }

          setTemplates(prev => {
            const newT = [...prev];
            templatesToAdd.forEach(t => { 
              const idx = newT.findIndex(ext => ext.id === t.id); 
              if (idx >= 0) newT[idx] = t; 
              else newT.push(t); 
            });
            return newT;
          });
          notify('Шаблоны успешно импортированы!', 'success');
          setJsonModal({ isOpen: false, mode: 'export', title: '' });
          setJsonInput('');
        } catch (e) { 
          notify(`Ошибка импорта: ${e.message}`, 'error'); 
        }
      };

      const handleCopyToClipboard = (textToCopy) => {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = textToCopy || jsonInput;
          textArea.style.position = "fixed";
          textArea.style.left = "-9999px";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          notify('Скопировано в буфер обмена!', 'success');
        } catch (err) {
          notify('Не удалось скопировать. Выделите и скопируйте вручную.', 'error');
        }
      };

      const renderAttributeValueForTable = (attr, product, template) => {
        if (attr.type === 'calculated') return evaluateFormula(attr.formula, template.attributes, product.attributeValues);
        const val = product.attributeValues[attr.id];
        if (val === undefined || val === null || val === '') return <span className="text-gray-300">-</span>;
        if (attr.type === 'boolean') return val === 'true' || val === true ? <span className="text-green-600 font-medium">Да</span> : <span className="text-gray-400">Нет</span>;
        if (attr.type === 'color_rgb') return (
          <div className="flex items-center gap-1.5">
            <span className="w-3.5 h-3.5 rounded-sm shadow-sm border border-gray-200" style={{backgroundColor: val}}></span>
            <span className="font-mono text-xs text-gray-600">{val}</span>
          </div>
        );
        if (Array.isArray(val)) return val.join(', ');
        return String(val);
      };

      // === РЕНДЕР: ШАБЛОНЫ ===
      const renderTemplateEditor = () => (
        <div className="bg-white md:rounded-lg md:shadow-sm md:border border-gray-200 min-h-[calc(100vh-64px)] md:min-h-0 flex flex-col">
          <div className="flex items-center p-4 border-b md:p-6 bg-gray-50/50">
            <button onClick={() => setEditingTemplate(null)} className="mr-3 p-2 -ml-2 text-gray-500 hover:text-gray-700 md:hidden"><ChevronLeft size={24} /></button>
            <h2 className="text-lg font-bold text-gray-800 flex-1">{editingTemplate.isNew ? 'Новый шаблон' : 'Редактирование шаблона'}</h2>
            <button onClick={() => setEditingTemplate(null)} className="hidden md:block text-gray-500 hover:text-gray-700 bg-white border shadow-sm p-1.5 rounded-md"><X size={18} /></button>
          </div>

          <div className="p-4 md:p-6 space-y-6 flex-1 overflow-y-auto bg-gray-50/30">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-4 rounded-lg border shadow-sm">
              <div className="col-span-1 md:col-span-2">
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1.5">Наименование шаблона</label>
                <input type="text" className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 font-medium" value={editingTemplate.name} onChange={e => setEditingTemplate({ ...editingTemplate, name: e.target.value })} placeholder="Например: Смартфоны" />
              </div>
              <div className="col-span-1 md:col-span-2">
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1.5">Описание шаблона (необязательно)</label>
                <textarea className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 text-sm h-16 resize-none" value={editingTemplate.description || ''} onChange={e => setEditingTemplate({ ...editingTemplate, description: e.target.value })} placeholder="Для чего используется этот шаблон..." />
              </div>
            </div>

            <div>
              <div className="flex justify-between items-center mb-3">
                <label className="block text-sm font-bold text-gray-800">Атрибуты спецификации</label>
                {editingTemplate.attributes.length === 0 && (
                  <button onClick={() => handleAddAttribute(-1)} className="flex items-center text-sm font-medium text-white bg-blue-600 px-3 py-1.5 rounded-md hover:bg-blue-700 shadow-sm"><Plus size={16} className="mr-1" /> Добавить</button>
                )}
              </div>

              <div className="space-y-2">
                {editingTemplate.attributes.map((attr, index) => (
                  <div 
                    key={attr.id} draggable onDragStart={(e) => handleDragStart(e, index)} onDragOver={(e) => handleDragOver(e, index)} onDragEnd={handleDragEnd}
                    className={`bg-white p-3 rounded-lg border shadow-sm transition-all flex flex-col gap-2 ${draggedAttrIndex === index ? 'opacity-50 ring-2 ring-blue-400' : 'hover:border-gray-300'}`}
                  >
                    <div className="flex items-center gap-2">
                      <div className="cursor-grab text-gray-300 hover:text-gray-500 active:cursor-grabbing p-1"><GripVertical size={18}/></div>
                      <input type="text" className="flex-1 min-w-[120px] px-3 py-1.5 border border-gray-300 rounded text-sm font-medium focus:ring-2 focus:ring-blue-500" value={attr.name} onChange={e => handleUpdateAttribute(attr.id, 'name', e.target.value)} placeholder="Название (напр. Цвет)" />
                      
                      <select className="w-40 px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500 bg-gray-50" value={attr.type} onChange={e => handleUpdateAttribute(attr.id, 'type', e.target.value)}>
                        <optgroup label="Базовые">
                          <option value="string">Текст</option>
                          <option value="integer">Целое число</option>
                          <option value="float">Дробное число</option>
                          <option value="boolean">Да/Нет</option>
                        </optgroup>
                        <optgroup label="Продвинутые">
                          <option value="date">Дата</option>
                          <option value="datetime">Дата и время</option>
                          <option value="color_rgb">Цвет (RGB/Палитра)</option>

                              </div>
                            ) : (
                              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                                <table className="min-w-full divide-y divide-gray-200 text-sm">
                                  <thead className="bg-gray-50">
                                    <tr>
                                      <th className="px-4 py-3 text-left font-bold text-gray-600">Артикул / Наименование</th>
                                      {group.template.attributes.map(attr => (
                                        <th key={attr.id} className="px-4 py-3 text-left font-bold text-gray-600 whitespace-nowrap">{attr.name}</th>
                                      ))}
                                      <th className="px-4 py-3 text-right font-bold text-gray-600">Действия</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-gray-200 bg-white">
                                    {group.items.map(product => (
                                      <tr key={product.id} className="hover:bg-blue-50/30 transition-colors">
                                        <td className="px-4 py-3">
                                          {product.sku && <div className="text-xs font-mono text-gray-400">{product.sku}</div>}
                                          <div className="font-bold text-gray-800">{product.name}</div>
                                        </td>
                                        {group.template.attributes.map(attr => (
                                          <td key={attr.id} className="px-4 py-3 text-gray-700 whitespace-nowrap">
                                            {renderAttributeValueForTable(attr, product, group.template)}
                                          </td>
                                        ))}
                                        <td className="px-4 py-3 text-right whitespace-nowrap">
                                          <button onClick={() => setEditingProduct({...product})} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg mr-1"><Edit2 size={16} /></button>
                                          <button onClick={() => handleDeleteProduct(product.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded-lg"><Trash2 size={16} /></button>
                                        </td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            )}
                          </div>
                        ))}

                        {uncategorizedProducts.length > 0 && (
                          <div className="mb-6 opacity-70">
                            <h3 className="text-xl font-bold text-gray-500 flex items-center mb-4"><Box className="mr-2" size={20}/> Без категории (Шаблон удален)</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                              {uncategorizedProducts.map(product => (
                                 <div key={product.id} className="bg-white p-4 rounded-xl border flex justify-between items-start">
                                   <div>
                                     {product.sku && <p className="text-xs font-mono text-gray-400 mb-0.5">SKU: {product.sku}</p>}
                                     <h3 className="font-bold text-gray-600 mb-1 leading-tight">{product.name}</h3>
                                     <span className="text-xs font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded border border-gray-200">Ошибка связи</span>
                                   </div>
                                   <button onClick={() => handleDeleteProduct(product.id)} className="p-2 text-red-600 hover:bg-red-50 rounded-lg"><Trash2 size={18} /></button>
                                 </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {jsonModal.isOpen && (
              <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[90vh]">
                  <div className="flex items-center justify-between p-5 border-b">
                    <h3 className="text-lg font-bold text-gray-800 flex items-center"><FileJson className="mr-2 text-blue-600"/> {jsonModal.mode === 'schema' ? 'Инструкция по JSON' : jsonModal.title || 'JSON Редактор'}</h3>
                    <button onClick={() => setJsonModal({ isOpen: false, mode: 'export' })} className="text-gray-400 hover:text-gray-700 bg-gray-100 rounded-full p-1"><X size={20}/></button>
                  </div>
                  <div className="p-5 flex-1 overflow-hidden flex flex-col">
                    {jsonModal.mode === 'export' && (
                      <div className="mb-3 flex gap-2">
                        <button onClick={() => { setJsonModal(p => ({...p, mode: 'import', title: 'Импорт шаблонов JSON'})); setJsonInput(''); }} className="px-3 py-1.5 text-sm bg-blue-50 text-blue-700 rounded font-bold border border-blue-200 flex items-center hover:bg-blue-100 transition-colors"><Upload size={14} className="mr-1"/>Перейти к Импорту</button>
                        <button onClick={() => handleCopyToClipboard()} className="px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded font-bold border hover:bg-gray-200 flex items-center transition-colors"><Download size={14} className="mr-1"/>Копировать JSON</button>
                      </div>
                    )}
                    {jsonModal.mode === 'schema' && (
                      <div className="mb-3 flex justify-end">
                        <button onClick={() => handleCopyToClipboard(JSON.stringify(schemaDefinitionJson, null, 2))} className="px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded font-bold border hover:bg-gray-200 flex items-center transition-colors"><Download size={14} className="mr-1"/>Копировать схему</button>
                      </div>
                    )}
                    {jsonModal.mode === 'schema' ? (
                      <div className="flex-1 overflow-y-auto bg-gray-900 rounded-lg p-4 text-green-400 text-sm font-mono whitespace-pre-wrap">
                        {JSON.stringify(schemaDefinitionJson, null, 2)}
                      </div>
                    ) : (
                      <textarea className="w-full flex-1 border border-gray-300 rounded-lg p-4 font-mono text-sm bg-gray-50 resize-none focus:ring-2 focus:ring-blue-500" value={jsonInput} onChange={(e) => setJsonInput(e.target.value)} readOnly={jsonModal.mode === 'export'} placeholder={jsonModal.mode === 'import' ? 'Вставьте массив шаблонов (JSON) сюда...' : ''} />
                    )}
                  </div>
                  {jsonModal.mode === 'import' && (
                    <div className="p-4 border-t flex justify-end gap-3 bg-gray-50 rounded-b-xl"><button onClick={handleImportJson} className="px-5 py-2 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg flex items-center transition-colors"><Upload size={16} className="mr-2"/>Применить импорт</button></div>
                  )}
                </div>
              </div>
            )}
          </main>

          {!isEditing && (
            <nav className="md:hidden fixed bottom-0 w-full bg-white border-t flex justify-around items-center h-16 pb-safe z-20 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
              {[{ id: 'templates', icon: Settings, label: 'Шаблоны' }, { id: 'dictionaries', icon: BookOpen, label: 'Справочники' }, { id: 'products', icon: List, label: 'Товары' }, { id: 'docs', icon: FileText, label: 'Инфо' }].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === tab.id ? 'text-blue-600' : 'text-gray-500'}`}>
                  <tab.icon size={22} className={activeTab === tab.id ? 'opacity-100' : 'opacity-70'} />
                  <span className="text-[10px] font-bold">{tab.label}</span>
                </button>
              ))}
            </nav>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
