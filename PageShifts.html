<!-- ══ SHIFTS ════════════════════════════════════════════════════════ -->
<div class="page" id="page-shifts">
  <div class="sh">
    <h2>Управление сменами</h2>
    <p>Контроль кассовой дисциплины и выручки за смену</p>
    <div class="sh-acts" id="shiftActs">
      <!-- Динамические кнопки открытия/закрытия -->
    </div>
  </div>

  <div id="shiftStatusCard" style="margin-bottom:20px"></div>
  
  <div class="sh" style="margin-top:20px">
    <h3>История смен</h3>
  </div>
  <div id="shiftsTable"></div>
</div>

<script>
// Глобальный статус текущей смены (подгружается при навигации)
var CURRENT_SHIFT = null;

// Форма открытия смены
var openShiftForm = new MainForm({
  id: 'mfOpenShift', title: 'Открыть новую смену',
  fields: [
    { key: 'manager_id', label: 'Менеджер', type: 'select', required: true,
      getOptions: function() { return ST.refs.managers; }
    },
    { key: 'note', label: 'Примечание', type: 'text', span: 2 }
  ],
  onSave: async function(values) {
    await api('openShift', values);
    toast('Смена открыта', 's');
    await checkShiftStatus();
    loadShifts();
  },
  afterMount: function(mode, rec, form) {
    form.fillField('manager_id', ST.refs.managers, 'id', 'name', '—');
  }
});

// Форма закрытия смены
var closeShiftForm = new MainForm({
  id: 'mfCloseShift', title: 'Закрыть смену',
  fields: [
    { key: 'summary', label: 'Остатки по кошелькам', type: 'html', span: 2 },
    { key: 'note', label: 'Примечание', type: 'textarea', span: 2 }
  ],
  onSave: async function(values, id) {
    await api('closeShift', { id: id, note: values.note });
    toast('Смена закрыта', 's');
    await checkShiftStatus();
    loadShifts();
  },
  afterMount: function(mode, rec, form) {
    // Считаем расчетный остаток по каждому POS кошельку
    let html = '<div class="v-list">';
    ST.wallets.filter(w => w.is_pos).forEach(w => {
       html += `<div class="v-item" style="display:flex; justify-content:space-between">
                  <span>${esc(w.name)}</span>
                  <b class="mono">${fmtN(w.balance)} ${esc(w.currency)}</b>
                </div>`;
    });
    html += '</div><p style="font-size:0.8rem; margin-top:10px; color:var(--text-mut)">Нажмите «Сохранить» для фиксации итогов и закрытия смены.</p>';
    form.fillField('summary', html);
  }
});

// Детализация смены
async function showShiftDetails(id) {
  const data = await api('getShiftDetails', { shift_id: id });
  if (!data) return;
  
  const mId = 'modal-shift-details';
  const shift = data.shift;
  const isClosed = shift.status === 'Закрыта';
  
  let html = `
    <div class="m" style="max-width:850px; width:95%; animation: slideUp 0.3s ease;">
      <div class="m-h">
        <span>Детали смены #${id}</span>
        <span class="badge ${shift.status === 'Открыта' ? 'bg' : 'bgr'}">${shift.status}</span>
      </div>
      <div class="m-b" style="background: var(--bg); padding:10px 0 0 0">
        <div class="rtabs" id="sdTabs" style="padding: 0 17px">
          <button class="rtab on" data-target="sd-fin">💰 Итоги</button>
          <button class="rtab" data-target="sd-sales">🧾 Чеки</button>
          <button class="rtab" data-target="sd-ops">🔄 Операции</button>
        </div>
        
        <div class="sd-container" style="background: var(--surf); padding: 20px; min-height: 350px">
          <div class="sd-content on" id="sd-fin">
            <h4 style="margin-bottom:15px; font-size:0.9rem">📊 Движение по кошелькам</h4>
            <div class="tw">
              <table class="table-sm">
                <thead><tr><th>Кошелёк</th><th>Начало</th><th>Текущий/Конец</th><th>Разница</th></tr></thead>
                <tbody>
                  ${ST.wallets.filter(w => w.is_pos).map(w => {
                    const sB = shift.start_balances[w.id] || 0;
                    const eB = isClosed ? (shift.end_balances[w.id] || 0) : (w.balance || 0);
                    const diff = eB - sB;
                    return `
                      <tr>
                        <td><b>${esc(w.icon)} ${esc(w.name)}</b></td>
                        <td class="mono">${fmtN(sB)}</td>
                        <td class="mono">${fmtN(eB)}</td>
                        <td class="mono ${diff > 0 ? 'tg' : (diff < 0 ? 'tr' : '')}">
                          ${diff > 0 ? '+' : ''}${fmtN(diff)}
                        </td>
                      </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
            <div style="margin-top:20px; padding:15px; background:var(--acbg); border-radius:var(--r); display:flex; justify-content:space-between; align-items:center">
               <span style="font-weight:700; color:var(--ac)">💵 Справочно: Выручка за смену (KGS)</span>
               <span style="font-size:1.4rem; font-weight:900; color:var(--ac)">${fmtN(shift.revenue_kgs || 0)}</span>
            </div>
          </div>
          
          <div class="sd-content" id="sd-sales" style="display:none">
            <h4 style="margin-bottom:15px; font-size:0.9rem">🧾 Список продаж за смену</h4>
            <div class="tw">
              <table class="table-sm">
                <thead><tr><th>ID Чека</th><th>Товар</th><th>Сумма</th><th style="width:40px"></th></tr></thead>
                <tbody>
                  ${data.sales.map(s => `
                    <tr>
                      <td><code class="imeic">${esc(s.receipt_id)}</code></td>
                      <td>${esc(s.product_name)}</td>
                      <td class="mono fw7">${fmtN(s.total)}</td>
                      <td><button class="btn btn-g btn-xs" onclick="printReceiptById('${s.receipt_id}')">🖨️</button></td>
                    </tr>`).join('') || '<tr><td colspan="4" class="empty">Нет продаж в этой смене</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
          
          <div class="sd-content" id="sd-ops" style="display:none">
            <h4 style="margin-bottom:15px; font-size:0.9rem">🔄 Прочие движения средств</h4>
            <div class="tw">
              <table class="table-sm">
                <thead><tr><th>Тип</th><th>Категория</th><th>Сумма</th><th>Комментарий</th></tr></thead>
                <tbody>
                  ${data.ops.map(o => {
                    const inc = o.op_type === 'Приход';
                    return `
                      <tr>
                        <td><span class="badge ${inc?'bg':'br'}">${inc ? '↑ ' : '↓ '}${o.op_type}</span></td>
                        <td>${esc(o.cat_name)}</td>
                        <td class="mono fw7 ${inc?'tg':'tr'}">${fmtN(o.amount)}</td>
                        <td style="font-size:0.75rem; opacity:0.8">${esc(o.comment || '—')}</td>
                      </tr>`;
                  }).join('') || '<tr><td colspan="4" class="empty">Других операций не зафиксировано</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      <div class="m-f">
        <button class="btn btn-g" onclick="closeM('${mId}')">Закрыть</button>
      </div>
    </div>
  `;
  
  let div = document.getElementById(mId);
  if (!div) { div = document.createElement('div'); div.id = mId; div.className = 'ov'; document.body.appendChild(div); }
  div.innerHTML = html;
  div.classList.add('open');
  document.body.classList.add('locked');
  
  // Логика табов
  div.querySelectorAll('.rtab').forEach(btn => {
    btn.onclick = () => {
      div.querySelectorAll('.rtab').forEach(b => b.classList.remove('on'));
      div.querySelectorAll('.sd-content').forEach(c => c.style.display = 'none');
      btn.classList.add('on');
      document.getElementById(btn.dataset.target).style.display = 'block';
    };
  });
}

// Проверка статуса смены
async function checkShiftStatus() {
  const res = await api('getShiftStatus');
  // API возвращает объект или null. Если объект, он может быть в .data (из-за обертки _ok)
  // Но в Shifts.js getShiftStatus возвращает _ok(openShift || null).
  // Значит на фронте результат api() для GAS — это сам объект {status:'ok', data:...}
  CURRENT_SHIFT = res;
  
  const acts = document.getElementById('shiftActs');
  const card = document.getElementById('shiftStatusCard');
  const indicator = document.getElementById('shiftIndicator');
  
  if (CURRENT_SHIFT) {
    acts.innerHTML = `<button class="btn btn-r btn-sm" onclick="closeShiftForm.openEdit(CURRENT_SHIFT)">Закрыть смену</button>`;
    const mgr = ST.refs.managers.find(m => m.id == CURRENT_SHIFT.manager_id);
    card.innerHTML = `
      <div class="wcard on" style="width:100%; border-left: 4px solid var(--p-main)">
        <div class="wname">🟢 Смена открыта: ${esc(mgr ? mgr.name : 'Менеджер')}</div>
        <div class="wcurr">Начало: ${CURRENT_SHIFT.opened_at}</div>
        <div style="margin-top:10px; font-size:0.8rem; opacity:0.8">${esc(CURRENT_SHIFT.note || '')}</div>
      </div>
    `;
    if (indicator) {
      indicator.innerHTML = `<span class="badge bg" style="cursor:pointer" onclick="nav('shifts')">🟢 Смена: ${esc(mgr ? mgr.name.split(' ')[0] : 'ON')}</span>`;
    }
  } else {
    acts.innerHTML = `<button class="btn btn-p btn-sm" onclick="openShiftForm.openCreate()">Открыть смену</button>`;
    card.innerHTML = `
      <div class="wcard" style="width:100%; opacity:0.6">
        <div class="wname">🔴 Смена закрыта</div>
        <p>Откройте смену для начала работы с POS-терминалом</p>
      </div>
    `;
    if (indicator) {
      indicator.innerHTML = `<span class="badge br" style="cursor:pointer" onclick="nav('shifts')">🔴 Смена закрыта</span>`;
    }
  }
}

var _shiftsDT = null;
function loadShifts() {
  if (!_shiftsDT) {
    _shiftsDT = new DT({
      id: 'shifts', containerId: 'shiftsTable',
      cols: [
        { key: 'id', label: 'ID', w: '50px' },
        { key: 'manager_name', label: 'Менеджер' },
        { key: 'opened_at', label: 'Открыта', w: '140px' },
        { key: 'closed_at', label: 'Закрыта', w: '140px', render: v => v || '—' },
        { key: 'status', label: 'Статус', render: v => `<span class="badge ${v === 'Открыта' ? 'bg' : 'bc'}">${v}</span>` },
        { key: 'revenue', label: 'Выручка', align: 'right', mono: true, render: v => fmtN(v) },
        { label: 'Действия', align: 'center', sortable: false, w: '80px',
          render: (v, r) => `<button class="btn btn-g btn-xs" onclick="showShiftDetails(${r.id})">👁️ Детали</button>`
        }
      ]
    });
  }
  
  api('getShiftHistory').then(data => {
    _shiftsDT.setData(data);
  });
}

</script>
