<!-- ══ ANALYTICS ══════════════════════════════════════════════════════════ -->
<div class="page" id="page-analytics">
  <div class="sh"><h2>Аналитика</h2></div>
  <div class="fbar" style="margin-bottom:11px">
    <label>От</label><input type="date" class="fi fi-sm" id="af-from" onchange="loadAnalytics()">
    <label>До</label><input type="date" class="fi fi-sm" id="af-to" onchange="loadAnalytics()">
    <button class="btn btn-g btn-sm" onclick="clearF('af',loadAnalytics)">✕</button>
  </div>
  <div class="cgrid" style="margin-bottom:10px">
    <div class="ccard"><h3>📊 Выручка / Прибыль</h3><div class="cwrap"><canvas id="chAnM"></canvas></div></div>
    <div class="ccard"><h3>🏆 Топ брендов</h3><div class="cwrap"><canvas id="chAnB"></canvas></div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px" id="anTopGrid">
    <div class="tw"><div class="ttb"><span class="fw7" style="font-size:.74rem">🥇 Топ по кол-ву</span></div>
      <table><thead><tr><th>Модель</th><th>Шт.</th></tr></thead><tbody id="anTC"></tbody></table></div>
    <div class="tw"><div class="ttb"><span class="fw7" style="font-size:.74rem">💰 Топ по прибыли</span></div>
      <table><thead><tr><th>Модель</th><th>Прибыль</th></tr></thead><tbody id="anTP"></tbody></table></div>
  </div>
  <div class="tw"><div class="ttb"><span class="fw7" style="font-size:.74rem">📋 Сводка по брендам</span></div>
    <div class="tscr"><table>
      <thead><tr><th>Бренд</th><th>Продано</th><th>Выручка</th><th>Прибыль</th><th>Маржа %</th></tr></thead>
      <tbody id="anBS"></tbody>
    </table></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  ANALYTICS
// ════════════════════════════════════════════════════════════════
async function loadAnalytics(){
  const d=await api('getAnalytics',{dateFrom:g('af-from'),dateTo:g('af-to')}); if(!d) return;
  const m=d.monthly||[];
  killChart('anm');killChart('anb');
  ST.charts.anm=mkBar(document.getElementById('chAnM'),m.map(x=>x.m),[{label:'Выручка',data:m.map(x=>x.rev)},{label:'Прибыль',data:m.map(x=>x.profit)}]);
  const bs=d.brandStats||[];
  ST.charts.anb=mkDoughnut(document.getElementById('chAnB'),bs.map(x=>x.brand),bs.map(x=>x.rev));
  document.getElementById('anTC').innerHTML=(d.topByCount||[]).map(x=>`<tr><td>${esc(x.model)}</td><td class="fw7">${x.cnt}</td></tr>`).join('')||eRow(2);
  document.getElementById('anTP').innerHTML=(d.topByProfit||[]).map(x=>`<tr><td>${esc(x.model)}</td><td class="mono tg fw7">${fmtN(x.profit)} ${CUR}</td></tr>`).join('')||eRow(2);
  document.getElementById('anBS').innerHTML=bs.map(x=>`<tr><td class="fw7">${esc(x.brand)}</td><td>${x.sold}</td><td class="mono">${fmtN(x.rev)} ${CUR}</td><td class="mono tg fw7">${fmtN(x.profit)} ${CUR}</td><td class="fw7">${x.margin}%</td></tr>`).join('')||eRow(5);
}
</script>
