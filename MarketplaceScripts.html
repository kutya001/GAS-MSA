var MP_IS_GAS = typeof google !== 'undefined' && google.script;
function mpApi(fn, params){
  return new Promise(function(ok,fail){
    if(MP_IS_GAS){
      google.script.run.withSuccessHandler(ok).withFailureHandler(fail)[fn](params);
    } else {
      ok({status:'ok',data:null});
    }
  });
}

function mpToggleTheme(){
  var d = document.documentElement;
  var dark = d.dataset.theme === 'dark';
  d.dataset.theme = dark ? 'light' : 'dark';
  localStorage.setItem('theme', d.dataset.theme);
  document.getElementById('mpThIco').textContent = dark ? '🌙' : '☀️';
}
function mpApplyTheme(){
  var t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = t;
  document.getElementById('mpThIco').textContent = t === 'dark' ? '☀️' : '🌙';
}

// ──────────────────────────────────────────────────────────────────────
//  ФИЛЬТРАЦИЯ И ПОИСК
// ──────────────────────────────────────────────────────────────────────
function mpGetFiltered(){
  var f = MP.filters;
  var list = MP_PRODUCTS.filter(function(p){
    if(f.category !== 'all' && p.category !== f.category) return false;
    if(f.brand !== 'all' && p.brand !== f.brand) return false;
    if(f.search){
      var q = f.search.toLowerCase();
      if(p.name.toLowerCase().indexOf(q) === -1 && p.brand.toLowerCase().indexOf(q) === -1) return false;
    }
    return true;
  });
  // Сортировка
  if(f.sort === 'price_asc'){
    list.sort(function(a,b){ return mpMinPrice(a) - mpMinPrice(b); });
  } else if(f.sort === 'price_desc'){
    list.sort(function(a,b){ return mpMinPrice(b) - mpMinPrice(a); });
  } else if(f.sort === 'rating'){
    list.sort(function(a,b){ return b.rating - a.rating; });
  } else if(f.sort === 'name'){
    list.sort(function(a,b){ return a.name.localeCompare(b.name); });
  }
  // 'popular' — по умолчанию, порядок массива
  return list;
}

function mpMinPrice(p){
  var prices = (p.sellers_new||[]).concat(p.sellers_used||[]).map(function(s){ return s.price; });
  return prices.length ? Math.min.apply(null, prices) : 999999;
}
function mpMaxPrice(p){
  var prices = (p.sellers_new||[]).concat(p.sellers_used||[]).map(function(s){ return s.price; });
  return prices.length ? Math.max.apply(null, prices) : 0;
}
function mpSellerCount(p){
  var ids = {};
  (p.sellers_new||[]).concat(p.sellers_used||[]).forEach(function(s){ ids[s.seller_id]=1; });
  return Object.keys(ids).length;
}

function mpOpenProduct(id){
  var p = MP_PRODUCTS.filter(function(x){ return x.id === id; })[0];
  if(!p) return;
  MP.productId = id;
  MP.view = 'detail';
  MP.detailTab = 'description';
  MP.sellerTab = 'new';

  // Скрыть каталог, показать детали
  document.getElementById('mpCatalog').classList.add('hide');
  var det = document.getElementById('mpDetail');
  det.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});

  // Хлебные крошки
  var catName = p.category === 'phones' ? 'Смартфоны' : 'Аксессуары';
  document.getElementById('mpBread').innerHTML =
    '<a onclick="mpBackToCatalog()">Каталог</a><span>›</span><a onclick="mpBackToCatalog()">'+mpEsc(catName)+'</a><span>›</span><span style="color:var(--mp-tx)">'+mpEsc(p.name)+'</span>';

  // Шапка товара
  document.getElementById('mpProdImg').innerHTML = p.emoji;
  document.getElementById('mpProdImg').style.background =
    'linear-gradient(135deg,'+p.color+' 0%,'+mpLighten(p.color)+' 100%)';
  document.getElementById('mpProdCat').textContent = catName + ' · ' + p.brand;
  document.getElementById('mpProdName').textContent = p.name;
  document.getElementById('mpProdBrand').textContent = p.brand;
  document.getElementById('mpProdStars').textContent = mpStars(p.rating);
  document.getElementById('mpProdRval').textContent = p.rating;
  document.getElementById('mpProdRcnt').textContent = p.reviews.length + ' ' + mpDeclension(p.reviews.length, ['отзыв','отзыва','отзывов']);

  // Диапазон цен
  var minP = mpMinPrice(p), maxP = mpMaxPrice(p);
  document.getElementById('mpProdPriceVal').textContent = minP === maxP
    ? mpFmt(minP) + ' сом'
    : mpFmt(minP) + ' — ' + mpFmt(maxP) + ' сом';
  var sc = mpSellerCount(p);
  document.getElementById('mpProdPriceSub').textContent = sc + ' ' + mpDeclension(sc, ['продавец','продавца','продавцов']) + ' предлагают этот товар';

  // Мета-теги
  var metaHtml = '<div class="mp-meta-tag">📦 '+mpEsc(catName)+'</div>'
    + '<div class="mp-meta-tag">🏷️ '+mpEsc(p.brand)+'</div>';
  if(p.specs['Память']) metaHtml += '<div class="mp-meta-tag">💾 '+mpEsc(p.specs['Память'])+'</div>';
  if(p.specs['Аккумулятор']) metaHtml += '<div class="mp-meta-tag">🔋 '+mpEsc(p.specs['Аккумулятор'])+'</div>';
  document.getElementById('mpProdMeta').innerHTML = metaHtml;

  // Вкладки — счётчики
  document.getElementById('mpTabReviewsCnt').textContent = p.reviews.length;
  var totalSellers = (p.sellers_new||[]).length + (p.sellers_used||[]).length;
  document.getElementById('mpTabSellersCnt').textContent = totalSellers;

  // Контент вкладок
  mpRenderDescription(p);
  mpRenderSpecs(p);
  mpRenderReviews(p);
  mpRenderSellers(p);
  mpSwitchTab('description');
}

function mpBackToCatalog(){
  MP.view = 'catalog';
  MP.productId = null;
  document.getElementById('mpDetail').classList.remove('on');
  document.getElementById('mpCatalog').classList.remove('hide');
  window.scrollTo({top:0,behavior:'smooth'});
}

        return '<div class="mp-spec-row"><div class="mp-spec-k">'+mpEsc(k)+'</div><div class="mp-spec-v">'+mpEsc(p.specs[k])+'</div></div>';

// ── Отзывы ────────────────────────────────────────────────────────
function mpRenderReviews(p){
  var revs = p.reviews || [];
  if(!revs.length){
    document.getElementById('mpReviewsContent').innerHTML = '<div class="mp-sell-empty">Отзывов пока нет</div>';
    return;
  }
  // Средняя оценка и распределение
  var avg = revs.reduce(function(s,r){ return s+r.rating; },0) / revs.length;
  var dist = [0,0,0,0,0];
  revs.forEach(function(r){ dist[r.rating-1]++; });

  var html = '<div class="mp-reviews-summary">'
    + '<div class="mp-rv-avg"><div class="mp-rv-avg-num">'+avg.toFixed(1)+'</div>'
    + '<div class="mp-rv-avg-stars">'+mpStars(avg)+'</div>'
    + '<div class="mp-rv-avg-cnt">'+revs.length+' '+mpDeclension(revs.length,['отзыв','отзыва','отзывов'])+'</div></div>'
    + '<div class="mp-rv-bars">';
  for(var i=4; i>=0; i--){
    var pct = revs.length ? Math.round(dist[i]/revs.length*100) : 0;
    html += '<div class="mp-rv-bar"><span class="mp-rv-bar-lbl">'+(i+1)+'</span>'
      + '<div class="mp-rv-bar-track"><div class="mp-rv-bar-fill" style="width:'+pct+'%"></div></div>'
      + '<span class="mp-rv-bar-cnt">'+dist[i]+'</span></div>';
  }
  html += '</div></div><div class="mp-rv-list">';
  html += revs.map(function(r){
    return '<div class="mp-rv-card"><div class="mp-rv-top">'
      + '<div class="mp-rv-avatar">'+mpInitials(r.author)+'</div>'
      + '<div><div class="mp-rv-author">'+mpEsc(r.author)+'</div>'
      + '<div class="mp-rv-date">'+mpFmtDate(r.date)+'</div></div>'
      + '<div class="mp-rv-stars">'+mpStars(r.rating)+'</div></div>'
      + '<div class="mp-rv-text">'+mpEsc(r.text)+'</div></div>';
  }).join('');
  html += '</div>';
  document.getElementById('mpReviewsContent').innerHTML = html;
}

function mpSwitchTab(tab){
  MP.detailTab = tab;
  document.querySelectorAll('.mp-tab').forEach(function(t){ t.classList.remove('on'); });
  document.querySelectorAll('.mp-tpanel').forEach(function(p){ p.classList.remove('on'); });
  var tabBtn = document.querySelector('.mp-tab[data-tab="'+tab+'"]');
  var tabPanel = document.getElementById('mpPanel_'+tab);
  if(tabBtn) tabBtn.classList.add('on');
  if(tabPanel) tabPanel.classList.add('on');
}

function mpSwitchSellerTab(tab){
  MP.sellerTab = tab;
  document.querySelectorAll('.mp-sell-tab').forEach(function(t){ t.classList.remove('on'); });
  document.querySelector('.mp-sell-tab[data-st="'+tab+'"]').classList.add('on');
  document.getElementById('mpSellNewList').style.display = tab === 'new' ? 'block' : 'none';
  document.getElementById('mpSellUsedList').style.display = tab === 'used' ? 'block' : 'none';
}

// ──────────────────────────────────────────────────────────────────────
//  ХЕЛПЕРЫ
// ──────────────────────────────────────────────────────────────────────
function mpDeclension(n, forms){
  // forms: [1, 2-4, 5-20]
  var abs = Math.abs(n) % 100;
  var n1 = abs % 10;
  if(abs > 10 && abs < 20) return n + ' ' + forms[2];
  if(n1 > 1 && n1 < 5) return n + ' ' + forms[1];
  if(n1 === 1) return n + ' ' + forms[0];
  return n + ' ' + forms[2];
}

function mpLighten(hex){
  // Осветлить HEX-цвет на 40% для градиента
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + Math.round((255-r)*0.4));
  g = Math.min(255, g + Math.round((255-g)*0.4));
  b = Math.min(255, b + Math.round((255-b)*0.4));
  return '#' + [r,g,b].map(function(c){ return c.toString(16).padStart(2,'0'); }).join('');
}

function mpFmtDate(d){
  if(!d) return '—';
  var dt = new Date(d);
  return dt.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
}

// ──────────────────────────────────────────────────────────────────────
//  ОБРАБОТЧИКИ СОБЫТИЙ
// ──────────────────────────────────────────────────────────────────────
function mpOnSearch(val){
  MP.filters.search = val;
  mpRenderCatalog();
}

function mpOnCategory(cat){
  MP.filters.category = cat;
  document.querySelectorAll('.mp-cat').forEach(function(c){ c.classList.remove('on'); });
  document.querySelector('.mp-cat[data-cat="'+cat+'"]').classList.add('on');
  mpRenderCatalog();
}

function mpOnBrand(brand){
  MP.filters.brand = brand;
  mpRenderCatalog();
}

function mpOnSort(sort){
  MP.filters.sort = sort;
  mpRenderCatalog();
}

// Обработка кнопки "Назад" в браузере
window.addEventListener('popstate', function(){
  if(MP.view === 'detail') mpBackToCatalog();
});

// ──────────────────────────────────────────────────────────────────────
//  ИНИЦИАЛИЗАЦИЯ
// ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  mpApplyTheme();
  mpRenderCatalog();

  // Мобильный поиск — синхронизация с десктопным
  var heroSearch = document.getElementById('mpHeroSearch');
  var hdrSearch = document.getElementById('mpHdrSearch');
  if(heroSearch) heroSearch.addEventListener('input', function(){ mpOnSearch(this.value); if(hdrSearch) hdrSearch.value = this.value; });
  if(hdrSearch) hdrSearch.addEventListener('input', function(){ mpOnSearch(this.value); if(heroSearch) heroSearch.value = this.value; });

  // Категории
  document.querySelectorAll('.mp-cat').forEach(function(btn){
    btn.addEventListener('click', function(){ mpOnCategory(this.dataset.cat); });
  });

  // Фильтры
  var brandSel = document.getElementById('mpBrandFilter');
  if(brandSel) brandSel.addEventListener('change', function(){ mpOnBrand(this.value); });

  var sortSel = document.getElementById('mpSortFilter');
  if(sortSel) sortSel.addEventListener('change', function(){ mpOnSort(this.value); });

  // Вкладки товара
  document.querySelectorAll('.mp-tab').forEach(function(t){
    t.addEventListener('click', function(){ mpSwitchTab(this.dataset.tab); });
  });

  // Вкладки продавцов
  document.querySelectorAll('.mp-sell-tab').forEach(function(t){
    t.addEventListener('click', function(){ mpSwitchSellerTab(this.dataset.st); });
  });
});
</script>
