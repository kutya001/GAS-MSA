<!-- ══ REFS ═══════════════════════════════════════════════════════════════ -->
<div class="page" id="page-refs">
  <div class="sh"><h2>Справочники</h2>
    <div class="sh-acts"><button class="btn btn-p btn-sm" onclick="refForm.openCreate()">+ Добавить</button></div>
  </div>
  <div class="ptabs" id="refTabs">
    <button class="ptab on" onclick="showRefTab('brands',this)">Бренды</button>
    <button class="ptab" onclick="showRefTab('models',this)">Модели</button>
    <button class="ptab" onclick="showRefTab('suppliers',this)">Поставщики</button>
    <button class="ptab" onclick="showRefTab('managers',this)">Менеджеры</button>
    <button class="ptab" onclick="showRefTab('currencies',this)">Валюты</button>
    <button class="ptab" onclick="showRefTab('classes',this)">Классы</button>
    <button class="ptab" onclick="showRefTab('prod_types',this)">Типы продуктов</button>
    <button class="ptab" onclick="showRefTab('purposes',this)">Назначения</button>
  </div>
  <div id="refsTable"></div>
</div>
<!-- ══ CATS ══════════════════════════════════════════════════════════════ -->
<div class="page" id="page-cats">
  <div class="sh"><h2>Категории и статьи</h2><p>Структура статей для кассовых операций (Приход / Расход)</p>
    <div class="sh-acts">
      <button class="btn btn-g btn-sm" onclick="catForm.openCreate()">+ Категория</button>
      <button class="btn btn-p btn-sm" onclick="articleForm.openCreate()">+ Статья</button>
    </div>
  </div>
  <div class="ptabs">
    <button class="ptab on" onclick="showCatTab('Приход',this)">↑ Приход</button>
    <button class="ptab" onclick="showCatTab('Расход',this)">↓ Расход</button>
  </div>
  <div class="ct" id="catTree"></div>
</div>
<script>
// ════════════════════════════════════════════════════════════════
//  REFS FORM
// ════════════════════════════════════════════════════════════════
var _curRef = 'brands';
var refForm = new MainForm({
  id: 'mfRef',
  title: function(mode, rec) {
    var labels = { brands: 'Бренд', models: 'Модель', suppliers: 'Поставщик', managers: 'Менеджер', currencies: 'Валюта',
      classes: 'Класс', prod_types: 'Тип продукта', purposes: 'Назначение' };
    return labels[_curRef] || 'Справочник';
  },
  fields: [
    { key: 'brand_id', label: 'Бренд', type: 'select', required: true,
      getOptions: function() { return ST.refs.brands || []; },
      showIf:  function() { return _curRef === 'models'; },
      renderView: function(v, r) { return esc(r.brand_name || v); }
    },
    { key: 'class_id', label: 'Класс', type: 'select', required: true,
      getOptions: function() { return ST.refs.classes || []; },
      showIf:  function() { return _curRef === 'prod_types'; },
      renderView: function(v, r) { return esc(r.class_name || v); }
    },
    { key: 'type_id', label: 'Тип продукта', type: 'select', required: true,
      getOptions: function() { return ST.refs.prod_types || []; },
      showIf:  function() { return _curRef === 'purposes'; },
      renderView: function(v, r) { return esc(r.type_name || v); }
    },
    { key: 'name', label: 'Название', type: 'text', required: true },
    { key: 'info', label: 'Доп. инфо', type: 'text', placeholder: 'Описание, телефон...' }
  ],
  onSave: async function(values, editId) {
    var data = { tab: _curRef, name: values.name, info: values.info,
                 brand_id: _curRef === 'models' ? (+values.brand_id || null) : null,
                 class_id: _curRef === 'prod_types' ? (+values.class_id || null) : null,
                 type_id: _curRef === 'purposes' ? (+values.type_id || null) : null };
    if (editId) await api('updateRef', Object.assign({ id: editId }, data));
    else        await api('addRef', data);
    toast('Сохранено', 's');
    await _reloadRefs();
  },
  onDelete: async function(id) {
    await api('deleteRef', { id: id, tab: _curRef });
    toast('Удалено', 's');
    await _reloadRefs();
  },
  afterMount: function(mode, rec, form) {
    form.fillField('brand_id', ST.refs.brands || [], 'id', 'name', '—');
    form.fillField('class_id', ST.refs.classes || [], 'id', 'name', '—');
    form.fillField('type_id', ST.refs.prod_types || [], 'id', 'name', '—');
  }
});
async function _reloadRefs() {
  var d = await api('getRefData'); if (d) ST.refs = d;
  _refDTinit().setData(ST.refs[_curRef] || []);
}
// ════════════════════════════════════════════════════════════════
//  REFS DT
// ════════════════════════════════════════════════════════════════
var _refDT = null;
function _refDTinit() {
  if (_refDT) return _refDT;
  _refDT = new DT({
    id: 'refs', containerId: 'refsTable',
    onAdd:      function() { refForm.openCreate(); },
    onRowClick: function(r) { refForm.openView(r); },
    cols: [
      { key: 'id',         label: 'ID',       w: '56px', mono: true,
        render: function(v) { return '<span class="muted">#' + v + '</span>'; }
      },
      { key: 'brand_name', label: 'Бренд',    sortable: false },
      { key: 'class_name', label: 'Класс',    sortable: false },
      { key: 'type_name',  label: 'Тип',      sortable: false },
      { key: 'name',       label: 'Название', render: function(v) { return '<b>' + esc(v) + '</b>'; } },
      { key: 'info',       label: 'Доп. инфо', sortable: false }
    ]
  });
  return _refDT;
}
async function loadRefs() { showRefTab(_curRef, null); }
function showRefTab(tab, el) {
  _curRef = tab;
  document.querySelectorAll('#refTabs .ptab').forEach(function(x) { x.classList.remove('on'); });
  if (el) el.classList.add('on');
  var dt = _refDTinit();
  dt.setColVis('brand_name', tab === 'models');
  dt.setColVis('class_name', tab === 'prod_types');
  dt.setColVis('type_name', tab === 'purposes');
  dt.setData(ST.refs[tab] || []);
}
// ════════════════════════════════════════════════════════════════
//  CAT FORM
// ════════════════════════════════════════════════════════════════
var catForm = new MainForm({
  id: 'mfCat', title: 'Категория',
  fields: [
    { key: 'op_type', label: 'Тип',       type: 'select', required: true,
      options: ['Приход', 'Расход'], emptyLabel: '— Тип —'
    },
    { key: 'name',    label: 'Название',  type: 'text',   required: true },
    { key: 'note',    label: 'Примечание', type: 'text' }
  ],
  onSave: async function(values, editId) {
    if (editId) await api('updateCat', { id: editId, op_type: values.op_type, name: values.name, note: values.note });
    else        await api('addCat',    { op_type: values.op_type, name: values.name, note: values.note });
    toast('Категория сохранена', 's');
    var c = await api('getCats'); if (c) ST.cats = c;
    renderCatTree();
  },
  onDelete: async function(id) {
    await api('deleteCat', { id: id });
    toast('Категория удалена', 's');
    var res = await Promise.all([api('getCats'), api('getArticles')]);
    if (res[0]) ST.cats = res[0]; if (res[1]) ST.articles = res[1];
    renderCatTree();
  }
});
// ════════════════════════════════════════════════════════════════
//  ARTICLE FORM
// ════════════════════════════════════════════════════════════════
var _curCatTab = 'Приход';
var articleForm = new MainForm({
  id: 'mfArt', title: 'Статья',
  fields: [
    { key: 'cat_id', label: 'Категория', type: 'select', required: true,
      getOptions: function() { return ST.cats.filter(function(c) { return c.op_type === _curCatTab; }); }
    },
    { key: 'name', label: 'Название',   type: 'text', required: true },
    { key: 'note', label: 'Примечание', type: 'text' }
  ],
  onSave: async function(values, editId) {
    if (editId) await api('updateArticle', { id: editId, cat_id: +values.cat_id, name: values.name, note: values.note });
    else        await api('addArticle',    { cat_id: +values.cat_id, name: values.name, note: values.note });
    toast('Статья сохранена', 's');
    var a = await api('getArticles'); if (a) ST.articles = a;
    renderCatTree();
  },
  onDelete: async function(id) {
    await api('deleteArticle', { id: id });
    toast('Статья удалена', 's');
    var a = await api('getArticles'); if (a) ST.articles = a;
    renderCatTree();
  },
  afterMount: function(mode, rec, form) {
    form.fillField('cat_id', ST.cats.filter(function(c) { return c.op_type === _curCatTab; }), 'id', 'name', '—');
  }
});
// ════════════════════════════════════════════════════════════════
//  CATS + ARTICLES TREE
// ════════════════════════════════════════════════════════════════
function _catById(id) { return (ST.cats || []).find(function(x) { return x.id === id; }); }
function _artById(id) { return (ST.articles || []).find(function(x) { return x.id === id; }); }
async function loadCats() { renderCatTree(); }
function showCatTab(tab, el) {
  _curCatTab = tab;
  document.querySelectorAll('#page-cats .ptab').forEach(function(x) { x.classList.remove('on'); });
  if (el) el.classList.add('on');
  renderCatTree();
}
function renderCatTree() {
  var cats = (ST.cats || []).filter(function(c) { return c.op_type === _curCatTab; });
  var tree = document.getElementById('catTree');
  if (!cats.length) {
    tree.innerHTML = '<div style="padding:24px;text-align:center;color:var(--tx3)">Нет категорий</div>';
    return;
  }
  tree.innerHTML = cats.map(function(cat) {
    var arts = (ST.articles || []).filter(function(a) { return a.cat_id === cat.id; });
    var icon = _curCatTab === 'Приход' ? '↑' : '↓';
    return '<div class="ct-grp">' +
      '<div class="ct-hd">' +
        '<span>' + icon + '</span>' +
        '<span>' + esc(cat.name) + '</span>' +
        '<span class="badge bgr" style="margin-left:auto">' + arts.length + '</span>' +
        '<button class="btn-icon" onclick="catForm.openView(_catById(' + cat.id + '))" style="margin-left:4px">✏️</button>' +
      '</div>' +
      '<div class="ct-rows">' +
        (arts.map(function(a) {
          return '<div class="ct-row">' +
            '<span class="ct-rn">• ' + esc(a.name) + '</span>' +
            '<button class="btn-icon" onclick="articleForm.openView(_artById(' + a.id + '))">✏️</button>' +
          '</div>';
        }).join('') || '<div style="color:var(--tx3);font-size:.7rem;padding:4px 0">Нет статей</div>') +
      '</div></div>';
  }).join('');
}
</script>
