<style>
/* ══ TOKENS ═══════════════════════════════════════════════════════ */
:root{
  --bg:#EDEAE4;--bg2:#E3DFD8;--bg3:#D6D1C9;
  --surf:#F7F4EF;--surf2:#F0EDE7;
  --bdr:#C8C3BA;--bdr2:#B0AB9F;
  --tx:#1A1815;--tx2:#524B41;--tx3:#8C857A;
  --ac:#B83200;--ach:#D44000;--acbg:#FBF0EB;--acd:rgba(184,50,0,.12);
  --gn:#1A6040;--gnbg:#E0F2E8;
  --rd:#B02020;--rdbg:#FBE8E8;
  --am:#A05000;--ambg:#FEF2E0;
  --bl:#1048A0;--blbg:#EBF2FD;
  --pu:#5828A0;--pubg:#F0EBFC;
  --tl:#0A6E68;--tlbg:#E0F4F2;
  --s0:0 1px 2px rgba(26,24,21,.05);
  --s1:0 1px 4px rgba(26,24,21,.07),0 2px 8px rgba(26,24,21,.04);
  --s2:0 4px 16px rgba(26,24,21,.09),0 1px 3px rgba(26,24,21,.05);
  --s3:0 8px 32px rgba(26,24,21,.12);
  --s4:0 20px 60px rgba(26,24,21,.18);
  --r1:4px;--r:8px;--r2:12px;--r3:18px;
  --sbw:220px;--barh:54px;
  --fn:'Geologica',system-ui,sans-serif;
  --mo:'JetBrains Mono',monospace;
  --ez:cubic-bezier(.4,0,.2,1);--t:.15s;
}
[data-theme=dark]{
  --bg:#0E0D0B;--bg2:#161411;--bg3:#1E1B17;
  --surf:#171512;--surf2:#1D1A16;
  --bdr:#28251E;--bdr2:#333028;
  --tx:#EDE8DF;--tx2:#8C857A;--tx3:#524B41;
  --ac:#D84000;--ach:#F05020;--acbg:#1E0800;--acd:rgba(216,64,0,.15);
  --gn:#28A060;--gnbg:#061A10;
  --rd:#D84040;--rdbg:#160606;
  --am:#D06800;--ambg:#180E00;
  --bl:#4888D8;--blbg:#061228;
  --pu:#8850D8;--pubg:#120620;
  --tl:#28A098;--tlbg:#041614;
  --s0:0 1px 2px rgba(0,0,0,.4);--s1:0 2px 6px rgba(0,0,0,.5);
  --s2:0 4px 16px rgba(0,0,0,.55);--s3:0 8px 32px rgba(0,0,0,.65);--s4:0 20px 60px rgba(0,0,0,.75);
}
/* ══ RESET ════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100dvh;display:flex;overflow-x:hidden;transition:background var(--t),color var(--t);-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--fn);border:none;background:none}
input,select,textarea{font-family:var(--fn)}
::-webkit-scrollbar{width:5px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}
::selection{background:var(--acd)}
/* ══ SIDEBAR ══════════════════════════════════════════════════════ */
.sb{width:var(--sbw);background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:400;transition:transform var(--t) var(--ez)}
.sb-logo{padding:11px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px;flex-shrink:0}
.sb-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--ac),var(--ach));display:grid;place-items:center;color:#fff;font-size:.82rem;font-weight:900;flex-shrink:0;letter-spacing:-.04em}
.sb-txt .sbn{font-size:.75rem;font-weight:800;color:var(--tx);letter-spacing:-.02em;line-height:1.2}
.sb-txt .sbs{font-size:.58rem;color:var(--tx3);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:5px 0;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.sb-sec{padding:7px 11px 2px;font-size:.57rem;font-weight:700;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px 8px 13px;margin:1px 4px;border-radius:var(--r1);font-size:.82rem;font-weight:500;color:var(--tx2);transition:all var(--t);width:calc(100% - 8px);text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.sb-item:hover{background:var(--bg2);color:var(--tx)}
.sb-item.on{background:var(--acbg);color:var(--ac);font-weight:700}
.sb-item svg{width:16px;height:16px;flex-shrink:0;opacity:.5;transition:opacity var(--t)}
.sb-item:hover svg,.sb-item.on svg{opacity:1}
.sb-foot{padding:7px 9px;border-top:1px solid var(--bdr);flex-shrink:0}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:399;backdrop-filter:blur(3px)}
/* ══ MAIN LAYOUT ══════════════════════════════════════════════════ */
.main{margin-left:var(--sbw);flex:1;display:flex;flex-direction:column;min-width:0;min-height:100dvh}
.topbar{height:var(--barh);background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;gap:9px;position:sticky;top:0;z-index:300;flex-shrink:0}
.topbar-title{font-size:.94rem;font-weight:800;color:var(--tx);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.burger{display:none;align-items:center;justify-content:center;width:30px;height:30px;border-radius:var(--r1);border:1px solid var(--bdr);color:var(--tx2);transition:all var(--t);flex-shrink:0}
.burger:hover{background:var(--bg2)}
.topbar-date{font-size:.65rem;color:var(--tx3);font-variant-numeric:tabular-nums;white-space:nowrap}
.sync-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:var(--r1);border:1px solid rgba(184,50,0,.3);background:var(--acbg);color:var(--ac);cursor:pointer;transition:all var(--t)}
.sync-btn:hover{background:var(--ac);color:#fff}
.sync-btn.loading svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.content{padding:18px;flex:1;min-width:0;overflow-x:hidden}
/* ══ PAGES ════════════════════════════════════════════════════════ */
.page{display:none;animation:pgIn .16s var(--ez)}
.page.on{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* ══ BUTTONS ══════════════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:var(--r1);font-size:.8rem;font-weight:600;transition:all var(--t);white-space:nowrap;cursor:pointer;font-family:var(--fn);letter-spacing:-.01em}
.btn-p{background:var(--ac);color:#fff;box-shadow:0 2px 6px var(--acd)}
.btn-p:hover{background:var(--ach);box-shadow:0 4px 12px rgba(184,50,0,.28);transform:translateY(-1px)}
.btn-p:active{transform:none}
.btn-g{background:transparent;color:var(--tx2);border:1px solid var(--bdr)}
.btn-g:hover{background:var(--bg2);color:var(--tx)}
.btn-gn{background:var(--gn);color:#fff}
.btn-gn:hover{opacity:.88}
.btn-sm{padding:5px 10px;font-size:.76rem}
.btn-xs{padding:3px 8px;font-size:.71rem}
.btn-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--r1);border:1px solid var(--bdr);background:var(--bg2);color:var(--tx2);cursor:pointer;transition:all var(--t)}
.btn-icon:hover{background:var(--bg3);color:var(--tx)}
/* ══ KPI GRID ═════════════════════════════════════════════════════ */
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(164px,1fr));gap:10px;margin-bottom:13px}
.kpi{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 13px;position:relative;overflow:hidden;transition:all var(--t)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--ac));border-radius:var(--r) var(--r) 0 0}
.kpi:hover{box-shadow:var(--s2);transform:translateY(-1px)}
.kpi-lbl{font-size:.65rem;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.kpi-val{font-size:1.4rem;font-weight:900;color:var(--tx);line-height:1;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:.62rem;color:var(--tx3);margin-top:3px}
/* ══ SECTION HEADER ═══════════════════════════════════════════════ */
.sh{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap}
.sh h2{font-size:1rem;font-weight:800;color:var(--tx);letter-spacing:-.025em;flex:1;min-width:120px}
.sh p{font-size:.69rem;color:var(--tx3);width:100%;margin-top:-7px}
.sh-acts{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap}
/* ══ FILTER BAR ═══════════════════════════════════════════════════ */
.fbar{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 14px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:10px;box-shadow:var(--s0)}
.fbar label{font-size:.68rem;color:var(--tx3);white-space:nowrap;font-weight:600}
.fi{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r1);padding:7px 9px;color:var(--tx);font-size:.79rem;outline:none;transition:border-color var(--t),box-shadow var(--t);min-width:80px;font-family:var(--fn)}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
.fi-sm{min-width:66px}.fi-lg{min-width:138px}
.srch{position:relative;display:flex;align-items:center}
.srch .si{position:absolute;left:7px;font-size:.75rem;color:var(--tx3);pointer-events:none;z-index:1}
.fi-s{padding-left:24px;min-width:164px;transition:all var(--t)}
.fi-s:focus{min-width:204px}
.fgap{flex:1;min-width:4px}
/* ══ TABLE ════════════════════════════════════════════════════════ */
.tw{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--s1)}
.ttb{padding:7px 11px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.tinf{font-size:.64rem;color:var(--tx3);margin-left:auto}
.tscr{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:480px}
thead th{padding:9px 12px;text-align:left;font-size:.64rem;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;background:var(--bg2);border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none;white-space:nowrap;transition:all var(--t)}
thead th:hover{color:var(--tx);background:var(--bg3)}
thead th.ns{cursor:default}
thead th.sa::after{content:' ↑';color:var(--ac)}
thead th.sd::after{content:' ↓';color:var(--ac)}
tbody tr{transition:background var(--t)}
tbody tr:hover{background:var(--bg2)}
tbody td{padding:9px 12px;font-size:.81rem;border-bottom:1px solid var(--bdr);color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
tbody tr:last-child td{border-bottom:none}
tfoot td{padding:9px 12px;font-size:.78rem;font-weight:700;background:var(--bg2);border-top:2px solid var(--bdr2)}
.tdx{display:flex;gap:3px;align-items:center}
.pgn{padding:7px 11px;display:flex;align-items:center;gap:3px;border-top:1px solid var(--bdr);flex-wrap:wrap}
.pgb{padding:3px 7px;border:1px solid var(--bdr);border-radius:var(--r1);background:var(--bg2);color:var(--tx2);font-size:.68rem;cursor:pointer;transition:all var(--t);font-family:var(--fn)}
.pgb:hover{background:var(--bg3)}
.pgb.cur{background:var(--ac);color:#fff;border-color:var(--ac)}
.pgi{font-size:.64rem;color:var(--tx3);margin-left:auto}
/* ══ BADGES ═══════════════════════════════════════════════════════ */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:.65rem;font-weight:700;white-space:nowrap}
.bg{background:var(--gnbg);color:var(--gn)}.br{background:var(--rdbg);color:var(--rd)}.ba{background:var(--ambg);color:var(--am)}.bb{background:var(--blbg);color:var(--bl)}.bp{background:var(--pubg);color:var(--pu)}.bt{background:var(--tlbg);color:var(--tl)}.bgr{background:var(--bg3);color:var(--tx3)}.bac{background:var(--acbg);color:var(--ac)}
/* ══ TABS ═════════════════════════════════════════════════════════ */
.tabs{display:flex;border-bottom:2px solid var(--bdr);margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 13px;font-size:.73rem;font-weight:600;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all var(--t);font-family:var(--fn);background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tp{display:none}.tp.on{display:block;animation:pgIn .13s var(--ez)}
.rtabs{display:flex;border-bottom:2px solid var(--bdr);margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.rtabs::-webkit-scrollbar{display:none}
.rtab{padding:7px 10px;font-size:.67rem;font-weight:700;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all var(--t);font-family:var(--fn);background:none;border-top:none;border-left:none;border-right:none}
.rtab:hover{color:var(--tx)}
.rtab.on{color:var(--ac);border-bottom-color:var(--ac)}
.rtab-c{font-size:.55rem;font-family:var(--mo);background:var(--bg2);padding:1px 4px;border-radius:3px;margin-right:3px;color:var(--tx3)}
.rtab.on .rtab-c{background:var(--acbg);color:var(--ac)}
.ptabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.ptab{padding:4px 10px;border-radius:99px;font-size:.7rem;font-weight:600;color:var(--tx2);background:var(--bg2);border:1px solid var(--bdr);cursor:pointer;transition:all var(--t);font-family:var(--fn)}
.ptab:hover{background:var(--bg3)}
.ptab.on{background:var(--ac);color:#fff;border-color:var(--ac)}
/* ══ MODALS ═══════════════════════════════════════════════════════ */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:600;justify-content:flex-end;flex-direction:column;align-items:center;backdrop-filter:blur(4px)}
.ov.open{display:flex;animation:ovIn .12s var(--ez)}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surf);border-radius:var(--r2) var(--r2) 0 0;width:100%;max-width:640px;max-height:92dvh;overflow-y:auto;box-shadow:var(--s4);border-top:1px solid var(--bdr);animation:mUp .18s var(--ez)}
@keyframes mUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@media(min-width:660px){.ov{justify-content:center;flex-direction:row}.modal{border-radius:var(--r2);border:1px solid var(--bdr)}.modal-lg{max-width:800px}}
.mh{padding:12px 14px 10px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--surf);z-index:1}
.mh h2{font-size:.92rem;font-weight:800;flex:1;letter-spacing:-.02em}
.mbody{padding:17px}
.mfoot{padding:10px 14px;border-top:1px solid var(--bdr);display:flex;gap:6px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surf)}
.mclose{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:var(--r1);border:1px solid var(--bdr);background:var(--bg2);color:var(--tx3);cursor:pointer;transition:all var(--t);font-size:.76rem}
.mclose:hover{background:var(--rdbg);color:var(--rd);border-color:transparent}
/* ══ FORMS ════════════════════════════════════════════════════════ */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg2.g3{grid-template-columns:1fr 1fr 1fr}
.fg2.g1{grid-template-columns:1fr}
.full{grid-column:1/-1}
.fgrp{display:flex;flex-direction:column;gap:3px}
.fgrp label{font-size:.73rem;font-weight:700;color:var(--tx2)}
.req::after{content:' *';color:var(--ac)}
.fgrp input,.fgrp select,.fgrp textarea{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r1);padding:8px 10px;color:var(--tx);font-size:.83rem;width:100%;transition:border-color var(--t),box-shadow var(--t);outline:none}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
.fgrp textarea{resize:vertical;min-height:58px}
.calc-f{background:var(--acbg);border:1px solid rgba(184,50,0,.2);border-radius:var(--r1);padding:6px 8px;font-size:.79rem;color:var(--ac);font-weight:700;font-family:var(--mo)}
.chkrow{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0}
.chkrow input{width:14px;height:14px;accent-color:var(--ac);cursor:pointer;flex-shrink:0}
.chkrow span{font-size:.77rem;color:var(--tx)}
.fhint{font-size:.63rem;color:var(--tx3);margin-top:1px}
.divider{height:1px;background:var(--bdr);margin:9px 0}
/* ══ ALERTS / TOASTS ══════════════════════════════════════════════ */
.alert{border-radius:var(--r);padding:8px 10px;font-size:.74rem;margin-bottom:8px;line-height:1.45;display:flex;gap:8px;align-items:flex-start}
.al-w{background:var(--ambg);color:var(--am);border:1px solid rgba(160,80,0,.2)}
.al-i{background:var(--blbg);color:var(--bl);border:1px solid rgba(16,72,160,.2)}
.al-s{background:var(--gnbg);color:var(--gn);border:1px solid rgba(26,96,64,.2)}
.toast-wrap{position:fixed;bottom:16px;right:14px;z-index:900;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 15px;display:flex;align-items:center;gap:9px;min-width:240px;max-width:360px;box-shadow:var(--s3);font-size:.82rem;pointer-events:all;animation:tIn .18s var(--ez);line-height:1.4}
@keyframes tIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.toast.ts{border-left:3px solid var(--gn)}.toast.te{border-left:3px solid var(--rd)}.toast.ti{border-left:3px solid var(--bl)}.toast.tw{border-left:3px solid var(--am)}
.ldr-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:800;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.ldr-ov.on{display:flex}
.ldr-ring{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.16);border-top-color:var(--ac);animation:spin .6s linear infinite}
/* ══ CHARTS ═══════════════════════════════════════════════════════ */
.cgrid{display:grid;grid-template-columns:2fr 1fr;gap:9px;margin-bottom:11px}
.ccard{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;box-shadow:var(--s0)}
.ccard h3{font-size:.63rem;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.cwrap{position:relative;height:182px}
/* ══ WALLET CARDS ═════════════════════════════════════════════════ */
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:9px;margin-bottom:12px}
.wcard{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 13px;cursor:pointer;transition:all var(--t)}
.wcard:hover{box-shadow:var(--s2);transform:translateY(-1px)}
.wcard.sel{border-color:var(--ac);background:var(--acbg);box-shadow:0 0 0 3px var(--acd)}
.wico{font-size:1.25rem;margin-bottom:6px;display:block}
.wname{font-size:.72rem;font-weight:700;color:var(--tx);margin-bottom:1px}
.wcurr{font-size:.58rem;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.wbal{font-size:1.18rem;font-weight:900;color:var(--tx);font-family:var(--mo);letter-spacing:-.04em}
.wio{display:flex;gap:7px;margin-top:4px}
.win{font-size:.6rem;color:var(--gn)}.wout{font-size:.6rem;color:var(--rd)}
/* ══ STOCK GROUPS ═════════════════════════════════════════════════ */
.sg{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:7px;overflow:hidden}
.sg-hd{padding:9px 11px;background:var(--bg2);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background var(--t)}
.sg-hd:hover{background:var(--bg3)}
.sg-hd h3{font-size:.75rem;font-weight:700;flex:1}
.sg.col .sg-bd{display:none}
.chev{transition:transform var(--t);font-size:.67rem;color:var(--tx3)}
.sg.col .chev{transform:rotate(-90deg)}
