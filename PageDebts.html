<!-- ══ DEBTS ════════════════════════════════════════════════════════ -->
<div class="page" id="page-debts">
  <div class="sh"><h2>Долги</h2></div>
  <div class="ptabs">
    <button class="ptab on" onclick="showDebtTab('b',this)">👤 Покупатели</button>
    <button class="ptab" onclick="showDebtTab('s',this)">🏭 Поставщики</button>
  </div>
  <div id="dBuyers"><div class="tw"><div class="tscr"><table>
    <thead><tr><th>Покупатель</th><th>Долг</th><th>Посл. оплата</th><th>Кол-во оплат</th></tr></thead>
    <tbody id="dBBody"></tbody>
  </table></div></div></div>
  <div id="dSups" style="display:none"><div class="tw"><div class="tscr"><table>
    <thead><tr><th>Поставщик</th><th>Закуп</th><th>Оплачено</th><th>Остаток</th><th>Валюта</th><th>Статус</th></tr></thead>
    <tbody id="dSBody"></tbody>
  </table></div></div></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  DEBTS
// ════════════════════════════════════════════════════════════════
async function loadDebts(){
  const d=await api('getDebts'); if(!d) return;
  _setHTML(document.getElementById('dBBody'),(d.buyers||[]).map(r=>`<tr><td>${esc(r.buyer)}</td><td class="mono tr fw7">${fmtN(r.debt_kgs)} ${CUR}</td><td>${fmtD(r.last_pay)}</td><td>${r.pay_count}</td></tr>`).join('')||eRow(4,'Долгов нет'));
  _setHTML(document.getElementById('dSBody'),(d.suppliers||[]).map(r=>`<tr><td>${esc(r.name)}</td><td>${fmtN(r.total)}</td><td>${fmtN(r.paid)}</td><td class="mono${+r.rest>0?' tr fw7':' tg'}">${fmtN(r.rest)}</td><td><span class="badge bb">${esc(r.currency)}</span></td><td><span class="badge ${+r.rest>0?'br':'bg'}">${esc(r.status)}</span></td></tr>`).join('')||eRow(6,'Долгов нет'));
}
function showDebtTab(tab,el){
  document.querySelectorAll('#page-debts .ptab').forEach(x=>x.classList.remove('on'));
  if(el) el.classList.add('on');
  document.getElementById('dBuyers').style.display=tab==='b'?'':'none';
  document.getElementById('dSups').style.display=tab==='s'?'':'none';
}
</script>
