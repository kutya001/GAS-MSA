<!-- ══ PURCHASES ════════════════════════════════════════════════════ -->
<div class="page" id="page-purchases">
  <div class="sh"><h2>Закупки</h2></div>
  <div id="pTable"></div>
</div>
<script>
// ════════════════════════════════════════════════════════════════
//  PURCHASES — форма и таблица (4 логических блока + MDM)
// ════════════════════════════════════════════════════════════════

// ── хелпер расчёта себестоимости ────────────────────────────────
function _pCalcKgs(form) {
  var usd  = parseFloat(form.getVal('cost_usd')) || 0;
  var rate = parseFloat(form.getVal('rate'))     || 88;
  form.setCalc('cost_kgs', fmtN(usd * rate) + ' ' + CUR);
}

// ── поиск шаблона MDM по id ────────────────────────────────────
function _findTemplateById(tplId) {
  var tpls = (ST.mdm && ST.mdm.templates) ? ST.mdm.templates : [];
  var id = parseInt(tplId) || 0;
  for (var i = 0; i < tpls.length; i++) {
    if (tpls[i].id === id) return tpls[i];
  }
  return null;
}

// ── рендер динамических атрибутов шаблона (Block 2) ────────────
function _renderTplAttrs(containerId, tpl, existingVals, isEdit) {
  var cnt = document.getElementById(containerId);
  if (!cnt) return;
  if (!tpl || !tpl.attributes || !tpl.attributes.length) {
    cnt.innerHTML = '<div class="muted ta-c">Нет характеристик для этого шаблона</div>';
    return;
  }
  var refTables = (ST.mdm && ST.mdm.refTables) ? ST.mdm.refTables : {};
  var vals = existingVals || {};
  var html = '<div class="fg2">';
  tpl.attributes.forEach(function(a) {
    var attrId = String(a.id);
    var val    = vals[attrId] != null ? String(vals[attrId]) : '';
    var fid    = containerId + '-attr-' + attrId;

    if (a.type === 'calculated') {
      // Вычисляемое — только отображение
      html += '<div class="fgrp full"><label class="flb">' + esc(a.name) + '</label>';
      html += '<div class="calc-f" id="' + fid + '">' + esc(val || '—') + '</div></div>';
      return;
    }

    if (!isEdit) {
      // Режим просмотра
      html += '<div class="mf-vf"><span class="mf-vl">' + esc(a.name) + '</span>';
      html += '<div class="mf-vv"><span>' + esc(val || '—') + '</span></div></div>';
      return;
    }

    // Режим редактирования
    var req = a.is_required ? ' <span class="req">*</span>' : '';
    html += '<div class="fgrp"><label class="flb">' + esc(a.name) + req + '</label>';

    if (a.type === 'reference' && a.ref_table && refTables[a.ref_table]) {
      var items = refTables[a.ref_table].items || [];
      html += '<select class="fin" id="' + fid + '"><option value="">—</option>';
      items.forEach(function(it) {
        var sel = (String(it.name) === val || String(it.id) === val) ? ' selected' : '';
        html += '<option value="' + esc(it.name) + '"' + sel + '>' + esc(it.name) + '</option>';
      });
      html += '</select>';
    } else if (a.type === 'enum_radio' && a.options) {
      var opts = a.options.split(',');
      html += '<select class="fin" id="' + fid + '"><option value="">—</option>';
      opts.forEach(function(o) {
        var ot = o.trim();
        var sel = (ot === val) ? ' selected' : '';
        html += '<option value="' + esc(ot) + '"' + sel + '>' + esc(ot) + '</option>';
      });
      html += '</select>';
    } else if (a.type === 'number') {
      html += '<input class="fin" type="number" id="' + fid + '" value="' + esc(val) + '">';
    } else if (a.type === 'boolean') {
      html += '<label class="cb-wrap"><input type="checkbox" id="' + fid + '"' + (val === 'true' || val === '1' ? ' checked' : '') + '> ' + esc(a.name) + '</label>';
    } else {
      html += '<input class="fin" type="text" id="' + fid + '" value="' + esc(val) + '" placeholder="' + esc(a.description || '') + '">';
    }
    html += '</div>';
  });
  html += '</div>';
  cnt.innerHTML = html;
}

// ── сбор значений атрибутов из контейнера ──────────────────────
function _gatherTplAttrs(containerId, tpl) {
  if (!tpl || !tpl.attributes) return {};
  var vals = {};
  tpl.attributes.forEach(function(a) {
    if (a.type === 'calculated') return;
    var el = document.getElementById(containerId + '-attr-' + a.id);
    if (!el) return;
    if (el.type === 'checkbox') vals[String(a.id)] = el.checked ? 'true' : 'false';
    else vals[String(a.id)] = el.value || '';
  });
  return vals;
}

// ── генерация названия продукта из атрибутов ───────────────────
function _buildProductName(tpl, attrVals) {
  if (!tpl || !tpl.attributes) return '';
  var parts = [];
  tpl.attributes.forEach(function(a) {
    if (a.type === 'calculated') return;
    var v = attrVals[String(a.id)] || '';
    if (v) parts.push(v);
  });
  return parts.join(' ');
}

// ── рендер блока оплат (Block 3) ──────────────────────────────
function _renderPurchasePayments(containerId, purchaseId, mode) {
  var cnt = document.getElementById(containerId);
  if (!cnt) return;
  if (!purchaseId) {
    cnt.innerHTML = '<div class="muted ta-c">Сохраните закупку, чтобы добавить оплаты</div>';
    return;
  }
  cnt.innerHTML = '<div class="muted ta-c">Загрузка оплат...</div>';
  api('getPurchasePayments', { purchase_id: purchaseId }).then(function(data) {
    var rows = data || [];
    var html = '';
    if (rows.length) {
      var totalPaid = 0;
      html += '<table class="pay-tbl"><thead><tr><th>Дата</th><th>Кошелёк</th><th>Сумма</th><th>Заметка</th></tr></thead><tbody>';
      rows.forEach(function(r) {
        totalPaid += r.amount;
        html += '<tr><td>' + fmtD(r.pay_date) + '</td><td>' + esc(r.wallet_name) + '</td>';
        html += '<td class="mono tar">' + fmtN(r.amount) + ' ' + CUR + '</td><td>' + esc(r.note || '') + '</td></tr>';
      });
      html += '</tbody><tfoot><tr><td colspan="2"><b>Итого оплачено</b></td><td class="mono tar fw7">' + fmtN(totalPaid) + ' ' + CUR + '</td><td></td></tr></tfoot></table>';
    } else {
      html += '<div class="muted ta-c" style="margin-bottom:8px">Оплат пока нет</div>';
    }
    // Кнопка добавления оплаты
    html += '<div class="pay-add-row">';
    html += '<select class="fin" id="pp-wallet"><option value="">Кошелёк</option></select>';
    html += '<input class="fin" type="number" id="pp-amount" placeholder="Сумма" min="1" style="max-width:120px">';
    html += '<input class="fin" type="date" id="pp-date" value="' + today() + '">';
    html += '<input class="fin" type="text" id="pp-note" placeholder="Заметка" style="max-width:140px">';
    html += '<button class="btn btn-p btn-sm" onclick="_addPurchasePayment(' + purchaseId + ')">+ Оплата</button>';
    html += '</div>';
    cnt.innerHTML = html;
    // Заполняем кошельки
    var sel = document.getElementById('pp-wallet');
    if (sel && ST.wallets) {
      ST.wallets.forEach(function(w) {
        var o = document.createElement('option');
        o.value = w.id; o.textContent = w.name;
        sel.appendChild(o);
      });
    }
  });
}

async function _addPurchasePayment(purchaseId) {
  var walletId = document.getElementById('pp-wallet').value;
  var amount   = document.getElementById('pp-amount').value;
  var date     = document.getElementById('pp-date').value;
  var note     = document.getElementById('pp-note').value;
  if (!walletId || !amount) { toast('Укажите кошелёк и сумму', 'e'); return; }
  await api('addPurchasePayment', {
    purchase_id: purchaseId,
    wallet_id: +walletId, amount: +amount,
    pay_date: date || today(), note: note
  });
  toast('Оплата добавлена', 's');
  _renderPurchasePayments('mfPurchase-payments_block', purchaseId, 'view');
}

// ── обновление Block 2 при смене template_id ──────────────────
function _pUpdateBlock2(form, existingVals) {
  var tplId = form.getVal('template_id');
  var tpl = _findTemplateById(tplId);
  var isEdit = form._mode !== 'view';
  _renderTplAttrs('mfPurchase-tpl_attrs', tpl, existingVals || {}, isEdit);
  form._currentTpl = tpl;
}

// ── обновление списка «Назначение» при смене class/type ────────
function _pUpdateTemplates(form) {
  var cId = parseInt(form.getVal('class_id')) || 0;
  var tId = parseInt(form.getVal('type_id'))  || 0;
  var tpls = (ST.mdm && ST.mdm.templates) ? ST.mdm.templates : [];
  var filtered = tpls.filter(function(t) { return t.class_id === cId && t.type_id === tId; });
  form.fillField('template_id', filtered, 'id', 'name', '— Выберите назначение —');
  // Сбросить номенклатуру
  form.fillField('product_id', [], 'id', 'name', '— Выберите товар —');
  _pUpdateBlock2(form, null);
}

// ── обновление списка номенклатуры при смене template ───────────
function _pUpdateProducts(form) {
  var tplId = parseInt(form.getVal('template_id')) || 0;
  var prods = (ST.mdm && ST.mdm.products) ? ST.mdm.products : [];
  var filtered = prods.filter(function(p) { return p.template_id === tplId; });
  form.fillField('product_id', filtered, 'id', 'name', '— Выберите товар —');
  _pUpdateBlock2(form, null);
}

// ── авто-заполнение характеристик из выбранного продукта ────────
function _pAutoFillAttrs(form) {
  var prodId = parseInt(form.getVal('product_id')) || 0;
  if (!prodId) return;
  var prods = (ST.mdm && ST.mdm.products) ? ST.mdm.products : [];
  var prod = null;
  for (var i = 0; i < prods.length; i++) {
    if (prods[i].id === prodId) { prod = prods[i]; break; }
  }
  if (!prod) return;
  var vals = prod.attribute_values || {};
  _pUpdateBlock2(form, vals);
}

// ── форма закупки ────────────────────────────────────────────────
var purchaseForm = new MainForm({
  id:    'mfPurchase',
  title: 'Закупка',
  size:  'lg',
  fields: [
    // ═══ BLOCK 0 — Документ ═══
    { key: '_b0', label: '📋 Документ', type: 'group' },
    { key: 'purchase_date', label: 'Дата закупки', type: 'date', required: true,
      renderView: function(v) { return fmtD(v); }
    },
    { key: 'condition', label: 'Состояние', type: 'select',
      options: ['Новый', 'Б/У'], emptyLabel: false
    },
    { key: 'wh_id', label: 'Склад', type: 'select', required: true,
      getOptions: function() { return ST.warehouses; },
      renderView: function(v, r) { return esc(r.wh_name || '—'); }
    },
    { key: 'supplier_id', label: 'Поставщик', type: 'select',
      getOptions: function() { return ST.refs.suppliers; },
      renderView: function(v, r) { return esc(r.supplier_name || '—'); }
    },

    // ═══ BLOCK 1 — Товар ═══
    { key: '_b1', label: '📱 Товар', type: 'group' },
    { key: 'has_imei', label: '📱 Товар с IMEI кодом (поштучный учёт)', type: 'checkbox', span: 2,
      default: true,
      onChange: function(v, f) { f.refreshVis(); },
      renderView: function(v) {
        return v ? '<span class="badge bb">IMEI (поштучно)</span>' : '<span class="badge bp">Партия</span>';
      }
    },
    { key: 'imei', label: 'IMEI (15 цифр)', type: 'text', maxlength: 15, mono: true,
      placeholder: '352365010000001',
      showIf: function(f) { return !!f.getVal('has_imei'); },
      renderView: function(v, r) {
        return r.has_imei ? '<span class="imeic">' + esc(v || '—') + '</span>' : '<span class="muted">—</span>';
      }
    },
    { key: 'qty', label: 'Количество (партия)', type: 'number', min: 1, default: 1,
      showIf: function(f) { return !f.getVal('has_imei'); },
      renderView: function(v, r) {
        return !r.has_imei ? '<span class="badge bp">×' + esc(String(v || 1)) + '</span>' : '<span class="muted">—</span>';
      }
    },
    { key: 'class_id', label: 'Класс товара', type: 'select', required: true,
      getOptions: function() { return ST.refs.classes; },
      onChange: function(v, f) {
        var t = ST.refs.prod_types.filter(function(x) { return !v || x.class_id === +v; });
        f.fillField('type_id', t, 'id', 'name', '—');
        _pUpdateTemplates(f);
      },
      renderView: function(v, r) { return esc(r.class_name || '—'); }
    },
    { key: 'type_id', label: 'Тип продукта', type: 'select', required: true,
      getOptions: function() { return ST.refs.prod_types; },
      onChange: function(v, f) {
        _pUpdateTemplates(f);
      },
      renderView: function(v, r) { return esc(r.type_name || '—'); }
    },
    { key: 'template_id', label: 'Назначение', type: 'select', required: true,
      getOptions: function() { return []; },
      onChange: function(v, f) {
        _pUpdateProducts(f);
      },
      renderView: function(v, r) {
        var tpl = _findTemplateById(v);
        return esc(tpl ? tpl.name : '—');
      }
    },
    { key: 'product_id', label: 'Номенклатура (MDM)', type: 'select',
      getOptions: function() { return []; },
      onChange: function(v, f) {
        _pAutoFillAttrs(f);
      },
      renderView: function(v, r) {
        return r.product_name ? '<span class="fw7">' + esc(r.product_name) + '</span>' : '<span class="muted">—</span>';
      }
    },
    { key: 'cost_usd', label: 'Себестоимость USD', type: 'number', min: 0, step: 0.01, required: true,
      onChange: function(v, f) { _pCalcKgs(f); },
      renderView: function(v) { return '<span class="mono fw7">$' + fmtN(v) + '</span>'; }
    },
    { key: 'rate', label: 'Курс KGS/USD', type: 'number', min: 1, default: 88,
      onChange: function(v, f) { _pCalcKgs(f); },
      renderView: function(v) { return esc(String(v || 88)); }
    },
    { key: 'cost_kgs', label: 'Себестоимость KGS (авторасчёт)', type: 'calc', span: 2,
      calcInit: '0',
      renderView: function(v) { return '<span class="mono fw7 tg">' + fmtN(v) + ' ' + CUR + '</span>'; }
    },
    { key: 'status', label: 'Статус', viewOnly: true,
      renderView: function(v) {
        var c = v === 'В наличии' ? 'bb' : v === 'Продано' ? 'bg' : 'bgr';
        return '<span class="badge ' + c + '">' + esc(v || '—') + '</span>';
      }
    },
    { key: 'note', label: 'Примечание', type: 'text', span: 2, placeholder: 'Необязательно' },

    // ═══ BLOCK 2 — Характеристики (динамические атрибуты шаблона) ═══
    { key: '_b2', label: '⚙️ Характеристики товара', type: 'group' },
    { key: 'tpl_attrs', type: 'container', span: 2,
      renderView: function(v, rec, form) {
        if (!rec || !rec.template_id) return '<div class="muted ta-c">Нет характеристик</div>';
        var tpl = _findTemplateById(rec.template_id);
        if (!tpl || !tpl.attributes || !tpl.attributes.length) return '<div class="muted ta-c">Нет характеристик для этого шаблона</div>';
        var vals = rec.attribute_values || {};
        var html = '<div class="fg2">';
        tpl.attributes.forEach(function(a) {
          var val = vals[String(a.id)] || '';
          html += '<div class="mf-vf"><span class="mf-vl">' + esc(a.name) + '</span>';
          html += '<div class="mf-vv"><span>' + esc(val || '—') + '</span></div></div>';
        });
        html += '</div>';
        return html;
      },
      renderEdit: function(rec, form) { return ''; }
    },

    // ═══ BLOCK 3 — Оплаты поставщику ═══
    { key: '_b3', label: '💰 Оплаты поставщику', type: 'group' },
    { key: 'payments_block', type: 'container', span: 2,
      renderView: function(v, rec, form) { return ''; },
      renderEdit: function(rec, form) { return ''; }
    },
  ],
  validate: function(values) {
    if (values.has_imei && values.imei && !/^\d{15}$/.test(values.imei)) {
      return 'IMEI должен быть 15 цифр';
    }
    return null;
  },
  onSave: async function(values, editId) {
    var form = purchaseForm;
    var tpl  = form._currentTpl;

    // Собираем атрибуты из Block 2
    var attrVals = _gatherTplAttrs('mfPurchase-tpl_attrs', tpl);
    var productName = _buildProductName(tpl, attrVals);

    var data = {
      wh_id: +values.wh_id, supplier_id: +values.supplier_id || null,
      class_id: +values.class_id || null, type_id: +values.type_id || null,
      template_id: +values.template_id || null,
      product_id: +values.product_id || null,
      has_imei: values.has_imei,
      imei: values.has_imei ? (values.imei || '') : '',
      qty:  values.has_imei ? 1 : (+values.qty || 1),
      condition: values.condition || 'Новый',
      purchase_date: values.purchase_date,
      cost_usd: +values.cost_usd, rate: +values.rate || 88,
      note: values.note,
      attribute_values: attrVals,
      product_name: productName,
    };

    if (editId) {
      data.id = editId;
      await api('updatePurchase', data);
    } else {
      await api('addPurchase', data);
    }
    toast(editId ? 'Закупка обновлена' : 'Закупка добавлена', 's');
    loadPurchases();
  },
  onDelete: async function(id) {
    await api('deletePurchase', { id: id });
    toast('Закупка удалена', 's');
    loadPurchases();
  },
  afterMount: function(mode, rec, form) {
    // Наполняем справочники Block 0
    form.fillField('wh_id', ST.warehouses, 'id', 'name', '—');
    if (rec) { var wEl = document.getElementById(form.id + '-wh_id'); if (wEl) wEl.value = rec.wh_id || ''; }
    form.fillField('supplier_id', ST.refs.suppliers, 'id', 'name', '—');
    if (rec) { var sEl = document.getElementById(form.id + '-supplier_id'); if (sEl) sEl.value = rec.supplier_id || ''; }

    // Block 1 — каскадные селекты: Класс → Тип → Назначение → Номенклатура
    form.fillField('class_id', ST.refs.classes, 'id', 'name', '—');
    if (rec) { var cEl = document.getElementById(form.id + '-class_id'); if (cEl) cEl.value = rec.class_id || ''; }
    var cid = +(form.getVal('class_id'));
    form.fillField('type_id', ST.refs.prod_types.filter(function(t) { return !cid || t.class_id === cid; }), 'id', 'name', '—');
    if (rec) { var tEl = document.getElementById(form.id + '-type_id'); if (tEl) tEl.value = rec.type_id || ''; }
    var tid = +(form.getVal('type_id'));

    // Назначение (шаблон)
    var tpls = (ST.mdm && ST.mdm.templates) ? ST.mdm.templates : [];
    var filteredTpls = tpls.filter(function(t) { return t.class_id === cid && t.type_id === tid; });
    form.fillField('template_id', filteredTpls, 'id', 'name', '— Выберите назначение —');
    if (rec) { var tmEl = document.getElementById(form.id + '-template_id'); if (tmEl) tmEl.value = rec.template_id || ''; }
    var tmId = +(form.getVal('template_id'));

    // Номенклатура (продукт)
    var prods = (ST.mdm && ST.mdm.products) ? ST.mdm.products : [];
    var filteredProds = prods.filter(function(p) { return p.template_id === tmId; });
    form.fillField('product_id', filteredProds, 'id', 'name', '— Выберите товар —');
    if (rec) { var pEl = document.getElementById(form.id + '-product_id'); if (pEl) pEl.value = rec.product_id || ''; }

    // Block 2 — атрибуты шаблона
    var existingVals = (rec && rec.attribute_values) ? rec.attribute_values : {};
    _pUpdateBlock2(form, existingVals);

    // Block 3 — оплаты
    if (rec && rec.id) {
      _renderPurchasePayments(form.id + '-payments_block', rec.id, mode);
    } else {
      var payC = document.getElementById(form.id + '-payments_block');
      if (payC) payC.innerHTML = '<div class="muted ta-c">Сохраните закупку, чтобы добавить оплаты</div>';
    }

    // Date init + recalc
    if (mode === 'create') {
      var d = document.getElementById(form.id + '-purchase_date');
      if (d) d.value = today();
    }
    if (mode !== 'view') {
      _pCalcKgs(form);
      form.refreshVis();
    }
  }
});

// ── DT таблица ───────────────────────────────────────────────────
var _pDT = null;
function _pDTinit() {
  if (_pDT) return _pDT;
  _pDT = new DT({
    id: 'purchases', containerId: 'pTable',
    addLabel: '+ Закупка', onAdd: function() { purchaseForm.openCreate(); },
    onRowClick: function(r) { purchaseForm.openView(r); },
    filters: [
      { key: 'wh_id',    label: 'Склад',  type: 'select', getOptions: function() { return ST.warehouses; } },
      { key: 'class_id', label: 'Класс',  type: 'select', getOptions: function() { return ST.refs.classes; } },
      { key: 'status',   label: 'Статус', type: 'select',
        options: ['В наличии', 'Продано'], emptyLabel: 'Все' },
      { key: 'dateFrom', label: 'Дата от', type: 'date' },
      { key: 'dateTo',   label: 'Дата до', type: 'date' }
    ],
    onFilter: function() { loadPurchases(); },
    cols: [
      { key: 'product_name',  label: 'Товар' },
      { key: 'class_name',    label: 'Класс',      w: '90px' },
      { key: 'type_name',     label: 'Тип',         w: '90px' },
      { key: 'wh_name',       label: 'Склад' },
      { key: 'supplier_name', label: 'Поставщик' },
      { key: '_iq', label: 'IMEI / Шт.', sortable: false,
        render: function(v, r) {
          return r.has_imei ? '<span class="imeic">' + esc(r.imei || '') + '</span>'
                            : '<span class="badge bp">&times;' + r.qty + '</span>';
        }
      },
      { key: 'cost_usd', label: '$ USD', align: 'right', mono: true,
        render: function(v) { return '$' + fmtN(v); }
      },
      { key: 'cost_kgs', label: CUR, align: 'right', mono: true,
        render: function(v) { return fmtN(v) + ' ' + CUR; }
      },
      { key: 'status', label: 'Статус',
        render: function(v) {

        }
      },
      { key: 'purchase_date', label: 'Дата', w: '84px',

    ]
  });

}
async function loadPurchases() {
