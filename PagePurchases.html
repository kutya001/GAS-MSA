<!-- ══ PURCHASES ════════════════════════════════════════════════════ -->
<div class="page" id="page-purchases">
  <div class="sh"><h2>Закупки</h2></div>
  <div id="pTable"></div>
</div>
<script>
// ════════════════════════════════════════════════════════════════
//  PURCHASES — форма и таблица
// ════════════════════════════════════════════════════════════════
// ── хелпер расчёта себестоимости ────────────────────────────────
function _pCalcKgs(form) {
  var usd  = parseFloat(form.getVal('cost_usd')) || 0;
  var rate = parseFloat(form.getVal('rate'))     || 88;
  form.setCalc('cost_kgs', fmtN(usd * rate) + ' ₸');
}
// ── форма закупки ────────────────────────────────────────────────
var purchaseForm = new MainForm({
  id:    'mfPurchase',
  title: 'Закупка',
  size:  'lg',
  fields: [
    { key: 'has_imei', label: '📱 Товар с IMEI кодом (поштучный учёт)', type: 'checkbox', span: 2,
      default: true,
      onChange: function(v, f) { f.refreshVis(); },
      renderView: function(v) {
        return v ? '<span class="badge bb">IMEI (поштучно)</span>' : '<span class="badge bp">Партия</span>';
      }
    },
    { key: 'brand_id', label: 'Бренд', type: 'select', required: true,
      getOptions: function() { return ST.refs.brands; },
      onChange: function(v, f) {
        var m = ST.refs.models.filter(function(x) { return !v || x.brand_id === +v; });
        f.fillField('model_id', m, 'id', 'name', '—');
      },
      renderView: function(v, r) { return esc(r.brand_name || '—'); }
    },
    { key: 'model_id', label: 'Модель', type: 'select', required: true,
      getOptions: function() { return ST.refs.models; },
      renderView: function(v, r) { return '<span class="fw7">' + esc(r.model_name || '—') + '</span>'; }
    },
    { key: 'spec',  label: 'Характеристика', type: 'text', placeholder: '8/256, 128GB...' },
    { key: 'color', label: 'Цвет',           type: 'text', placeholder: 'Чёрный, Белый...' },
    { key: 'wh_id', label: 'Склад', type: 'select', required: true,
      getOptions: function() { return ST.warehouses; },
      renderView: function(v, r) { return esc(r.wh_name || '—'); }
    },
    { key: 'supplier_id', label: 'Поставщик', type: 'select',
      getOptions: function() { return ST.refs.suppliers; },
      renderView: function(v, r) { return esc(r.supplier_name || '—'); }
    },
    { key: 'imei', label: 'IMEI (15 цифр)', type: 'text', maxlength: 15, mono: true,
      placeholder: '352365010000001',
      showIf: function(f) { return !!f.getVal('has_imei'); },
      renderView: function(v, r) {
        return r.has_imei ? '<span class="imeic">' + esc(v || '—') + '</span>' : '<span class="muted">—</span>';
      }
    },
    { key: 'qty', label: 'Количество (партия)', type: 'number', min: 1, default: 1,
      showIf: function(f) { return !f.getVal('has_imei'); },
      renderView: function(v, r) {
        return !r.has_imei ? '<span class="badge bp">×' + esc(String(v || 1)) + '</span>' : '<span class="muted">—</span>';
      }
    },
    { key: 'condition', label: 'Состояние', type: 'select',
      options: ['Новый', 'Б/У'], emptyLabel: false
    },
    { key: 'purchase_date', label: 'Дата закупки', type: 'date', required: true,
      renderView: function(v) { return fmtD(v); }
    },
    { key: 'cost_usd', label: 'Себестоимость USD', type: 'number', min: 0, step: 0.01, required: true,
      onChange: function(v, f) { _pCalcKgs(f); },
      renderView: function(v) { return '<span class="mono fw7">$' + fmtN(v) + '</span>'; }
    },
    { key: 'rate', label: 'Курс KGS/USD', type: 'number', min: 1, default: 88,
      onChange: function(v, f) { _pCalcKgs(f); },
      renderView: function(v) { return esc(String(v || 88)); }
    },
    { key: 'cost_kgs', label: 'Себестоимость KGS (авторасчёт)', type: 'calc', span: 2,
      calcInit: '0 ₸',
      renderView: function(v) { return '<span class="mono fw7 tg">' + fmtN(v) + ' ₸</span>'; }
    },
    { key: 'pay_wallet_id', label: 'Оплата поставщику (кошелёк)', type: 'select', span: 2,
      getOptions: function() { return ST.wallets; },
      emptyLabel: 'Не оплачено — долг поставщику',
      renderView: function(v) {
        var w = v ? ST.wallets.find(function(x) { return x.id === +v; }) : null;
        return w ? esc(w.name) : '<span class="badge ba">Долг поставщику</span>';
      }
    },
    { key: 'status', label: 'Статус', viewOnly: true,
      renderView: function(v) {
        var c = v === 'В наличии' ? 'bb' : v === 'Продано' ? 'bg' : 'bgr';
        return '<span class="badge ' + c + '">' + esc(v || '—') + '</span>';
      }
    },
    { key: 'note', label: 'Примечание', type: 'text', span: 2, placeholder: 'Необязательно' }
  ],
  validate: function(values) {
    if (values.has_imei && values.imei && !/^\d{15}$/.test(values.imei)) {
      return 'IMEI должен быть 15 цифр';
    }
    return null;
  },
  onSave: async function(values, editId) {
    var data = {
      brand_id: +values.brand_id, model_id: +values.model_id,
      spec: values.spec, color: values.color,
      wh_id: +values.wh_id, supplier_id: +values.supplier_id || null,
      has_imei: values.has_imei,
      imei: values.has_imei ? (values.imei || '') : '',
      qty:  values.has_imei ? 1 : (+values.qty || 1),
      condition: values.condition || 'Новый',
      purchase_date: values.purchase_date,
      cost_usd: +values.cost_usd, rate: +values.rate || 88,
      cost_kgs: (+values.cost_usd) * (+values.rate || 88),
      pay_wallet_id: +values.pay_wallet_id || null,
      note: values.note
    };
    if (editId) await api('updatePurchase', Object.assign({ id: editId }, data));
    else        await api('addPurchase', data);
    toast(editId ? 'Закупка обновлена' : 'Закупка добавлена', 's');
    loadPurchases();
  },
  onDelete: async function(id) {
    await api('deletePurchase', { id: id });
    toast('Закупка удалена', 's');
    loadPurchases();
  },
  afterMount: function(mode, rec, form) {
    if (mode === 'view') return;
    // Наполняем справочники
    form.fillField('brand_id', ST.refs.brands, 'id', 'name', '—');
    if (rec) document.getElementById(form.id + '-brand_id').value = rec.brand_id || '';
    var bid = +(form.getVal('brand_id'));
    form.fillField('model_id', ST.refs.models.filter(function(m) { return !bid || m.brand_id === bid; }), 'id', 'name', '—');
    if (rec) document.getElementById(form.id + '-model_id').value = rec.model_id || '';
    form.fillField('wh_id', ST.warehouses, 'id', 'name', '—');
    if (rec) document.getElementById(form.id + '-wh_id').value = rec.wh_id || '';
    form.fillField('supplier_id', ST.refs.suppliers, 'id', 'name', '—');
    if (rec) document.getElementById(form.id + '-supplier_id').value = rec.supplier_id || '';
    form.fillField('pay_wallet_id', ST.wallets, 'id', 'name', 'Не оплачено — долг поставщику');
    if (rec) document.getElementById(form.id + '-pay_wallet_id').value = rec.pay_wallet_id || '';
    // Инит
    if (mode === 'create') {
      var d = document.getElementById(form.id + '-purchase_date');
      if (d) d.value = today();
    }
    _pCalcKgs(form);
    form.refreshVis();
  }
});
// ── DT таблица ───────────────────────────────────────────────────
var _pDT = null;
function _pDTinit() {
  if (_pDT) return _pDT;
  _pDT = new DT({
    id: 'purchases', containerId: 'pTable',
    addLabel: '+ Закупка', onAdd: function() { purchaseForm.openCreate(); },
    onRowClick: function(r) { purchaseForm.openView(r); },
    filters: [
      { key: 'wh_id',    label: 'Склад',  type: 'select', getOptions: function() { return ST.warehouses; } },
      { key: 'brand_id', label: 'Бренд',  type: 'select', getOptions: function() { return ST.refs.brands; } },
      { key: 'status',   label: 'Статус', type: 'select',
        options: ['В наличии', 'Продано'], emptyLabel: 'Все' },
      { key: 'dateFrom', label: 'Дата от', type: 'date' },
      { key: 'dateTo',   label: 'Дата до', type: 'date' }
    ],
    onFilter: function() { loadPurchases(); },
    cols: [
      { key: 'brand_name',    label: 'Бренд',      w: '88px' },
      { key: 'model_name',    label: 'Модель' },
      { key: 'spec',          label: 'Хар-ка',      w: '80px' },
      { key: 'wh_name',       label: 'Склад' },
      { key: 'supplier_name', label: 'Поставщик' },
      { key: '_iq', label: 'IMEI / Шт.', sortable: false,
        render: function(v, r) {
          return r.has_imei ? '<span class="imeic">' + esc(r.imei || '') + '</span>'
                            : '<span class="badge bp">&times;' + r.qty + '</span>';
        }
      },
      { key: 'cost_usd', label: '$ USD', align: 'right', mono: true,
        render: function(v) { return '$' + fmtN(v); }
      },
      { key: 'cost_kgs', label: '₸ KGS', align: 'right', mono: true,
        render: function(v) { return fmtN(v) + '₸'; }
      },
      { key: 'status', label: 'Статус',
        render: function(v) {
          return '<span class="badge ' + (v === 'В наличии' ? 'bb' : v === 'Продано' ? 'bg' : 'bgr') + '">' + esc(v) + '</span>';
        }
      },
      { key: 'purchase_date', label: 'Дата', w: '84px',
        render: function(v) { return fmtD(v); }
      }
    ]
  });
  return _pDT;
}
async function loadPurchases() {
  var fp = _pDT ? (_pDT._fpValues || {}) : {};
  var d  = await api('getPurchases', {
    wh_id:    fp.wh_id    || '',
    brand_id: fp.brand_id || '',
    status:   fp.status   || '',
    dateFrom: fp.dateFrom || '',
    dateTo:   fp.dateTo   || ''
  });
  if (!d) return;
  _pDTinit().setData(d.rows || []);
  refreshSaleItems();
}
</script>
